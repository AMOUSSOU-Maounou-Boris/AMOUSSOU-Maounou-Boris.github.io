<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
</head>
<body>

<h2>Create Account</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<input type="password" id="confirm" placeholder="Confirm Password"><br><br>

<button onclick="signup()">Sign Up</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "boris-research-hub.firebaseapp.com",
  databaseURL: "https://boris-research-hub-default-rtdb.firebaseio.com",
  projectId: "boris-research-hub",
  storageBucket: "boris-research-hub.appspot.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function() {
  const email = email.value;
  const pass = password.value;
  const confirmPass = confirm.value;

  if(pass !== confirmPass){
    msg.innerText = "Passwords do not match";
    return;
  }

  try{
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
    await sendEmailVerification(userCred.user);

    msg.innerText = "Account created. Check your email!";
  }catch(e){
    msg.innerText = e.message;
  }
}
</script>

</body>
</html>
