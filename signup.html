<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Créer un compte</title>

  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:Arial, sans-serif; }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#07294d,#0b3f76);
      padding:20px;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:24px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
    }

    h1{
      font-size:32px;
      color:#082c53;
      margin-bottom:10px;
    }

    .sub{
      color:#5e738b;
      margin-bottom:18px;
      line-height:1.5;
    }

    .invite-box{
      border:1px solid #dce7f3;
      background:#f8fbff;
      padding:12px;
      border-radius:14px;
      font-size:14px;
      margin-bottom:14px;
      line-height:1.5;
    }

    .invite-box.ok{
      background:#ecfdf3;
      color:#166534;
    }

    .invite-box.bad{
      background:#fff4f4;
      color:#b42318;
    }

    .field{ margin-bottom:14px; }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      color:#0b2f57;
    }

    .field input{
      width:100%;
      padding:13px;
      border:1px solid #d6e0ea;
      border-radius:14px;
      outline:none;
      font-size:15px;
    }

    .field input:focus{
      border-color:#7fb5ff;
      box-shadow:0 0 0 3px rgba(47,140,255,0.12);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      background:#0c3d73;
      color:#fff;
      font-weight:800;
      cursor:pointer;
      margin-top:8px;
    }

    .btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .msg{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#b42318;
      line-height:1.5;
      min-height:20px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .msg.success{ color:#15803d; }

    .links{
      text-align:center;
      margin-top:16px;
      font-size:14px;
    }

    .links a{
      color:#0c3d73;
      font-weight:700;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Créer un compte</h1>
    <p class="sub">Accès privé sécurisé par invitation, sauf pour l’administrateur.</p>

    <div id="inviteStatus" class="invite-box">
      Vérification du lien...
    </div>

    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="displayName">
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password">
    </div>

    <div class="field">
      <label>Confirmer</label>
      <input type="password" id="confirmPassword">
    </div>

    <button class="btn" id="signupBtn">Créer mon compte</button>

    <div id="messageBox" class="msg"></div>

    <div class="links">
      <a href="login.html">Se connecter</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      createUserWithEmailAndPassword,
      updateProfile,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      ref,
      get,
      set,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const ADMIN_EMAIL = "borisamoussou01@gmail.com";

    const displayName = document.getElementById("displayName");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const signupBtn = document.getElementById("signupBtn");
    const messageBox = document.getElementById("messageBox");
    const inviteStatus = document.getElementById("inviteStatus");

    const params = new URLSearchParams(window.location.search);
    const inviteToken = params.get("invite") || "";

    let inviteOk = false;
    let inviteData = null;

    function showMsg(text, ok = false){
      messageBox.textContent = text;
      messageBox.className = ok ? "msg success" : "msg";
    }

    function showInvite(text, type = ""){
      inviteStatus.textContent = text;
      inviteStatus.className = "invite-box" + (type ? " " + type : "");
    }

    async function checkInvite(){
      const mail = email.value.trim().toLowerCase();

      if(mail === ADMIN_EMAIL){
        inviteOk = true;
        inviteData = null;
        showInvite("Compte administrateur : accès libre. S’il existe déjà, connecte-toi simplement.", "ok");
        signupBtn.disabled = false;
        return;
      }

      if(!inviteToken){
        inviteOk = false;
        inviteData = null;
        showInvite("Lien d’invitation requis.", "bad");
        signupBtn.disabled = true;
        return;
      }

      try{
        const snap = await get(ref(db, "signupInvites/" + inviteToken));

        if(!snap.exists()){
          inviteOk = false;
          inviteData = null;
          showInvite("Invitation invalide.", "bad");
          signupBtn.disabled = true;
          return;
        }

        inviteData = snap.val() || {};

        if(inviteData.used){
          inviteOk = false;
          showInvite("Invitation déjà utilisée.", "bad");
          signupBtn.disabled = true;
          return;
        }

        if(!inviteData.expiresAt || Date.now() > Number(inviteData.expiresAt)){
          inviteOk = false;
          showInvite("Invitation expirée.", "bad");
          signupBtn.disabled = true;
          return;
        }

        inviteOk = true;
        signupBtn.disabled = false;
        showInvite("Invitation valide.", "ok");

        if(inviteData.email){
          email.value = inviteData.email;
        }
      } catch(e){
        console.error(e);
        inviteOk = false;
        inviteData = null;
        showInvite("Erreur lors de la vérification de l’invitation.", "bad");
        signupBtn.disabled = true;
      }
    }

    email.addEventListener("input", checkInvite);

    signupBtn.addEventListener("click", async () => {
      const name = displayName.value.trim();
      const mail = email.value.trim().toLowerCase();
      const pass = password.value;
      const confirm = confirmPassword.value;
      const isAdmin = mail === ADMIN_EMAIL;

      if(!name || !mail || !pass || !confirm){
        showMsg("Remplis tous les champs.");
        return;
      }

      if(pass.length < 6){
        showMsg("Le mot de passe doit contenir au moins 6 caractères.");
        return;
      }

      if(pass !== confirm){
        showMsg("Les mots de passe ne correspondent pas.");
        return;
      }

      if(!isAdmin && !inviteOk){
        showMsg("Invitation invalide.");
        return;
      }

      if(!isAdmin && inviteData?.email && mail !== String(inviteData.email).toLowerCase()){
        showMsg("Tu dois utiliser l’adresse email prévue dans l’invitation.");
        return;
      }

      signupBtn.disabled = true;
      showMsg("Création du compte en cours...", true);

      try{
        const cred = await createUserWithEmailAndPassword(auth, mail, pass);
        const user = cred.user;

        await updateProfile(user, { displayName: name });

        if(!isAdmin){
          await sendEmailVerification(user);
        }

        await set(ref(db, "users/" + user.uid), {
          uid: user.uid,
          displayName: name,
          email: mail,
          photoURL: "",
          bio: "",
          role: isAdmin ? "admin" : "member",
          accountStatus: isAdmin ? "approved" : "pending_admin_approval",
          approvedBy: isAdmin ? ADMIN_EMAIL : "",
          approvedAt: isAdmin ? Date.now() : 0,
          rejectedAt: 0,
          emailVerifiedAtSignup: isAdmin,
          createdAt: Date.now(),
          updatedAt: Date.now(),
          signupInviteToken: isAdmin ? "" : inviteToken,
          privacy: {
            hideEmail: true,
            hideBio: false,
            hidePresence: false
          },
          presence: {
            online: false,
            lastSeen: Date.now()
          }
        });

        if(!isAdmin){
          await update(ref(db, "signupInvites/" + inviteToken), {
            used: true,
            usedByUid: user.uid,
            usedByEmail: mail,
            usedAt: Date.now()
          });

          await set(ref(db, "accountApprovals/" + user.uid), {
            uid: user.uid,
            displayName: name,
            email: mail,
            status: "pending_admin_approval",
            createdAt: Date.now(),
            inviteToken: inviteToken,
            inviteCreatedBy: inviteData?.createdBy || "",
            emailVerified: false
          });

          showMsg("Compte créé. Vérifie ton email puis attends la validation admin.", true);
        } else {
          showMsg("Compte admin créé avec succès. Tu peux maintenant te connecter.", true);
        }

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2200);

      } catch(e){
        console.error(e);

        if(e.code === "auth/email-already-in-use"){
          if (isAdmin) {
            showMsg("Le compte admin existe déjà. Va directement sur la page de connexion.");
          } else {
            showMsg("Cette adresse email est déjà utilisée.");
          }
        } else if(e.code === "auth/invalid-email"){
          showMsg("Adresse email invalide.");
        } else if(e.code === "auth/weak-password"){
          showMsg("Mot de passe trop faible.");
        } else {
          showMsg(`Erreur réelle : ${e.code || "inconnue"} ${e.message || ""}`);
        }
      } finally {
        signupBtn.disabled = false;
      }
    });

    checkInvite();
  </script>
</body>
</html>
