  function resetActivityTimer() {
    localStorage.setItem(LAST_ACTIVITY_KEY, String(Date.now()));
    clearTimeout(activityTimeout);
    activityTimeout = setTimeout(async () => {

    });

  function initials(name = "", email = "") {
    const s = (name || email || "U").trim();
    const parts = s.split(" ").filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return s.slice(0, 2).toUpperCase();
  }

  function escapeHtml(text = "") {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function formatDate(ts) {
    if (!ts) return "";
    return new Date(ts).toLocaleString("fr-FR", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function randomRoomId(length = 14) {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
    let out = "";
    const arr = new Uint32Array(length);
    window.crypto.getRandomValues(arr);
    for (let i = 0; i < length; i++) out += chars[arr[i] % chars.length];
    return out;
  }

  function showToast(message, options = {}) {
    const host = ensureToastHost();
    const card = document.createElement("div");
    card.style.background = "#ffffff";
    card.style.border = "1px solid #d9e5f2";
    card.style.borderRadius = "18px";
    card.style.boxShadow = "0 16px 36px rgba(7,31,66,0.16)";
    card.style.padding = "14px";
    card.style.color = "#0b2340";

    const body = document.createElement("div");
    body.style.fontSize = "14px";
    body.style.fontWeight = "700";
    body.style.lineHeight = "1.55";
    body.textContent = message;
    card.appendChild(body);

    if (options.actions?.length) {
      const row = document.createElement("div");
      row.style.display = "flex";
      row.style.gap = "8px";
      row.style.flexWrap = "wrap";
      row.style.marginTop = "10px";

      options.actions.forEach(action => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = action.label;
        btn.style.border = "none";
        btn.style.borderRadius = "12px";
        btn.style.padding = "10px 12px";
        btn.style.fontWeight = "800";
        btn.style.cursor = "pointer";
        btn.style.background = action.kind === "danger" ? "#df4b4b" : "#0f4d92";
        btn.style.color = "#fff";
        btn.addEventListener("click", async () => {
          try {
            await action.onClick?.();
          } catch (e) {
            console.error(e);
          }
          card.remove();
        });
        row.appendChild(btn);
      });

      const closeBtn = document.createElement("button");
      closeBtn.type = "button";
      closeBtn.textContent = "Fermer";
      closeBtn.style.border = "none";
      closeBtn.style.borderRadius = "12px";
      closeBtn.style.padding = "10px 12px";
      closeBtn.style.fontWeight = "800";
      closeBtn.style.cursor = "pointer";
      closeBtn.style.background = "#eef4fb";
      closeBtn.style.color = "#0b2340";
      closeBtn.addEventListener("click", () => card.remove());
      row.appendChild(closeBtn);

      card.appendChild(row);
    }

    const duration = Number(options.duration || 6000);
    host.appendChild(card);

    if (!options.persist) {
      setTimeout(() => {
        if (card.isConnected) card.remove();
      }, duration);
    }
  }

  function renderRecentRooms(items = []) {
    if (!items.length) {
      recentRoomsList.innerHTML = `<div class="empty-note">Aucun lien récent encore valide.</div>`;
      return;
    }

    recentRoomsList.innerHTML = items.map(room => `
      <div class="recent-link-item">
        <div class="recent-link-title">${escapeHtml(room.title || "Salle de réunion")}</div>
        <div class="recent-link-sub">
          Créée : ${escapeHtml(formatDate(room.createdAt) || "—")}<br>
          Expire : ${escapeHtml(formatDate(room.expiresAt) || "—")}
        </div>
        <div class="recent-link-actions">
          <button class="link-btn primary" type="button" data-open-room="${room.roomId}">Rejoindre</button>
          <button class="link-btn" type="button" data-copy-room="${room.roomId}">Copier lien</button>
        </div>
      </div>
    `).join("");

    document.querySelectorAll("[data-open-room]").forEach(btn => {
      btn.addEventListener("click", () => {
        const roomId = btn.dataset.openRoom;
        if (!roomId) return;
        window.location.href = `meeting-room.html?room=${encodeURIComponent(roomId)}`;
      });
    });

    document.querySelectorAll("[data-copy-room]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const roomId = btn.dataset.copyRoom;
        if (!roomId) return;
        const link = buildRoomLink(roomId);
        try {
          await navigator.clipboard.writeText(link);
          alert("Lien copié.");
        } catch (_) {
          alert("Impossible de copier automatiquement.");
        }
      });
    });
  }

  function subscribeRecentRooms() {
    if (recentRoomsUnsub) recentRoomsUnsub();

    recentRoomsUnsub = onValue(ref(db, "meetingRooms"), (snap) => {
      const data = snap.val() || {};
      const items = Object.values(data)
        .filter(room => room && room.roomId)
        .filter(room => room.status !== "closed")
        .filter(room => Number(room.expiresAt || 0) > Date.now())
        .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0))
        .slice(0, 2);

      renderRecentRooms(items);
    });
  }

  async function bindPresence() {
    if (presenceStarted || !currentUser) return;
    presenceStarted = true;

    const connectedRef = ref(db, ".info/connected");
    const presenceRef = ref(db, `users/${currentUser.uid}/presence`);

    onValue(connectedRef, async (snap) => {
      if (snap.val() === true) {
        try {
          await onDisconnect(presenceRef).set({
            online: false,
            lastSeen: Date.now(),
            roomId: ""
          });

          await set(presenceRef, {
            online: true,
            lastSeen: Date.now(),
            roomId: currentRoomId || ""
          });
        } catch (e) {
          console.error(e);
        }
      }
    });
  }

        roomId: joinedRoom ? currentRoomId : ""

    }).catch(() => {});
  }

  function stopMeter() {
    if (meterAnimationFrame) {
      cancelAnimationFrame(meterAnimationFrame);
      meterAnimationFrame = null;
    }
    if (mediaSourceNode) {
      try { mediaSourceNode.disconnect(); } catch (_) {}
      mediaSourceNode = null;
    }
    analyser = null;
    if (audioContext) {
      try { audioContext.close(); } catch (_) {}
      audioContext = null;
    }
    micMeterFill.style.width = "0%";
  }

  function startMeter(stream) {
    stopMeter();

    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      mediaSourceNode = audioContext.createMediaStreamSource(stream);
      mediaSourceNode.connect(analyser);

      const dataArray = new Uint8Array(analyser.frequencyBinCount);

      const tick = () => {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        const avg = sum / dataArray.length;
        const pct = Math.max(2, Math.min(100, Math.round((avg / 255) * 100)));
        micMeterFill.style.width = `${pct}%`;
        meterAnimationFrame = requestAnimationFrame(tick);
      };

      tick();
    } catch (e) {
      console.error(e);
    }
  }

  function forceTracksEnabled(stream) {
    if (!stream) return;
    micEnabled = true;
    camEnabled = true;
    stream.getAudioTracks().forEach(track => {
      track.enabled = true;
    });
    stream.getVideoTracks().forEach(track => {
      track.enabled = true;
    });
    updateMediaButtons();
  }

  function getVideoGridMarkup() {
    let html = "";

    if (localStream) {
      html += `
        <div class="video-tile">
          <h4>
            <span>Toi</span>
            <span>${screenStream ? "Partage actif" : ""}</span>
          </h4>
          <video id="localVideoTile" autoplay muted playsinline></video>
        </div>
      `;
    }

    for (const [uid] of remoteStreams.entries()) {
      const meta = participantsCache[uid] || {};
      html += `
        <div class="video-tile">
          <h4>
            <span>${escapeHtml(meta.displayName || meta.email || uid)}</span>
            <span>${meta.isSharingScreen ? "Écran partagé" : ""}</span>
          </h4>
          <video data-remote-video="${uid}" autoplay playsinline></video>
        </div>
      `;
    }

    return html;
  }

  function renderVideoStage() {
    const hasAnyVideo = !!localStream || remoteStreams.size > 0;

    if (!hasAnyVideo) {
      videoGrid.classList.add("hidden");
      videoPlaceholder.classList.remove("hidden");
      videoGrid.innerHTML = "";
      return;
    }

    videoPlaceholder.classList.add("hidden");
    videoGrid.classList.remove("hidden");
    videoGrid.innerHTML = getVideoGridMarkup();

    const localEl = document.getElementById("localVideoTile");
    if (localEl && localStream) {
      localEl.srcObject = localStream;
      localEl.muted = true;
      localEl.play().catch(() => {});
    }

    for (const [uid, stream] of remoteStreams.entries()) {
      const remoteEl = document.querySelector(`[data-remote-video="${uid}"]`);
      if (remoteEl) {
        remoteEl.srcObject = stream;
        remoteEl.autoplay = true;
        remoteEl.playsInline = true;
        remoteEl.muted = false;
        remoteEl.play().catch(() => {});
      }
    }
  }

  function renderScreenShareUI() {
    const activeScreenSharer = Object.values(participantsCache).find(p => p && p.isSharingScreen);
    if (!activeScreenSharer) {
      screenShareBox.classList.remove("active");
      screenShareVideo.srcObject = null;
      return;
    }

    screenShareBox.classList.add("active");
    screenShareLabel.textContent = `Partage d’écran : ${activeScreenSharer.displayName || activeScreenSharer.email || "Participant"}`;

    if (activeScreenSharer.uid === currentUser?.uid && screenStream) {
      screenShareVideo.srcObject = screenStream;
    } else if (remoteStreams.has(activeScreenSharer.uid)) {
      screenShareVideo.srcObject = remoteStreams.get(activeScreenSharer.uid);
    } else {
      screenShareVideo.srcObject = null;
    }
  }

  async function startLocalMedia() {
    if (localStream) {
      forceTracksEnabled(localStream);
      renderVideoStage();
      startMeter(localStream);
      mediaTestStatus.textContent = "Caméra et micro actifs.";
      updateVisibilityByRole();
      return true;
    }

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        },
        video: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 24, max: 30 }
        }
      });

      forceTracksEnabled(localStream);
      startMeter(localStream);
      mediaTestStatus.textContent = "Caméra et micro actifs.";
      renderVideoStage();
      updateVisibilityByRole();

      if (joinedRoom) {
        await replaceTracksOnPeers();
      }

      return true;
    } catch (error) {
      console.error(error);
      mediaTestStatus.textContent = "Impossible d’accéder à la caméra ou au micro.";
      alert("Impossible d’accéder à la caméra ou au micro.");
      return false;
    }
  }

  async function stopScreenShare() {
    if (!screenStream) return;

    try {
      screenStream.getTracks().forEach(track => track.stop());
    } catch (_) {}

    screenStream = null;
    shareScreenBtn.classList.remove("hidden");
    stopShareScreenBtn.classList.add("hidden");

    if (currentRoomId && currentUser && joinedRoom) {
      await update(ref(db, participantPath(currentRoomId, currentUser.uid)), {
        isSharingScreen: false,
        updatedAt: Date.now()
      }).catch(() => {});
    }

    renderScreenShareUI();
    await replaceTracksOnPeers();
    renderVideoStage();
  }

  function stopLocalMedia() {
    if (localStream) {
      try { localStream.getTracks().forEach(track => track.stop()); } catch (_) {}
    }
    localStream = null;
    micEnabled = true;
    camEnabled = true;
    updateMediaButtons();
    stopMeter();
    mediaTestStatus.textContent = "Test arrêté.";

    stopScreenShare().catch(() => {});
    renderVideoStage();
    updateVisibilityByRole();
  }

  function updateMediaButtons() {
    toggleMicBtn.textContent = micEnabled ? "Micro ON" : "Micro OFF";
    toggleCamBtn.textContent = camEnabled ? "Caméra ON" : "Caméra OFF";
  }

  function updateVisibilityByRole() {
    if (isOwnerEmail()) {
      meetingNavLink.classList.remove("hidden");
      ownerPanel.classList.remove("hidden");
      guestInfoPanel.classList.add("hidden");
    } else {
      ownerPanel.classList.add("hidden");
      guestInfoPanel.classList.remove("hidden");
      if (getRoomQueryParam()) {
        meetingNavLink.classList.remove("hidden");
      } else {
        meetingNavLink.classList.add("hidden");
      }
    }

    waitingRoomPanel.classList.toggle("hidden", !isRoomOwner());
    joinCurrentRoomBtn.classList.toggle("hidden", !isRoomOwner() || !currentRoomId);
    toggleMicBtn.classList.toggle("hidden", !localStream);
    toggleCamBtn.classList.toggle("hidden", !localStream);
    leaveRoomBtn.classList.toggle("hidden", !joinedRoom && !isInWaitingRoom);
    shareScreenBtn.classList.toggle("hidden", !joinedRoom || !localStream || !!screenStream);
    stopShareScreenBtn.classList.toggle("hidden", !screenStream);
    toggleMiniModeBtn.classList.toggle("hidden", !localStream);
    approveAllBtn.classList.toggle("hidden", !isRoomOwner());
    closeRoomBtn.classList.toggle("hidden", !isRoomOwner());
  }

  function renderRoomMeta() {
    if (!currentRoomMeta) {
      roomMeta.innerHTML = `<div class="empty-note">Aucune salle ouverte.</div>`;
      meetingTitle.textContent = "Salle de réunion professionnelle";
      meetingSubtitle.textContent = "Le propriétaire crée le lien et l’envoie aux participants.";
      stageTitle.textContent = "Salle non rejointe";
      stageText.textContent = "Cette page gère l’accès, l’expiration, la salle d’attente et l’organisation de la réunion.";
      roomDot.className = "dot";
      roomStatusText.textContent = "Aucune salle";
      if (!isOwnerEmail()) guestJoinNote.style.display = "none";
      updateVisibilityByRole();
      renderVideoStage();
      renderScreenShareUI();
      return;
    }

    const expired = Date.now() > (currentRoomMeta.expiresAt || 0);
    const closed = currentRoomMeta.status === "closed";
    const waitingEnabled = !!currentRoomMeta.waitingRoomEnabled;

    meetingTitle.textContent = currentRoomMeta.title || "Salle de réunion";
    meetingSubtitle.textContent = isRoomOwner()
      ? "Tu es le propriétaire de cette salle."
      : `Salle créée par ${currentRoomMeta.ownerDisplayName || "l’administrateur"}.`;

    roomMeta.innerHTML = `
      <div style="line-height:1.7;">
        <div><strong>Titre :</strong> ${escapeHtml(currentRoomMeta.title || "—")}</div>
        <div><strong>Créée le :</strong> ${escapeHtml(formatDate(currentRoomMeta.createdAt) || "—")}</div>
        <div><strong>Expire le :</strong> ${escapeHtml(formatDate(currentRoomMeta.expiresAt) || "—")}</div>
        <div><strong>Salle d’attente :</strong> ${waitingEnabled ? "Oui" : "Non"}</div>
        <div><strong>Mot de passe :</strong> ${currentRoomMeta.hasPassword ? "Oui" : "Non"}</div>
        <div><strong>Statut :</strong> ${closed ? "Fermée" : expired ? "Expirée" : "Ouverte"}</div>
        <div><strong>Capacité conseillée :</strong> ${MAX_PARTICIPANTS} participants maximum</div>
      </div>
    `;

    if (closed) {
      roomDot.className = "dot red";
      roomStatusText.textContent = "Salle fermée";
      stageTitle.textContent = "Salle fermée";
      stageText.textContent = "Cette salle a été fermée par le propriétaire.";
      joinedRoom = false;
      isInWaitingRoom = false;
      closeAllPeers();
      stopLocalMedia();
      updateVisibilityByRole();
      renderVideoStage();
      renderScreenShareUI();
      return;
    }

    if (expired) {
      roomDot.className = "dot red";
      roomStatusText.textContent = "Lien expiré";
      stageTitle.textContent = "Lien expiré";
      stageText.textContent = "Le délai de validité de cette salle est dépassé.";
      joinedRoom = false;
      isInWaitingRoom = false;
      closeAllPeers();
      stopLocalMedia();
      updateVisibilityByRole();
      renderVideoStage();
      renderScreenShareUI();
      return;
    }

    if (joinedRoom) {
      roomDot.className = "dot online";
      roomStatusText.textContent = "Salle rejointe";
      stageTitle.textContent = "Réunion active";
      stageText.textContent = isRoomOwner()
        ? "Tu gères actuellement cette salle. Les invités peuvent entrer et revenir plus tard sans nouvelle autorisation si le lien est encore valide."
        : "Tu es dans la salle. Si tu quittes, tu peux revenir automatiquement avec le même lien tant que la réunion n’a pas expiré.";
    } else if (isInWaitingRoom) {
      roomDot.className = "dot warn";
      roomStatusText.textContent = "En salle d’attente";
      stageTitle.textContent = "En attente d’approbation";
      stageText.textContent = "Le propriétaire doit encore t’autoriser à entrer. Tu peux déjà tester ta caméra et ton micro.";
    } else {
      roomDot.className = "dot warn";
      roomStatusText.textContent = "Salle ouverte";
      stageTitle.textContent = "Salle prête à être rejointe";
      stageText.textContent = "La salle est disponible. Tu peux préparer et tester ton matériel avant d’entrer.";
    }

    if (!isOwnerEmail()) {
      guestJoinNote.style.display = "block";
      guestJoinNote.textContent = waitingEnabled
        ? "Cette salle utilise une salle d’attente. Une fois accepté une première fois, tu pourras revenir avec le même lien sans nouvelle autorisation."
        : "Tu peux rejoindre directement cette salle tant que le lien est valide.";
    }

    updateVisibilityByRole();
    renderVideoStage();
    renderScreenShareUI();
  }

  function clearRoomRealtimeSubscriptions() {
    roomRealtimeUnsubs.forEach(unsub => {
      try { unsub(); } catch (_) {}
    });
    roomRealtimeUnsubs = [];

    signalingUnsubs.forEach(unsub => {
      try { unsub(); } catch (_) {}
    });
    signalingUnsubs = [];

    subscribedRoomId = "";
    seenWaitingRequestIds.clear();
  }

  function subscribeRoomRealtime(roomId) {
    return onValue(ref(db, roomPath(roomId)), async (snap) => {
      if (!snap.exists()) {
        currentRoomMeta = null;
        renderRoomMeta();
        return;
      }

      currentRoomMeta = snap.val() || {};
      renderRoomMeta();

      const expired = Date.now() > (currentRoomMeta.expiresAt || 0);
      const closed = currentRoomMeta.status === "closed";

      if ((expired || closed) && joinedRoom) {
        joinedRoom = false;
        isInWaitingRoom = false;
        closeAllPeers();
        stopLocalMedia();
        await syncPresenceRoomId();
        renderRoomMeta();
      }
    });
  }

  function subscribeParticipants(roomId) {
    return onValue(ref(db, `${roomPath(roomId)}/participants`), async (snap) => {
      const data = snap.val() || {};
      participantsCache = data;
      const items = Object.values(data);

      if (!items.length) {
        participantsList.innerHTML = `<div class="empty-note">Aucun participant pour le moment.</div>`;
      } else {
        participantsList.innerHTML = items.map(item => `
          <div class="mini-item">
            <div class="mini-item-head">
              <div>
                <div class="mini-name">${escapeHtml(item.displayName || "Utilisateur")}</div>
                <div class="mini-sub">${escapeHtml(item.email || "")}</div>
              </div>
              <span class="status-pill" style="background:#ecfdf3;color:#166534;">
                <span class="dot online"></span>présent
              </span>
            </div>
            <div class="mini-sub">Entrée : ${escapeHtml(formatDate(item.joinedAt) || "—")}</div>
            <div class="mini-sub">${item.isSharingScreen ? "Partage d’écran en cours" : "Aucun partage d’écran"}</div>
          </div>
        `).join("");
      }

      const amIParticipant = !!data[currentUser?.uid];

      if (amIParticipant && !joinedRoom) {
        joinedRoom = true;
        isInWaitingRoom = false;
        await startLocalMedia();
        forceTracksEnabled(localStream);
        await syncPresenceRoomId();
        showToast("Tu as été admis ou réintégré dans la salle.");
      }

      if (!amIParticipant && joinedRoom && currentUser && !isRoomOwner()) {
        joinedRoom = false;
        isInWaitingRoom = false;
        closeAllPeers();
        stopLocalMedia();
        await syncPresenceRoomId();
      }

      renderVideoStage();
      renderScreenShareUI();
      updateVisibilityByRole();

      if (joinedRoom && localStream) {
        const others = Object.keys(data)
          .filter(uid => uid !== currentUser.uid)
          .slice(0, MAX_PARTICIPANTS - 1);

        for (const uid of others) {
          if (!peerConnections.has(uid)) {
            await ensurePeerConnection(uid, shouldInitiateOffer(uid));
          }
        }

        for (const uid of [...peerConnections.keys()]) {
          if (!others.includes(uid)) {
            closePeer(uid);
          }
        }
      } else {
        closeAllPeers();
      }
    });
  }

  function subscribeWaiting(roomId) {
    return onValue(ref(db, `${roomPath(roomId)}/waiting`), (snap) => {
      const data = snap.val() || {};
      waitingCache = data;
      const items = Object.entries(data).map(([uid, val]) => ({ uid, ...(val || {}) }));

      if (!items.length) {
        waitingList.innerHTML = `<div class="empty-note">Aucune personne en attente.</div>`;
      } else {
        waitingList.innerHTML = items.map(item => `
          <div class="mini-item">
            <div class="mini-item-head">
              <div>
                <div class="mini-name">${escapeHtml(item.displayName || "Utilisateur")}</div>
                <div class="mini-sub">${escapeHtml(item.email || "")}</div>
              </div>
              <span class="status-pill" style="background:#fff3e8;color:#b45309;">
                <span class="dot warn"></span>en attente
              </span>
            </div>
            <div class="mini-sub">Demande : ${escapeHtml(formatDate(item.requestedAt) || "—")}</div>
            ${isRoomOwner() ? `
              <div class="action-row">
                <button class="main-btn" type="button" data-accept="${item.uid}">Accepter</button>
                <button class="danger-btn" type="button" data-refuse="${item.uid}">Refuser</button>
              </div>
            ` : ""}
          </div>
        `).join("");
      }

      if (data[currentUser?.uid] && !joinedRoom) {
        isInWaitingRoom = true;
      }

      if (!data[currentUser?.uid] && isInWaitingRoom && !participantsCache[currentUser?.uid]) {
        isInWaitingRoom = false;
      }

      if (isRoomOwner()) {
        items.forEach(item => {
          const key = `${roomId}_${item.uid}`;
          if (!seenWaitingRequestIds.has(key)) {
            seenWaitingRequestIds.add(key);
            showToast(
              `${item.displayName || "Un utilisateur"} demande à entrer dans la réunion.`,
              {
                persist: true,
                actions: [
                  {
                    label: "Accepter",
                    onClick: async () => acceptWaitingUser(item.uid)
                  },
                  {
                    label: "Refuser",
                    kind: "danger",
                    onClick: async () => refuseWaitingUser(item.uid)
                  }
                ]
              }
            );
          }
        });

        document.querySelectorAll("[data-accept]").forEach(btn => {
          btn.addEventListener("click", async () => {
            await acceptWaitingUser(btn.dataset.accept);
          });
        });

        document.querySelectorAll("[data-refuse]").forEach(btn => {
          btn.addEventListener("click", async () => {
            await refuseWaitingUser(btn.dataset.refuse);
          });
        });
      }

      renderRoomMeta();
      updateVisibilityByRole();
    });
  }

  function subscribeApproved(roomId) {
    return onValue(ref(db, `${roomPath(roomId)}/approved`), (snap) => {
      approvedCache = snap.val() || {};
    });
  }

  function subscribeChat(roomId) {
    return onValue(ref(db, chatPath(roomId)), (snap) => {
      const data = snap.val() || {};
      const items = Object.values(data).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      if (!items.length) {
        chatMessages.innerHTML = `
          <div class="chat-msg">
            <div class="chat-msg-head"><span>Système</span><span>—</span></div>
            <div class="chat-msg-body">Aucun message pour le moment.</div>
          </div>
        `;
        return;
      }

      chatMessages.innerHTML = items.map(msg => `
        <div class="chat-msg">
          <div class="chat-msg-head">
            <span>${escapeHtml(msg.displayName || "Utilisateur")}</span>
            <span>${escapeHtml(formatDate(msg.createdAt) || "")}</span>
          </div>
          <div class="chat-msg-body">${escapeHtml(msg.text || "")}</div>
        </div>
      `).join("");

      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  function startRoomRealtimeSubscriptions(roomId) {
    if (!roomId) return;
    if (subscribedRoomId === roomId) return;

    clearRoomRealtimeSubscriptions();
    subscribedRoomId = roomId;

    roomRealtimeUnsubs.push(subscribeRoomRealtime(roomId));
    roomRealtimeUnsubs.push(subscribeParticipants(roomId));
    roomRealtimeUnsubs.push(subscribeWaiting(roomId));
    roomRealtimeUnsubs.push(subscribeApproved(roomId));
    roomRealtimeUnsubs.push(subscribeChat(roomId));
    subscribeSignals(roomId);
  }

  async function restoreMyRoomState(roomId) {
    if (!roomId || !currentUser) return;

    try {
      const [participantSnap, waitingSnap, approvedSnap] = await Promise.all([
        get(ref(db, participantPath(roomId, currentUser.uid))),
        get(ref(db, waitingPath(roomId, currentUser.uid))),
        get(ref(db, approvedPath(roomId, currentUser.uid)))
      ]);

      if (approvedSnap.exists()) {
        approvedCache[currentUser.uid] = approvedSnap.val() || {};
      }

      if (participantSnap.exists()) {
        joinedRoom = true;
        isInWaitingRoom = false;
        await startLocalMedia();
        forceTracksEnabled(localStream);
        await syncPresenceRoomId();
        renderRoomMeta();
        updateVisibilityByRole();
        return;
      }

      if (waitingSnap.exists()) {
        joinedRoom = false;
        isInWaitingRoom = true;
        renderRoomMeta();
        updateVisibilityByRole();
        return;
      }

      joinedRoom = false;
      isInWaitingRoom = false;
      renderRoomMeta();
      updateVisibilityByRole();
    } catch (e) {
      console.error(e);
    }
  }

  async function createRoom() {
    if (!isOwnerEmail()) return;

    const title = roomTitleInput.value.trim() || "Salle de réunion";
    const expiresInMinutes = Number(roomExpiryInput.value || "60");
    const roomPassword = roomPasswordInput.value;
    const waitingEnabled = !!waitingRoomInput.checked;

    const roomId = randomRoomId();
    const now = Date.now();
    const expiresAt = now + expiresInMinutes * 60 * 1000;

    const roomData = {
      roomId,
      title,
      ownerId: currentUser.uid,
      ownerEmail: currentUser.email || "",
      ownerDisplayName: getProfileName(),
      createdAt: now,
      updatedAt: now,
      expiresAt,
      waitingRoomEnabled: waitingEnabled,
      hasPassword: !!roomPassword,
      password: roomPassword || "",
      status: "open"
    };

    createRoomBtn.disabled = true;

    try {
      await set(ref(db, roomPath(roomId)), roomData);

      currentRoomId = roomId;
      currentRoomMeta = roomData;

      const shareLink = buildRoomLink(roomId);
      lastGeneratedRoomLink = shareLink;
      roomLinkBox.style.display = "block";
      roomLinkBox.textContent = shareLink;
      copyRoomLinkBtn.classList.remove("hidden");

      try {
        history.replaceState({}, "", `meeting-room.html?room=${encodeURIComponent(roomId)}`);
      } catch (_) {}

      startRoomRealtimeSubscriptions(roomId);
      await startLocalMedia();
      await joinAsApprovedParticipant();

      renderRoomMeta();
      updateVisibilityByRole();
      showToast("Salle créée. Les personnes autorisées pourront revenir avec le même lien tant qu’il reste valide.");
    } catch (error) {
      console.error(error);
      alert("Impossible de créer la salle.");
    } finally {
      createRoomBtn.disabled = false;
    }
  }

  async function loadRoom(roomId) {
    if (!roomId) {
      currentRoomId = "";
      currentRoomMeta = null;
      clearRoomRealtimeSubscriptions();
      renderRoomMeta();
      updateVisibilityByRole();
      return;
    }

    currentRoomId = roomId;

    const snap = await get(ref(db, roomPath(roomId)));
    if (!snap.exists()) {
      alert("Cette salle n’existe pas ou n’est plus disponible.");
      return;
    }

    currentRoomMeta = snap.val() || {};
    startRoomRealtimeSubscriptions(roomId);
    await restoreMyRoomState(roomId);

    renderRoomMeta();
    updateVisibilityByRole();

    if (Date.now() > (currentRoomMeta.expiresAt || 0)) {
      alert("Le lien de réunion a expiré.");
      return;
    }

    if (currentRoomMeta.status === "closed") {
      alert("Cette salle a été fermée par l’administrateur.");
      return;
    }
  }

  async function acceptWaitingUser(uid) {
    if (!isRoomOwner() || !currentRoomId || !uid) return;

    const snap = await get(ref(db, waitingPath(currentRoomId, uid)));
    if (!snap.exists()) return;
    const data = snap.val() || {};

    const participantCount = Object.keys(participantsCache || {}).length;
    if (!participantsCache[uid] && participantCount >= MAX_PARTICIPANTS) {
      alert(`Capacité atteinte. Maximum conseillé: ${MAX_PARTICIPANTS}.`);
      return;
    }

    await set(ref(db, approvedPath(currentRoomId, uid)), {
      uid,
      displayName: data.displayName || "Utilisateur",
      email: data.email || "",
      approvedAt: Date.now(),
      approvedBy: currentUser.uid
    });

    await set(ref(db, participantPath(currentRoomId, uid)), {
      uid,
      displayName: data.displayName || "Utilisateur",
      email: data.email || "",
      joinedAt: Date.now(),
      isSharingScreen: false,
      updatedAt: Date.now()
    });

    await remove(ref(db, waitingPath(currentRoomId, uid)));
  }

  async function refuseWaitingUser(uid) {
    if (!isRoomOwner() || !currentRoomId || !uid) return;
    await remove(ref(db, waitingPath(currentRoomId, uid)));
  }

  async function approveAllWaiting() {
    if (!isRoomOwner() || !currentRoomId) return;

    const snap = await get(ref(db, `${roomPath(currentRoomId)}/waiting`));
    const data = snap.val() || {};
    const entries = Object.entries(data);

    for (const [uid, val] of entries) {
      const participantCount = Object.keys(participantsCache || {}).length;
      if (!participantsCache[uid] && participantCount >= MAX_PARTICIPANTS) break;

      await set(ref(db, approvedPath(currentRoomId, uid)), {
        uid,
        displayName: val.displayName || "Utilisateur",
        email: val.email || "",
        approvedAt: Date.now(),
        approvedBy: currentUser.uid
      });

      await set(ref(db, participantPath(currentRoomId, uid)), {
        uid,
        displayName: val.displayName || "Utilisateur",
        email: val.email || "",
        joinedAt: Date.now(),
        isSharingScreen: false,
        updatedAt: Date.now()
      });

      await remove(ref(db, waitingPath(currentRoomId, uid)));
    }
  }

  async function joinAsApprovedParticipant() {
    if (!currentRoomId || !currentUser) return;

    const mediaOk = await startLocalMedia();
    if (!mediaOk) return;

    forceTracksEnabled(localStream);

    const participantCount = Object.keys(participantsCache || {}).length;
    if (!participantsCache[currentUser.uid] && participantCount >= MAX_PARTICIPANTS) {
      alert(`La réunion a atteint la capacité conseillée (${MAX_PARTICIPANTS}).`);
      return;
    }

    await set(ref(db, approvedPath(currentRoomId, currentUser.uid)), {
      uid: currentUser.uid,
      displayName: getProfileName(),
      email: currentUser.email || "",
      approvedAt: approvedCache[currentUser.uid]?.approvedAt || Date.now(),
      approvedBy: approvedCache[currentUser.uid]?.approvedBy || (isRoomOwner() ? currentUser.uid : currentUser.uid)
    });

    await set(ref(db, participantPath(currentRoomId, currentUser.uid)), {
      uid: currentUser.uid,
      displayName: getProfileName(),
      email: currentUser.email || "",
      joinedAt: Date.now(),
      isSharingScreen: false,
      updatedAt: Date.now()
    });

    joinedRoom = true;
    isInWaitingRoom = false;
    toggleMiniMode(false);

    await syncPresenceRoomId();
    renderRoomMeta();
    updateVisibilityByRole();

    const others = Object.keys(participantsCache || {})
      .filter(uid => uid !== currentUser.uid)
      .slice(0, MAX_PARTICIPANTS - 1);

    for (const uid of others) {
      await ensurePeerConnection(uid, shouldInitiateOffer(uid));
    }
  }

  async function leaveCurrentRoom() {
    if (!currentRoomId || !currentUser) return;

    await remove(ref(db, participantPath(currentRoomId, currentUser.uid))).catch(() => {});
    await remove(ref(db, waitingPath(currentRoomId, currentUser.uid))).catch(() => {});

    joinedRoom = false;
    isInWaitingRoom = false;

    await stopScreenShare().catch(() => {});
    closeAllPeers();
    stopLocalMedia();
    toggleMiniMode(false);

    await syncPresenceRoomId();
    renderRoomMeta();
    updateVisibilityByRole();
  }

  async function joinRoomFlow() {
    if (!currentRoomMeta || !currentRoomId || !currentUser) return;

    if (joinedRoom) {
      renderRoomMeta();
      return;
    }

    if (Date.now() > (currentRoomMeta.expiresAt || 0)) {
      alert("Le lien de réunion a expiré.");
      return;
    }

    if (currentRoomMeta.status === "closed") {
      alert("Cette salle a été fermée.");
      return;
    }

    const mediaOk = await startLocalMedia();
    if (!mediaOk) return;

    forceTracksEnabled(localStream);

    if (currentRoomMeta.hasPassword) {
      const pass = window.prompt("Cette réunion est protégée. Entre le mot de passe :");
      if (pass === null) return;
      if (pass !== String(currentRoomMeta.password || "")) {
        alert("Mot de passe incorrect.");
        return;
      }
    }

    const alreadyApproved = !!approvedCache[currentUser.uid];

    if (alreadyApproved) {
      await joinAsApprovedParticipant();
      showToast("Retour dans la réunion autorisé automatiquement. Caméra et micro réactivés.");
      return;
    }

    if (currentRoomMeta.waitingRoomEnabled && !isRoomOwner()) {
      await set(ref(db, waitingPath(currentRoomId, currentUser.uid)), {
        uid: currentUser.uid,
        displayName: getProfileName(),
        email: currentUser.email || "",
        requestedAt: Date.now()
      });

      isInWaitingRoom = true;
      joinedRoom = false;
      toggleMiniMode(false);
      renderRoomMeta();
      updateVisibilityByRole();
      showToast("Demande envoyée. Une fois accepté une première fois, tu pourras revenir directement.");
      return;
    }

    await joinAsApprovedParticipant();
  }

  async function closeRoom() {
    if (!isRoomOwner() || !currentRoomId) return;

    const ok = confirm("Fermer cette salle maintenant ?");
    if (!ok) return;

    await update(ref(db, roomPath(currentRoomId)), {
      status: "closed",
      updatedAt: Date.now()
    });

    joinedRoom = false;
    isInWaitingRoom = false;
    await stopScreenShare().catch(() => {});
    closeAllPeers();
    stopLocalMedia();
    toggleMiniMode(false);
    await syncPresenceRoomId();
    renderRoomMeta();
  }

  async function sendChatMessage() {
    const text = chatInput.value.trim();
    if (!text || !currentRoomId || !currentUser) return;

    if (!joinedRoom && !isRoomOwner() && !isInWaitingRoom) {
      alert("Tu dois avoir accès à la salle ou être en attente pour écrire ici.");
      return;
    }

    const newRef = push(ref(db, chatPath(currentRoomId)));
    await set(newRef, {
      uid: currentUser.uid,
      displayName: getProfileName(),
      text,
      createdAt: Date.now()
    });

    chatInput.value = "";
  }

  async function loadMyProfile(user) {
    const snap = await get(ref(db, "users/" + user.uid));
    currentProfile = snap.exists() ? (snap.val() || {}) : {};
    setAvatar(currentProfile, user);
    myName.textContent = currentProfile.displayName || user.displayName || "Utilisateur";
  }

  function toggleMic() {
    if (!localStream) return;
    micEnabled = !micEnabled;
    localStream.getAudioTracks().forEach(track => {
      track.enabled = micEnabled;
    });
    updateMediaButtons();
    mediaTestStatus.textContent = micEnabled ? "Micro actif." : "Micro coupé.";
  }

  function toggleCam() {
    if (!localStream) return;
    camEnabled = !camEnabled;
    localStream.getVideoTracks().forEach(track => {
      track.enabled = camEnabled;
    });
    updateMediaButtons();
    mediaTestStatus.textContent = camEnabled ? "Caméra active." : "Caméra coupée.";
  }

  function getOutgoingStream() {
    if (screenStream) {
      const merged = new MediaStream();
      screenStream.getVideoTracks().forEach(t => merged.addTrack(t));
      if (localStream) localStream.getAudioTracks().forEach(t => merged.addTrack(t));
      return merged;
    }
    return localStream;
  }

  async function replaceTracksOnPeers() {
    const stream = getOutgoingStream();
    if (!stream) return;

    for (const pc of peerConnections.values()) {
      const senders = pc.getSenders();

      const audioTrack = stream.getAudioTracks()[0] || null;
      const videoTrack = stream.getVideoTracks()[0] || null;

      const audioSender = senders.find(s => s.track && s.track.kind === "audio");
      const videoSender = senders.find(s => s.track && s.track.kind === "video");

      if (audioSender) {
        await audioSender.replaceTrack(audioTrack).catch(() => {});
      }
      if (videoSender) {
        await videoSender.replaceTrack(videoTrack).catch(() => {});
      }
    }

    renderVideoStage();
    renderScreenShareUI();
  }

  async function startScreenShare() {
    if (!joinedRoom) return;

    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: false
      });

      const track = screenStream.getVideoTracks()[0];
      if (track) {
        track.onended = async () => {
          await stopScreenShare();
        };
      }

      await update(ref(db, participantPath(currentRoomId, currentUser.uid)), {
        isSharingScreen: true,
        updatedAt: Date.now()
      }).catch(() => {});

      shareScreenBtn.classList.add("hidden");
      stopShareScreenBtn.classList.remove("hidden");

      await replaceTracksOnPeers();
      renderScreenShareUI();
    } catch (e) {
      console.error(e);
      alert("Impossible de partager l’écran.");
    }
  }

  function queuePendingCandidate(remoteUid, messageId, data) {
    if (!pendingCandidatesMap.has(remoteUid)) {
      pendingCandidatesMap.set(remoteUid, []);
    }
    pendingCandidatesMap.get(remoteUid).push({ messageId, data });
  }

  async function flushPendingCandidates(remoteUid) {
    const pc = peerConnections.get(remoteUid);
    if (!pc || !pc.remoteDescription) return;

    const queued = pendingCandidatesMap.get(remoteUid) || [];
    if (!queued.length) return;

    const remaining = [];

    for (const item of queued) {
      try {
        await pc.addIceCandidate(new RTCIceCandidate({
          candidate: item.data.candidate,
          sdpMid: item.data.sdpMid,
          sdpMLineIndex: item.data.sdpMLineIndex
        }));
        await remove(ref(db, `${signalRoot(currentRoomId)}/candidates/${item.messageId}`)).catch(() => {});
      } catch (e) {
        console.error(e);
        remaining.push(item);
      }
    }

    if (remaining.length) {
      pendingCandidatesMap.set(remoteUid, remaining);
    } else {
      pendingCandidatesMap.delete(remoteUid);
    }
  }

  async function ensurePeerConnection(remoteUid, shouldCreateOffer = false) {
    if (!joinedRoom || !localStream || !remoteUid || remoteUid === currentUser.uid) return;
    if (peerConnections.has(remoteUid)) return;

    const pc = new RTCPeerConnection(RTC_CONFIG);
    peerConnections.set(remoteUid, pc);
    makingOfferMap.set(remoteUid, false);

    const outgoingStream = getOutgoingStream();
    outgoingStream.getTracks().forEach(track => {
      pc.addTrack(track, outgoingStream);
    });

    const remoteStream = new MediaStream();
    remoteStreams.set(remoteUid, remoteStream);

    pc.ontrack = (event) => {
      if (event.streams && event.streams[0]) {
        remoteStreams.set(remoteUid, event.streams[0]);
      } else if (event.track) {
        const existing = remoteStreams.get(remoteUid) || new MediaStream();
        const already = existing.getTracks().find(t => t.id === event.track.id);
        if (!already) existing.addTrack(event.track);
        remoteStreams.set(remoteUid, existing);
      }

      renderVideoStage();
      renderScreenShareUI();
    };

    pc.onicecandidate = async (event) => {
      if (!event.candidate || !currentRoomId) return;
      const msgRef = push(ref(db, `${signalRoot(currentRoomId)}/candidates`));
      await set(msgRef, {
        from: currentUser.uid,
        to: remoteUid,
        candidate: event.candidate.candidate,
        sdpMid: event.candidate.sdpMid,
        sdpMLineIndex: event.candidate.sdpMLineIndex,
        createdAt: Date.now()
      });
    };

    pc.onconnectionstatechange = () => {
      if (["failed", "closed", "disconnected"].includes(pc.connectionState)) {
        renderVideoStage();
        renderScreenShareUI();
      }
    };

    if (shouldCreateOffer) {
      try {
        makingOfferMap.set(remoteUid, true);
        const offer = await pc.createOffer();
        if (pc.signalingState !== "stable") return;

        await pc.setLocalDescription(offer);

        const offerRef = push(ref(db, `${signalRoot(currentRoomId)}/offers`));
        await set(offerRef, {
          from: currentUser.uid,
          to: remoteUid,
          type: offer.type,
          sdp: offer.sdp,
          createdAt: Date.now()
        });
      } catch (e) {
        console.error(e);
      } finally {
        makingOfferMap.set(remoteUid, false);
      }
    }
  }

  async function handleOffer(messageId, data) {
    if (!data || data.to !== currentUser.uid || data.from === currentUser.uid) return;
    if (!joinedRoom) return;

    const remoteUid = data.from;
    let pc = peerConnections.get(remoteUid);

    if (!pc) {
      await ensurePeerConnection(remoteUid, false);
      pc = peerConnections.get(remoteUid);
    }
    if (!pc) return;

    try {
      const polite = !shouldInitiateOffer(remoteUid);
      const offerCollision = makingOfferMap.get(remoteUid) || pc.signalingState !== "stable";

      if (offerCollision && !polite) {
        return;
      }

      if (offerCollision) {
        await pc.setLocalDescription({ type: "rollback" }).catch(() => {});
      }

      await pc.setRemoteDescription(new RTCSessionDescription({
        type: data.type,
        sdp: data.sdp
      }));

      await flushPendingCandidates(remoteUid);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      const answerRef = push(ref(db, `${signalRoot(currentRoomId)}/answers`));
      await set(answerRef, {
        from: currentUser.uid,
        to: remoteUid,
        type: answer.type,
        sdp: answer.sdp,
        createdAt: Date.now()
      });

      await remove(ref(db, `${signalRoot(currentRoomId)}/offers/${messageId}`)).catch(() => {});
    } catch (e) {
      console.error(e);
    }
  }

  async function handleAnswer(messageId, data) {
    if (!data || data.to !== currentUser.uid || data.from === currentUser.uid) return;
    if (!joinedRoom) return;

    const pc = peerConnections.get(data.from);
    if (!pc) return;

    try {
      await pc.setRemoteDescription(new RTCSessionDescription({
        type: data.type,
        sdp: data.sdp
      }));

      await flushPendingCandidates(data.from);
      await remove(ref(db, `${signalRoot(currentRoomId)}/answers/${messageId}`)).catch(() => {});
    } catch (e) {
      console.error(e);
    }
  }

  async function handleCandidate(messageId, data) {
    if (!data || data.to !== currentUser.uid || data.from === currentUser.uid) return;
    if (!joinedRoom) return;

    const uniq = `${messageId}_${data.from}_${data.to}`;
    if (processedCandidateIds.has(uniq)) return;
    processedCandidateIds.add(uniq);

    let pc = peerConnections.get(data.from);
    if (!pc) {
      await ensurePeerConnection(data.from, false);
      pc = peerConnections.get(data.from);
    }

    if (!pc || !pc.remoteDescription) {
      queuePendingCandidate(data.from, messageId, data);
      return;
    }

    try {
      await pc.addIceCandidate(new RTCIceCandidate({
        candidate: data.candidate,
        sdpMid: data.sdpMid,
        sdpMLineIndex: data.sdpMLineIndex
      }));
      await remove(ref(db, `${signalRoot(currentRoomId)}/candidates/${messageId}`)).catch(() => {});
    } catch (e) {
      console.error(e);
      queuePendingCandidate(data.from, messageId, data);
    }
  }

  function subscribeSignals(roomId) {
    signalingUnsubs.forEach(fn => {
      try { fn(); } catch (_) {}
    });
    signalingUnsubs = [];

    const offersUnsub = onValue(ref(db, `${signalRoot(roomId)}/offers`), async (snap) => {
      const data = snap.val() || {};
      for (const [id, msg] of Object.entries(data)) {
        try { await handleOffer(id, msg); } catch (e) { console.error(e); }
      }
    });

    const answersUnsub = onValue(ref(db, `${signalRoot(roomId)}/answers`), async (snap) => {
      const data = snap.val() || {};
      for (const [id, msg] of Object.entries(data)) {
        try { await handleAnswer(id, msg); } catch (e) { console.error(e); }
      }
    });

    const candidatesUnsub = onValue(ref(db, `${signalRoot(roomId)}/candidates`), async (snap) => {
      const data = snap.val() || {};
      for (const [id, msg] of Object.entries(data)) {
        try { await handleCandidate(id, msg); } catch (e) { console.error(e); }
      }
    });

    signalingUnsubs = [offersUnsub, answersUnsub, candidatesUnsub];
  }

  function closePeer(uid) {
    const pc = peerConnections.get(uid);
    if (pc) {
      try { pc.ontrack = null; } catch (_) {}
      try { pc.onicecandidate = null; } catch (_) {}
      try { pc.onconnectionstatechange = null; } catch (_) {}
      try { pc.close(); } catch (_) {}
    }
    peerConnections.delete(uid);
    makingOfferMap.delete(uid);
    remoteStreams.delete(uid);
    pendingCandidatesMap.delete(uid);
    renderVideoStage();
    renderScreenShareUI();
  }

  function closeAllPeers() {
    for (const uid of [...peerConnections.keys()]) {
      closePeer(uid);
    }
    signalingUnsubs.forEach(fn => {
      try { fn(); } catch (_) {}
    });
    signalingUnsubs = [];
    processedCandidateIds.clear();
    pendingCandidatesMap.clear();
  }

  createRoomBtn.addEventListener("click", createRoom);

  copyRoomLinkBtn.addEventListener("click", async () => {
    if (!lastGeneratedRoomLink) return;
    try {
      await navigator.clipboard.writeText(lastGeneratedRoomLink);
      alert("Lien copié.");
    } catch (e) {
      alert("Impossible de copier automatiquement. Copie le lien affiché.");
    }
  });

  previewMediaBtn.addEventListener("click", async () => {
    await startLocalMedia();
    renderVideoStage();
  });

  stopPreviewBtn.addEventListener("click", () => {
    if (!joinedRoom && !isInWaitingRoom) {
      stopLocalMedia();
      renderVideoStage();
      return;
    }
    mediaTestStatus.textContent = "Le flux reste disponible car tu es déjà engagé dans la salle ou l’attente.";
  });

  joinRoomBtn.addEventListener("click", joinRoomFlow);
  joinCurrentRoomBtn.addEventListener("click", joinAsApprovedParticipant);
  approveAllBtn.addEventListener("click", approveAllWaiting);
  leaveRoomBtn.addEventListener("click", leaveCurrentRoom);
  closeRoomBtn.addEventListener("click", closeRoom);
  sendChatBtn.addEventListener("click", sendChatMessage);
  toggleMicBtn.addEventListener("click", toggleMic);
  toggleCamBtn.addEventListener("click", toggleCam);
  shareScreenBtn.addEventListener("click", startScreenShare);
  stopShareScreenBtn.addEventListener("click", stopScreenShare);

  toggleMiniModeBtn.addEventListener("click", () => {
    toggleMiniMode();
  });

  restoreMiniBtn.addEventListener("click", () => {
    toggleMiniMode(false);
  });

  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
      sendChatMessage();
    }
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "insights.html";
      return;
    }

    const lastActivity = Number(localStorage.getItem(LAST_ACTIVITY_KEY) || "0");
    if (lastActivity && Date.now() - lastActivity > INACTIVITY_LIMIT) {
      try { await signOut(auth); } catch (_) {}
      window.location.href = "insights.html";
      return;
    }

    currentUser = user;
    bindActivityEvents();
    resetActivityTimer();

    await loadMyProfile(user);
    await bindPresence();
    subscribeRecentRooms();

    const roomId = getRoomQueryParam();
    if (roomId) {
      meetingNavLink.classList.remove("hidden");
    }

    updateVisibilityByRole();
    await loadRoom(roomId);
  });

  window.addEventListener("beforeunload", async () => {
    try {
      if (currentRoomId && currentUser && joinedRoom) {
        await remove(ref(db, participantPath(currentRoomId, currentUser.uid)));
      }
    } catch (_) {}

    clearRoomRealtimeSubscriptions();
    closeAllPeers();
    stopLocalMedia();
  });
</script>
