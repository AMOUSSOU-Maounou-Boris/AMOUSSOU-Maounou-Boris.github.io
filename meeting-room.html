<!-- 🔥 AJOUT IMPORTANT (dans <body> tout en bas avant </body>) -->

<div id="floatingMeet" style="
position:fixed;
bottom:20px;
right:20px;
width:320px;
background:#0f2d58;
border-radius:16px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:none;
z-index:9999;
">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
<strong style="color:#fff;">Réunion</strong>
<button onclick="toggleMiniMeet()" style="background:none;border:none;color:#fff;font-size:16px;">—</button>
</div>

<video id="miniVideo" autoplay muted playsinline style="width:100%;border-radius:10px;"></video>

</div>

<div id="lastRoomsBox" style="
position:fixed;
bottom:20px;
left:20px;
background:#fff;
padding:12px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
width:260px;
font-size:13px;
z-index:9999;
">
<strong>Dernières réunions</strong>
<div id="lastRoomsList"></div>
</div>

<script>
/* 🔥 FIX CRUCIAL : chemins Firebase */
function roomPath(roomId){ return `meetingRooms/${roomId}`; }
function participantPath(roomId,uid){ return `meetingRooms/${roomId}/participants/${uid}`; }
function waitingPath(roomId,uid){ return `meetingRooms/${roomId}/waiting/${uid}`; }
function chatPath(roomId){ return `meetingRooms/${roomId}/chat`; }
function signalRoot(roomId){ return `meetingSignals/${roomId}`; }

/* 🔥 FIX TEMPLATE BUG */
function setAvatar(profile={},user={}){
if(profile.photoURL){
myAvatar.innerHTML = `<img src="${profile.photoURL}">`;
}else{
myAvatar.textContent = initials(profile.displayName||user.displayName||"",user.email||"");
}
}

/* 🔥 FIX VIDEO GRID BUG */
function renderVideoStage(){
const has = localStream || remoteStreams.size>0;

if(!has){
videoGrid.classList.add("hidden");
videoPlaceholder.classList.remove("hidden");
return;
}

videoPlaceholder.classList.add("hidden");
videoGrid.classList.remove("hidden");

videoGrid.innerHTML = "";

if(localStream){
const div=document.createElement("div");
div.className="video-tile";
div.innerHTML=`<h4>Toi</h4><video autoplay muted playsinline></video>`;
div.querySelector("video").srcObject=localStream;
videoGrid.appendChild(div);
}

remoteStreams.forEach((stream,uid)=>{
const div=document.createElement("div");
div.className="video-tile";
div.innerHTML=`<h4>${participantsCache[uid]?.displayName||"User"}</h4><video autoplay playsinline></video>`;
div.querySelector("video").srcObject=stream;
videoGrid.appendChild(div);
});
}

/* 🔥 MINI PLAYER */
function toggleMiniMeet(){
const el=document.getElementById("floatingMeet");
el.style.height = el.style.height==="40px" ? "auto" : "40px";
}

/* 🔥 LAST ROOMS */
function saveRoomLink(link){
let arr = JSON.parse(localStorage.getItem("lastRooms")||"[]");
arr.unshift(link);
arr = arr.slice(0,2);
localStorage.setItem("lastRooms",JSON.stringify(arr));
renderLastRooms();
}

function renderLastRooms(){
const box=document.getElementById("lastRoomsList");
const arr = JSON.parse(localStorage.getItem("lastRooms")||"[]");

box.innerHTML = arr.map(l=>`
<div style="margin-top:6px;">
<a href="${l}" style="color:#0f4d92;font-weight:700;">Rejoindre</a>
</div>
`).join("") || "Aucun lien";
}

/* 🔥 AUTO LOAD LAST */
renderLastRooms();

/* 🔥 START MEDIA SAFE */
async function startLocalMedia(){
try{
if(localStream) return true;

localStream = await navigator.mediaDevices.getUserMedia({
audio:true,
video:true
});

/* mini */
document.getElementById("floatingMeet").style.display="block";
document.getElementById("miniVideo").srcObject = localStream;

renderVideoStage();
return true;

}catch(e){
console.error(e);
alert("Autorise caméra et micro");
return false;
}
}

/* 🔥 FIX CALL ERROR */
async function ensurePeerConnection(uid,offer=false){
if(!localStream) return;

if(peerConnections.has(uid)) return;

const pc = new RTCPeerConnection(RTC_CONFIG);
peerConnections.set(uid,pc);

localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

pc.ontrack=e=>{
remoteStreams.set(uid,e.streams[0]);
renderVideoStage();
};

pc.onicecandidate=e=>{
if(!e.candidate) return;
push(ref(db,`${signalRoot(currentRoomId)}/candidates`),{
from:currentUser.uid,
to:uid,
candidate:e.candidate
});
};

if(offer){
const off=await pc.createOffer();
await pc.setLocalDescription(off);

push(ref(db,`${signalRoot(currentRoomId)}/offers`),{
from:currentUser.uid,
to:uid,
sdp:off.sdp,
type:off.type
});
}
}

/* 🔥 SCREEN SHARE */
async function startScreenShare(){
try{
screenStream = await navigator.mediaDevices.getDisplayMedia({video:true});
replaceTracksOnPeers();
}catch(e){console.log(e);}
}

/* 🔥 CREATE ROOM FIX */
async function createRoom(){
const id = randomRoomId();
const link = location.origin + location.pathname + "?room="+id;

await set(ref(db,roomPath(id)),{
roomId:id,
createdAt:Date.now(),
status:"open"
});

saveRoomLink(link);
alert("Salle créée");
}

/* 🔥 JOIN FIX */
async function joinRoomFlow(){
const ok = await startLocalMedia();
if(!ok) return;

await set(ref(db,participantPath(currentRoomId,currentUser.uid)),{
uid:currentUser.uid,
displayName:getProfileName(),
joinedAt:Date.now()
});

joinedRoom=true;
}

/* 🔥 PREVIEW ALWAYS WORK */
previewMediaBtn.onclick = async ()=>{
await startLocalMedia();
};

/* 🔥 SHARE BUTTON */
shareScreenBtn.onclick = startScreenShare;

</script>
