<script>
/* 🔥 COLLE TA CONFIG ICI */
const firebaseConfig = {
  apiKey: "AIzaSyA-pOkvoJaNOGMyXVYPRFSej6HVu8mc_ns",
  authDomain: "boris-research-hub.firebaseapp.com",
  projectId: "boris-research-hub",
  storageBucket: "boris-research-hub.firebasestorage.app",
  messagingSenderId: "71055508172",
  appId: "1:71055508172:web:72229e3f5ad664eb35b869",
  measurementId: "G-9Q6SJ96NBS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 👍 LIKE */
function likePost(postId){
  const ref = db.collection("posts").doc(postId);

  ref.get().then(doc=>{
    if(doc.exists){
      let likes = doc.data().likes || 0;
      ref.update({likes: likes + 1});
    } else {
      ref.set({likes: 1});
    }
  });
}

/* 🔄 UPDATE LIKE */
function loadLikes(postId){
  const ref = db.collection("posts").doc(postId);

  ref.onSnapshot(doc=>{
    if(doc.exists){
      document.getElementById("likes-"+postId).innerText = doc.data().likes;
    }
  });
}

/* 💬 COMMENT */
function addComment(postId){
  const input = document.getElementById("comment-input-"+postId);
  const text = input.value;

  if(text.trim() === "") return;

  db.collection("comments").add({
    postId: postId,
    text: text,
    date: new Date()
  });

  input.value = "";
}

/* 🔄 LOAD COMMENTS */
function loadComments(postId){
  db.collection("comments")
    .where("postId","==",postId)
    .orderBy("date")
    .onSnapshot(snapshot=>{
      let html = "";
      snapshot.forEach(doc=>{
        html += `<p class="comment">${doc.data().text}</p>`;
      });
      document.getElementById("comments-"+postId).innerHTML = html;
    });
}

/* INIT */
loadLikes("post1");
loadComments("post1");

</script>
