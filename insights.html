<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights - Réseau social</title>
  <link rel="stylesheet" href="insights.css" />
</head>
<body>
  <header class="topbar">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="research.html">Research</a>
      <a href="cv.html">Resume</a>
      <a href="contact.html">Contact</a>
      <a href="insights.html" class="active">Insights</a>
      <a href="messages.html">Messages</a>
      <a href="profile.html">Mon compte</a>
    </nav>
  </header>

  <main class="page">
    <aside class="left-panel">
      <div class="profile-box">
        <div class="avatar" id="meAvatar">MB</div>
        <h2 id="meName">Chargement...</h2>
        <p id="meBio">Bienvenue sur ton espace social privé.</p>
        <a class="panel-btn" href="profile.html">Voir mon profil</a>
        <a class="panel-btn alt" href="messages.html">Messagerie</a>
      </div>
    </aside>

    <section class="feed-section">
      <div class="composer-card">
        <h2>Créer une publication</h2>
        <textarea id="postText" placeholder="Écris quelque chose à partager..."></textarea>

        <div class="composer-actions">
          <input type="file" id="postImageInput" accept="image/*" />
          <button class="primary-btn" id="publishBtn">Publier</button>
        </div>

        <div id="composerPreview"></div>
        <div class="small-msg" id="publishMsg"></div>
      </div>

      <div id="feed"></div>
    </section>
  </main>

  <script type="module">
    import { auth, db, storage } from "./firebase-config.js";
    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      ref,
      get,
      set,
      update,
      push,
      remove,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    import {
      ref as storageRef,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const meAvatar = document.getElementById("meAvatar");
    const meName = document.getElementById("meName");
    const meBio = document.getElementById("meBio");

    const postText = document.getElementById("postText");
    const postImageInput = document.getElementById("postImageInput");
    const publishBtn = document.getElementById("publishBtn");
    const composerPreview = document.getElementById("composerPreview");
    const publishMsg = document.getElementById("publishMsg");
    const feed = document.getElementById("feed");

    let currentUser = null;
    let usersMap = {};
    let likesMap = {};
    let commentsMap = {};

    function escapeHtml(text = "") {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function initials(name = "", email = "") {
      const source = (name || email || "U").trim();
      const parts = source.split(" ").filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return source.slice(0, 2).toUpperCase();
    }

    function formatDate(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleString("fr-FR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showPublishMsg(text, ok = false) {
      publishMsg.textContent = text;
      publishMsg.style.color = ok ? "#14854b" : "#c0392b";
    }

    function renderMyBox(userData) {
      meName.textContent = userData.displayName || "Utilisateur";
      meBio.textContent = userData.bio || "Bienvenue sur ton espace social privé.";

      if (userData.photoURL) {
        meAvatar.innerHTML = `<img src="${userData.photoURL}" alt="avatar">`;
      } else {
        meAvatar.textContent = initials(userData.displayName, userData.email);
      }
    }

    async function ensureUserRecord(user) {
      const userRef = ref(db, "users/" + user.uid);
      const snap = await get(userRef);

      const payload = {
        uid: user.uid,
        email: user.email || "",
        displayName: user.displayName || user.email?.split("@")[0] || "Utilisateur",
        photoURL: snap.exists() ? (snap.val().photoURL || "") : "",
        bio: snap.exists() ? (snap.val().bio || "") : "",
        updatedAt: Date.now()
      };

      if (!snap.exists()) {
        payload.createdAt = Date.now();
      }

      await update(userRef, payload);
      return payload;
    }

    postImageInput.addEventListener("change", () => {
      const file = postImageInput.files[0];
      if (!file) {
        composerPreview.innerHTML = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        composerPreview.innerHTML = `<img src="${reader.result}" class="preview-image" alt="preview">`;
      };
      reader.readAsDataURL(file);
    });

    async function createPost() {
      if (!currentUser) return;

      const text = postText.value.trim();
      const imageFile = postImageInput.files[0];

      if (!text && !imageFile) {
        showPublishMsg("Écris un texte ou choisis une image.");
        return;
      }

      try {
        publishBtn.disabled = true;
        showPublishMsg("Publication en cours...", true);

        let imageUrl = "";

        if (imageFile) {
          const imgRef = storageRef(
            storage,
            `postImages/${currentUser.uid}/post_${Date.now()}_${imageFile.name}`
          );
          await uploadBytes(imgRef, imageFile);
          imageUrl = await getDownloadURL(imgRef);
        }

        const postRef = push(ref(db, "posts"));
        await set(postRef, {
          authorId: currentUser.uid,
          text,
          imageUrl,
          createdAt: Date.now()
        });

        postText.value = "";
        postImageInput.value = "";
        composerPreview.innerHTML = "";
        showPublishMsg("Publication ajoutée avec succès.", true);
      } catch (error) {
        showPublishMsg("Erreur : " + error.message);
      } finally {
        publishBtn.disabled = false;
      }
    }

    async function toggleLike(postId) {
      if (!currentUser) return;
      const likeRef = ref(db, `likes/${postId}/${currentUser.uid}`);
      const snap = await get(likeRef);

      if (snap.exists()) {
        await remove(likeRef);
      } else {
        await set(likeRef, true);
      }
    }

    async function addComment(postId) {
      if (!currentUser) return;

      const input = document.getElementById(`comment-input-${postId}`);
      const text = input.value.trim();
      if (!text) return;

      const commentRef = push(ref(db, `comments/${postId}`));
      await set(commentRef, {
        authorId: currentUser.uid,
        text,
        createdAt: Date.now()
      });

      input.value = "";
    }

    async function deletePost(postId, authorId) {
      if (!currentUser || currentUser.uid !== authorId) return;
      await remove(ref(db, "posts/" + postId));
      await remove(ref(db, "comments/" + postId));
      await remove(ref(db, "likes/" + postId));
    }

    function renderFeed(postsData) {
      const posts = Object.entries(postsData || {})
        .map(([id, value]) => ({ id, ...value }))
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      if (!posts.length) {
        feed.innerHTML = `<div class="empty-feed">Aucune publication pour le moment.</div>`;
        return;
      }

      feed.innerHTML = posts.map(post => {
        const author = usersMap[post.authorId] || {};
        const authorName = author.displayName || "Utilisateur";
        const authorPhoto = author.photoURL || "";
        const likeCount = likesMap[post.id] ? Object.keys(likesMap[post.id]).length : 0;
        const likedByMe = !!(likesMap[post.id] && likesMap[post.id][currentUser.uid]);
        const comments = commentsMap[post.id]
          ? Object.entries(commentsMap[post.id])
              .map(([id, val]) => ({ id, ...val }))
              .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0))
          : [];

        return `
          <article class="post-card">
            <div class="post-head">
              <a href="profile.html?uid=${encodeURIComponent(post.authorId)}" class="author-block">
                <div class="avatar small-avatar">
                  ${authorPhoto ? `<img src="${authorPhoto}" alt="avatar">` : initials(authorName, author.email)}
                </div>
                <div>
                  <strong>${escapeHtml(authorName)}</strong>
                  <div class="date-line">${escapeHtml(formatDate(post.createdAt))}</div>
                </div>
              </a>

              ${currentUser.uid === post.authorId ? `
                <button class="danger-btn" data-delete-post="${post.id}" data-author-id="${post.authorId}">
                  Supprimer
                </button>
              ` : ""}
            </div>

            ${post.text ? `<p class="post-text">${escapeHtml(post.text)}</p>` : ""}
            ${post.imageUrl ? `<img src="${post.imageUrl}" class="post-image" alt="post image">` : ""}

            <div class="post-actions">
              <button class="react-btn ${likedByMe ? "liked" : ""}" data-like-post="${post.id}">
                ❤️ J'aime (${likeCount})
              </button>
            </div>

            <div class="comments-box">
              <div class="comment-list">
                ${comments.length ? comments.map(comment => {
                  const cu = usersMap[comment.authorId] || {};
                  return `
                    <div class="comment-item">
                      <strong>${escapeHtml(cu.displayName || "Utilisateur")}</strong>
                      <span>${escapeHtml(comment.text || "")}</span>
                      <small>${escapeHtml(formatDate(comment.createdAt))}</small>
                    </div>
                  `;
                }).join("") : `<div class="no-comment">Aucun commentaire.</div>`}
              </div>

              <div class="comment-form">
                <input id="comment-input-${post.id}" type="text" placeholder="Écrire un commentaire...">
                <button data-comment-post="${post.id}">Publier</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-like-post]").forEach(btn => {
        btn.addEventListener("click", () => toggleLike(btn.dataset.likePost));
      });

      document.querySelectorAll("[data-comment-post]").forEach(btn => {
        btn.addEventListener("click", () => addComment(btn.dataset.commentPost));
      });

      document.querySelectorAll("[data-delete-post]").forEach(btn => {
        btn.addEventListener("click", () => {
          deletePost(btn.dataset.deletePost, btn.dataset.authorId);
        });
      });
    }

    publishBtn.addEventListener("click", createPost);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      const myData = await ensureUserRecord(user);
      renderMyBox(myData);

      onValue(ref(db, "users"), (snap) => {
        usersMap = snap.val() || {};
        onValue(ref(db, "posts"), (postsSnap) => {
          renderFeed(postsSnap.val() || {});
        });
      });

      onValue(ref(db, "likes"), (snap) => {
        likesMap = snap.val() || {};
        get(ref(db, "posts")).then(postsSnap => {
          renderFeed(postsSnap.val() || {});
        });
      });

      onValue(ref(db, "comments"), (snap) => {
        commentsMap = snap.val() || {};
        get(ref(db, "posts")).then(postsSnap => {
          renderFeed(postsSnap.val() || {});
        });
      });
    });
  </script>
</body>
</html>
