<div class="container">

<aside class="sidebar">
<img src="profile.jpg" class="profile-img">
<h2>Maounou Boris AMOUSSOU</h2>
<p>Chemical Engineer<br>Green Chemistry & Environment</p>

<!-- LOGIN -->
<button onclick="login()">Login with Google</button>
<button onclick="logout()">Logout</button>

<p id="user-info"></p>

</aside>

<main>

<section class="card post" id="post1">
<h3>Photocatalysis and Water Treatment</h3>
<p class="date">March 2026</p>

<p>BaTiO₃-based photocatalysts for degradation of pollutants.</p>

<div class="actions">
<button onclick="likePost('post1')">👍 Like <span id="likes-post1">0</span></button>
</div>

<div class="comments">
<input type="text" id="comment-input-post1" placeholder="Write a comment...">
<button onclick="addComment('post1')">Send</button>

<div id="comments-post1"></div>
</div>

</section>

</main>
</div>

<script>
/* 🔥 CONFIG */
const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* 🔐 LOGIN */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

/* 🚪 LOGOUT */
function logout(){
  auth.signOut();
}

/* 👤 USER STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user-info").innerHTML =
      `<img src="${user.photoURL}" width="30"> ${user.displayName}`;
  } else {
    document.getElementById("user-info").innerText = "Not connected";
  }
});

/* 👍 LIKE */
function likePost(postId){
  const ref = db.collection("posts").doc(postId);

  ref.get().then(doc=>{
    if(doc.exists){
      let likes = doc.data().likes || 0;
      ref.update({likes: likes + 1});
    } else {
      ref.set({likes: 1});
    }
  });
}

/* 🔄 LOAD LIKES */
function loadLikes(postId){
  db.collection("posts").doc(postId)
  .onSnapshot(doc=>{
    if(doc.exists){
      document.getElementById("likes-"+postId).innerText = doc.data().likes;
    }
  });
}

/* 💬 COMMENT AVEC USER */
function addComment(postId){
  const user = auth.currentUser;
  const input = document.getElementById("comment-input-"+postId);

  if(!user){
    alert("Login first !");
    return;
  }

  if(input.value.trim() === "") return;

  db.collection("comments").add({
    postId: postId,
    text: input.value,
    name: user.displayName,
    photo: user.photoURL,
    date: new Date()
  });

  input.value = "";
}

/* 🔄 LOAD COMMENTS */
function loadComments(postId){
  db.collection("comments")
  .where("postId","==",postId)
  .orderBy("date")
  .onSnapshot(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      const c = doc.data();

      html += `
      <div class="comment">
        <img src="${c.photo}" width="30">
        <b>${c.name}</b>
        <p>${c.text}</p>
      </div>`;
    });

    document.getElementById("comments-"+postId).innerHTML = html;
  });
}

/* INIT */
loadLikes("post1");
loadComments("post1");

</script>

</body>
</html>
