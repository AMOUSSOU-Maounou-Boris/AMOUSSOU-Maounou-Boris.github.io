<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Boris Research Hub</title>
  <link rel="stylesheet" href="contact.css" />
  <style>
    .login-btn,.nav-account-btn,.nav-logout-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:8px;font-weight:700;text-decoration:none;cursor:pointer;border:none}
    .login-btn{background:#0a66c2;color:#fff!important}
    .nav-account-btn{background:#e8f1fb;color:#0b2239!important}
    .nav-logout-btn{background:#f7dede;color:#8a1f1f!important}
    .status-dot{width:10px;height:10px;background:#00ff66;border-radius:50%;display:inline-block;box-shadow:0 0 8px #00ff66;animation:blink 1.2s infinite}
    .auth-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    @keyframes blink{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
  </style>
</head>
<body>
  <nav class="contact-nav">
    <ul id="nav-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="cv.html">Resume</a></li>
      <li><a href="contact.html" class="active-link">Contact</a></li>
      <li><a href="insights.html">Insights</a></li>
      <li id="auth-section"></li>
    </ul>
  </nav>

  <main class="contact-container">
    <section class="contact-card">
      <h1>Contact</h1>
      <p>Feel free to contact me for academic, research or professional opportunities.</p>
      <p>Email: <a href="mailto:maounou-boris.amoussou@cnrs.fr">maounou-boris.amoussou@cnrs.fr</a></p>
      <a href="mailto:maounou-boris.amoussou@cnrs.fr" class="contact-btn">Send me a message</a>
    </section>
  </main>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const authSection = document.getElementById("auth-section");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await get(ref(db, "users/" + user.uid));
        const profile = snap.exists() ? snap.val() : null;
        const name = profile?.displayName || user.displayName || "Mon compte";
        authSection.innerHTML = `
          <div class="auth-actions">
            <a href="messages.html" class="nav-account-btn">💬 Messages</a>
            <a href="profile.html" class="nav-account-btn">👤 ${name}<span class="status-dot"></span></a>
            <button id="logoutNavBtn" class="nav-logout-btn">Logout</button>
          </div>
        `;
        document.getElementById("logoutNavBtn").addEventListener("click", async () => {
          await signOut(auth);
          window.location.href = "contact.html";
        });
      } else {
        authSection.innerHTML = `<a href="login.html" class="login-btn">Login</a>`;
      }
    });
  </script>
</body>
</html>
