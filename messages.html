<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | Boris Research Hub</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="messages.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<!-- NAV -->
<header class="topbar">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="research.html">Research</a>
    <a href="cv.html">Resume</a>
    <a href="contact.html">Contact</a>
    <a href="insights.html">Insights</a>
    <a href="messages.html" class="active">Messages</a>
  </nav>
</header>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-top">
      <div id="meAvatar" class="avatar large">MB</div>
      <div>
        <h2>Messagerie</h2>
        <p id="meName">Utilisateur</p>
      </div>
    </div>

    <button class="logout-btn" onclick="logout()">Déconnexion</button>

    <input id="search" class="search-input" placeholder="Rechercher...">

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('all')">Tous</button>
      <button class="tab-btn" onclick="showTab('online')">En ligne</button>
    </div>

    <div id="all" class="members-list"></div>
    <div id="online" class="members-list" style="display:none"></div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="chat-header">
      <div id="chatHeader">Sélectionne une conversation</div>
    </div>

    <div class="chat-box">

      <div id="chatStatus" class="chat-status-bar"></div>

      <div id="messages" class="chat-messages"></div>

      <div class="composer">

        <div id="replyPreview"></div>

        <textarea id="input" placeholder="Écrire un message..."></textarea>

        <div class="composer-actions">
          <button class="emoji-btn" onclick="addEmoji('😀')">😀</button>
          <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
          <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
          <button class="send-btn" onclick="sendMessage()">Envoyer</button>
        </div>

      </div>

    </div>

  </main>

</div>

<!-- FIREBASE SCRIPT -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyA-pOkvoJaNOGMyXVYPRFSej6HVu8mc_ns",
  authDomain: "boris-research-hub.firebaseapp.com",
  projectId: "boris-research-hub",
  storageBucket: "boris-research-hub.firebasestorage.app",
  messagingSenderId: "71055508172",
  appId: "1:71055508172:web:72229e3f5ad664eb35b869",
  databaseURL: "https://boris-research-hub-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

let me = null;
let selectedUser = null;
let threadId = null;

/* ---------- AUTH ---------- */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "insights.html";
    return;
  }

  me = user;

  const snap = await db.collection("users").doc(user.uid).get();
  const data = snap.data();

  document.getElementById("meName").textContent = data.fullName;
  document.getElementById("meAvatar").textContent = data.fullName[0];

  loadUsers();
  setupPresence();
});

/* ---------- PRESENCE ---------- */
function setupPresence() {
  const ref = rtdb.ref("status/" + me.uid);

  rtdb.ref(".info/connected").on("value", (snap) => {
    if (!snap.val()) return;

    ref.onDisconnect().set({
      state: "offline",
      last: Date.now()
    });

    ref.set({
      state: "online",
      last: Date.now()
    });
  });
}

/* ---------- USERS ---------- */
function loadUsers() {
  db.collection("users").onSnapshot(snap => {
    let htmlAll = "";
    let htmlOnline = "";

    snap.forEach(doc => {
      if (doc.id === me.uid) return;

      const u = doc.data();

      const card = `
        <div class="member-card" onclick="openChat('${doc.id}', '${u.fullName}')">
          <div class="avatar small">${u.fullName[0]}</div>
          <div class="member-main">
            <div class="member-name">${u.fullName}</div>
          </div>
        </div>
      `;

      htmlAll += card;
      htmlOnline += card;
    });

    document.getElementById("all").innerHTML = htmlAll;
    document.getElementById("online").innerHTML = htmlOnline;
  });
}

/* ---------- CHAT ---------- */
function openChat(uid, name) {
  selectedUser = uid;
  threadId = [me.uid, uid].sort().join("_");

  document.getElementById("chatHeader").innerHTML = `<strong>${name}</strong>`;

  loadMessages();
}

function loadMessages() {
  db.collection("messages")
    .where("threadId", "==", threadId)
    .orderBy("time")
    .onSnapshot(snap => {

      let html = "";

      snap.forEach(doc => {
        const m = doc.data();

        html += `
          <div class="message-row ${m.sender === me.uid ? "me" : ""}">
            <div class="message-wrap">
              <div class="message-card">
                <div class="message-text">${m.text}</div>
                <div class="message-time">${new Date(m.time).toLocaleTimeString()}</div>
              </div>
            </div>
          </div>
        `;
      });

      document.getElementById("messages").innerHTML = html;
    });
}

/* ---------- SEND ---------- */
function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || !selectedUser) return;

  db.collection("messages").add({
    threadId,
    sender: me.uid,
    receiver: selectedUser,
    text,
    time: Date.now()
  });

  input.value = "";
}

/* ---------- UI ---------- */
function addEmoji(e) {
  const input = document.getElementById("input");
  input.value += e;
}

function showTab(tab) {
  document.getElementById("all").style.display = tab === "all" ? "block" : "none";
  document.getElementById("online").style.display = tab === "online" ? "block" : "none";
}

/* ---------- LOGOUT ---------- */
function logout() {
  auth.signOut();
}
</script>

</body>
</html>
