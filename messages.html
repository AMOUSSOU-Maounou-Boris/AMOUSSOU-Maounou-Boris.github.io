<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | Boris Research Hub</title>

<style>
body{font-family:Arial;margin:0;background:#eaf5ff;}
.container{max-width:1100px;margin:auto;padding:20px;}
.chat{background:#fff;border-radius:20px;padding:20px;height:80vh;display:flex;flex-direction:column;}
.messages{flex:1;overflow:auto;margin-bottom:10px;}
.msg{padding:8px 12px;margin:6px 0;border-radius:12px;max-width:70%;}
.me{background:#dfeeff;margin-left:auto;}
.other{background:#f1f1f1;}
.composer{display:flex;flex-direction:column;}
.row{display:flex;gap:8px;align-items:center;}
input,textarea{padding:10px;border-radius:10px;border:1px solid #ccc;width:100%;}
button{padding:10px 14px;border:none;border-radius:10px;cursor:pointer;}
.voiceBar{background:#f3f8fe;border-radius:12px;padding:10px;margin-bottom:6px;display:none;}
.stickers{display:none;grid-template-columns:repeat(auto-fill,40px);gap:6px;margin-bottom:8px;}
.stickers button{font-size:20px;background:#fff;}
</style>
</head>

<body>
<div class="container">
<div class="chat">

<div class="messages" id="messages"></div>

<div id="voiceBar" class="voiceBar">
🔴 Enregistrement <span id="timer">00:00</span>
<button id="cancelVoice">Annuler</button>
</div>

<div id="stickers" class="stickers"></div>

<div class="composer">
<div class="row">
<button id="stickerBtn">😊</button>
<button id="voiceBtn">🎤</button>
<input id="text" placeholder="Message...">
<button id="send">Envoyer</button>
</div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase, ref, push, set, onValue, query, limitToLast
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyA...",
authDomain: "boris-research-hub.firebaseapp.com",
databaseURL: "https://boris-research-hub-default-rtdb.firebaseio.com",
projectId: "boris-research-hub"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesDiv = document.getElementById("messages");
const textInput = document.getElementById("text");
const sendBtn = document.getElementById("send");

const voiceBtn = document.getElementById("voiceBtn");
const cancelVoiceBtn = document.getElementById("cancelVoice");
const voiceBar = document.getElementById("voiceBar");
const timerText = document.getElementById("timer");

const stickerBtn = document.getElementById("stickerBtn");
const stickersDiv = document.getElementById("stickers");

let recorder, chunks = [], recording=false;
let timerInt, startTime;

function formatTime(s){
let m = Math.floor(s/60);
let sec = s%60;
return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

function startTimer(){
startTime = Date.now();
voiceBar.style.display="block";
timerInt = setInterval(()=>{
let s = Math.floor((Date.now()-startTime)/1000);
timerText.textContent = formatTime(s);
},1000);
}

function stopTimer(){
clearInterval(timerInt);
voiceBar.style.display="none";
timerText.textContent="00:00";
}

async function startVoice(){
let stream = await navigator.mediaDevices.getUserMedia({audio:true});
recorder = new MediaRecorder(stream);
chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=async ()=>{
let blob = new Blob(chunks);
if(blob.size > 1024*1024){
alert("Max 1Mo");
return;
}
let reader = new FileReader();
reader.onload = async ()=>{
await set(push(ref(db,"messages")),{
type:"audio",
data:reader.result,
time:Date.now()
});
};
reader.readAsDataURL(blob);
};

recorder.start();
recording=true;
voiceBtn.textContent="⏹";
startTimer();
}

function stopVoice(){
recorder.stop();
recording=false;
voiceBtn.textContent="🎤";
stopTimer();
}

voiceBtn.onclick=()=>{
if(!recording) startVoice();
else stopVoice();
};

cancelVoiceBtn.onclick=()=>{
recording=false;
recorder.stop();
recorder.onstop=null;
stopTimer();
voiceBtn.textContent="🎤";
};

sendBtn.onclick=async ()=>{
let text=textInput.value.trim();
if(!text) return;

await set(push(ref(db,"messages")),{
type:"text",
text,
time:Date.now()
});

textInput.value="";
};
// STICKERS
const list = ["😀","😂","😍","🔥","👍","🙏","🎉","💯","😎","🥳","❤️","😡"];

function loadStickers(){
stickersDiv.innerHTML = list.map(s=>`
<button>${s}</button>
`).join("");

stickersDiv.querySelectorAll("button").forEach(b=>{
b.onclick=async ()=>{
await set(push(ref(db,"messages")),{
type:"sticker",
text:b.textContent,
time:Date.now()
});
stickersDiv.style.display="none";
};
});
}

stickerBtn.onclick=()=>{
if(!stickersDiv.innerHTML) loadStickers();
stickersDiv.style.display =
stickersDiv.style.display==="grid"?"none":"grid";
};

// LOAD LAST MESSAGES ONLY (économie 🔥)
const msgRef = query(ref(db,"messages"), limitToLast(30));

onValue(msgRef, snap=>{
let data = snap.val()||{};
let arr = Object.values(data).sort((a,b)=>a.time-b.time);

messagesDiv.innerHTML = arr.map(m=>{
if(m.type==="text"){
return `<div class="msg other">${m.text}</div>`;
}
if(m.type==="sticker"){
return `<div class="msg other">${m.text}</div>`;
}
if(m.type==="audio"){
return `<div class="msg other">
<audio controls src="${m.data}"></audio>
</div>`;
}
}).join("");

messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

</script>
</body>
</html>
