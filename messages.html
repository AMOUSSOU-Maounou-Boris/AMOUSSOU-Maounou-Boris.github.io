<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#eef4fb;
    }

    .topbar{
      background:#082e5b;
      padding:15px;
      display:flex;
      justify-content:center;
      gap:20px;
    }

    .topbar a{
      color:white;
      text-decoration:none;
      font-weight:bold;
      position:relative;
    }

    /* BADGE NOTIFICATION */
    .notif-badge{
      position:absolute;
      top:-8px;
      right:-12px;
      background:red;
      color:white;
      font-size:12px;
      font-weight:bold;
      padding:2px 6px;
      border-radius:12px;
      display:none;
    }

    .container{
      display:flex;
      height:90vh;
    }

    .users{
      width:30%;
      border-right:1px solid #ccc;
      overflow:auto;
      background:#fff;
    }

    .user{
      padding:12px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .user:hover{
      background:#f5f5f5;
    }

    .user-badge{
      background:red;
      color:white;
      font-size:11px;
      padding:2px 6px;
      border-radius:10px;
    }

    .chat{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .messages{
      flex:1;
      overflow:auto;
      padding:10px;
    }

    .msg{
      margin:6px 0;
      padding:8px;
      border-radius:10px;
      max-width:70%;
    }

    .me{
      background:#2f8cff;
      color:white;
      align-self:flex-end;
    }

    .other{
      background:#ddd;
    }

    .send{
      display:flex;
      padding:10px;
      gap:10px;
    }

    .send input{
      flex:1;
      padding:10px;
    }

    .send button{
      padding:10px 15px;
      background:#082e5b;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<div class="topbar">
  <a href="insights.html">Insights</a>

  <a href="messages.html">
    Messages
    <span class="notif-badge" id="globalBadge">0</span>
  </a>

  <a href="profile.html">Mon compte</a>
</div>

<div class="container">

  <div class="users" id="usersList"></div>

  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="send">
      <input type="text" id="msgInput" placeholder="Message...">
      <button id="sendBtn">Envoyer</button>
    </div>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import {
  ref,
  push,
  onValue,
  update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let currentUser = null;
let selectedUser = null;

const usersList = document.getElementById("usersList");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const globalBadge = document.getElementById("globalBadge");

function chatId(u1, u2){
  return u1 < u2 ? u1 + "_" + u2 : u2 + "_" + u1;
}

onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href="insights.html";
    return;
  }

  currentUser = user;

  loadUsers();
  listenGlobalNotifications();
});

function loadUsers(){
  onValue(ref(db,"users"), snap=>{
    const users = snap.val() || {};
    usersList.innerHTML="";

    Object.entries(users).forEach(([uid,u])=>{
      if(uid === currentUser.uid) return;

      const div = document.createElement("div");
      div.className="user";
      div.innerHTML = `
        <span>${u.displayName || "User"}</span>
        <span class="user-badge" id="badge_${uid}" style="display:none">0</span>
      `;

      div.onclick = ()=>{
        selectedUser = uid;
        openChat(uid);

        // RESET compteur
        update(ref(db,"messages/"+chatId(currentUser.uid, uid)),{
          ["unread_"+currentUser.uid]:0
        });
      };

      usersList.appendChild(div);

      listenUserBadge(uid);
    });
  });
}

function listenUserBadge(uid){
  onValue(ref(db,"messages/"+chatId(currentUser.uid, uid)), snap=>{
    const data = snap.val() || {};
    const count = data["unread_"+currentUser.uid] || 0;

    const badge = document.getElementById("badge_"+uid);
    if(!badge) return;

    if(count > 0){
      badge.style.display="inline-block";
      badge.textContent = count;
    }else{
      badge.style.display="none";
    }
  });
}

function listenGlobalNotifications(){
  onValue(ref(db,"messages"), snap=>{
    const data = snap.val() || {};
    let total = 0;

    Object.values(data).forEach(conv=>{
      total += conv["unread_"+currentUser.uid] || 0;
    });

    if(total > 0){
      globalBadge.style.display="inline-block";
      globalBadge.textContent = total;
    }else{
      globalBadge.style.display="none";
    }
  });
}

function openChat(uid){
  messagesDiv.innerHTML="";

  onValue(ref(db,"messages/"+chatId(currentUser.uid, uid)+"/items"), snap=>{
    const msgs = snap.val() || {};
    messagesDiv.innerHTML="";

    Object.values(msgs).forEach(m=>{
      const div = document.createElement("div");
      div.className="msg " + (m.sender===currentUser.uid ? "me":"other");
      div.textContent = m.text;
      messagesDiv.appendChild(div);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

sendBtn.onclick = ()=>{
  const text = input.value.trim();
  if(!text || !selectedUser) return;

  const id = chatId(currentUser.uid, selectedUser);

  push(ref(db,"messages/"+id+"/items"),{
    text,
    sender: currentUser.uid,
    time: Date.now()
  });

  // INCREMENT unread pour l'autre
  onValue(ref(db,"messages/"+id), snap=>{
    const data = snap.val() || {};
    const current = data["unread_"+selectedUser] || 0;

    update(ref(db,"messages/"+id),{
      ["unread_"+selectedUser]: current + 1
    });
  },{onlyOnce:true});

  input.value="";
};
</script>

</body>
</html>
