<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="messages.css"/>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>

<body>

<!-- NAV -->
<nav class="msg-nav">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="research.html">Research</a></li>
    <li><a href="resume.html">Resume</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="insights.html">Insights</a></li>
    <li><a href="messages.html" class="active-link">Messages</a></li>
  </ul>
</nav>

<div class="messages-layout">

  <!-- SIDEBAR -->
  <aside class="messages-sidebar">
    <h2>Messagerie</h2>
    <p id="current-user-name">...</p>

    <button class="sidebar-logout-btn" onclick="logoutFromMessages()">Logout</button>

    <input type="text" id="member-search" placeholder="Search a member..." oninput="filterMembers()"/>

    <div class="tabs">
      <button onclick="switchTab('all-members', this)" class="active-tab">Tous les membres</button>
      <button onclick="switchTab('online-list', this)">En ligne</button>
    </div>

    <div id="all-members" class="tab-panel"></div>
    <div id="online-list" class="tab-panel hidden-panel"></div>
  </aside>

  <!-- MAIN -->
  <main class="messages-main">
    <div id="chat-status-message"></div>
    <div id="chat-messages"></div>

    <textarea id="message-input"></textarea>
    <button onclick="sendMessage()">Send</button>
  </main>

</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA-pOkvoJaNOGMyXVYPRFSej6HVu8mc_ns",
  authDomain: "boris-research-hub.firebaseapp.com",
  projectId: "boris-research-hub",
  databaseURL: "https://boris-research-hub-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const rtdb = firebase.database();

const ONLINE_GRACE_MS = 5 * 60 * 1000;

let currentUserProfile = null;
let selectedUserId = null;

// ==========================
// 🔥 UTIL
// ==========================

function escapeHtml(value){
  return String(value || "")
}

function formatLastSeen(ms){
  if(!ms) return "";
  return new Date(ms).toLocaleString("fr-FR");
}

function isRecentlyActive(data){
  if(!data) return false;
  if(data.state === "online") return true;

  const t = Number(data.last_changed || 0);
  return (Date.now() - t) <= ONLINE_GRACE_MS;
}

// ==========================
// 🔥 LOGOUT (FIXED)
// ==========================

async function logoutFromMessages(){
  const user = auth.currentUser;
  const btn = document.querySelector(".sidebar-logout-btn");

  if(btn){
    btn.disabled = true;
    btn.textContent = "Logging out...";
  }

  try{
    if(user){
      rtdb.ref("/status/" + user.uid).set({
        state:"offline",
        last_changed: firebase.database.ServerValue.TIMESTAMP
      });
    }

    await Promise.race([
      auth.signOut(),
      new Promise(res => setTimeout(res,2000))
    ]);

  }catch(e){
    console.log(e);
  }

  // 🔥 REDIRECTION FORCÉE
  window.location.href = "insights.html";
}

// ==========================
// 🔥 ONLINE USERS (5 min)
// ==========================

function loadOnlineMembers(){
  rtdb.ref("/status").on("value", async (snapshot)=>{
    let html = "";
    const me = auth.currentUser;

    snapshot.forEach(child=>{
      const data = child.val();
      const uid = child.key;

      if(me && uid === me.uid) return;
      if(!isRecentlyActive(data)) return;

      const label = data.state === "online"
        ? "En ligne"
        : "Actif récemment";

      html += `
        <div class="member-list-item">
          <strong>${escapeHtml(data.fullName || "Member")}</strong>
          <span>${label}</span>
        </div>
      `;
    });

    document.getElementById("online-list").innerHTML =
      html || "Nobody online";
  });
}

// ==========================
// 🔥 MEMBERS
// ==========================

function loadAllMembers(){
  db.collection("users").onSnapshot((snap)=>{
    let html="";

    snap.forEach(doc=>{
      const p = doc.data();
      html += `
        <div class="member-list-item" onclick="selectConversation('${doc.id}')">
          ${escapeHtml(p.fullName)}
        </div>
      `;
    });

    document.getElementById("all-members").innerHTML = html;
  });
}

// ==========================
// 🔥 CHAT
// ==========================

function selectConversation(uid){
  selectedUserId = uid;
}

async function sendMessage(){
  const user = auth.currentUser;
  const text = document.getElementById("message-input").value.trim();

  if(!user || !text || !selectedUserId) return;

  await db.collection("messages").add({
    senderId:user.uid,
    receiverId:selectedUserId,
    text,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("message-input").value="";
}

// ==========================
// 🔥 AUTH
// ==========================

auth.onAuthStateChanged(async(user)=>{
  if(!user){
    window.location.href="insights.html";
    return;
  }

  const snap = await db.collection("users").doc(user.uid).get();
  currentUserProfile = snap.data();

  document.getElementById("current-user-name").textContent =
    currentUserProfile?.fullName || "Member";

  // presence
  const ref = rtdb.ref("/status/"+user.uid);

  rtdb.ref(".info/connected").on("value",(snap)=>{
    if(snap.val()===false) return;

    ref.onDisconnect().set({
      state:"offline",
      last_changed:firebase.database.ServerValue.TIMESTAMP
    });

    ref.set({
      state:"online",
      fullName: currentUserProfile?.fullName || "Member",
      last_changed:firebase.database.ServerValue.TIMESTAMP
    });
  });

  loadAllMembers();
  loadOnlineMembers();
});

</script>

</body>
</html>
