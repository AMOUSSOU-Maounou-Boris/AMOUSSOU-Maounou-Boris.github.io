<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | Boris Research Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="messages.css">
</head>
<body>
  <header class="topbar">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="research.html">Research</a>
      <a href="cv.html">Resume</a>
      <a href="contact.html">Contact</a>
      <a href="insights.html">Insights</a>
      <a href="messages.html" class="active">Messages</a>
      <a href="profile.html">Mon compte</a>
    </nav>
  </header>

  <div class="page">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="avatar large" id="myAvatar">MB</div>
        <div>
          <h2>Messagerie</h2>
          <p id="myName">Chargement...</p>
        </div>
      </div>

      <button class="logout-btn" id="logoutBtn">Déconnexion</button>

      <input
        type="text"
        id="memberSearch"
        class="search-input"
        placeholder="Rechercher un membre..."
      >

      <div class="tabs">
        <button class="tab-btn active" data-tab="all">Tous</button>
        <button class="tab-btn" data-tab="online">En ligne</button>
      </div>

      <div class="members-list" id="membersList"></div>
    </aside>

    <main class="main">
      <section class="chat-header">
        <div class="avatar" id="chatAvatar">MB</div>

        <div class="chat-header-main">
          <div>
            <h3 id="chatTitle">Sélectionne une conversation</h3>
            <p id="chatSubtitle">Tes messages privés vont apparaître ici.</p>
            <p id="chatPresence"></p>
          </div>

          <button class="chat-options-btn" id="chatOptionsBtn" style="display:none;">Options</button>
        </div>
      </section>

      <section class="chat-box">
        <div class="chat-status-bar" id="chatStatusBar"></div>

        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">Aucune conversation sélectionnée.</div>
        </div>

        <div class="composer">
          <div id="replyPreviewMount"></div>

          <textarea id="messageInput" placeholder="Écris un message privé..."></textarea>

          <div class="composer-actions">
            <button class="emoji-btn" type="button" data-emoji="😀">😀</button>
            <button class="emoji-btn" type="button" data-emoji="👍">👍</button>
            <button class="emoji-btn" type="button" data-emoji="❤️">❤️</button>
            <button class="emoji-btn" type="button" data-emoji="🔥">🔥</button>
            <button class="emoji-btn" type="button" data-emoji="🧪">🧪</button>
            <button class="emoji-btn" type="button" data-emoji="💡">💡</button>
            <button class="send-btn" type="button" id="sendBtn">Envoyer</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="optionsModal">
    <div class="modal-content">
      <button class="modal-close" type="button" id="closeOptionsModal">×</button>
      <h3>Options de conversation</h3>
      <p class="modal-note" id="optionsModalName"></p>

      <div class="modal-actions">
        <button class="main-btn" id="blockToggleBtn">Bloquer</button>
        <button class="secondary-btn" type="button" id="cancelOptionsBtn">Fermer</button>
      </div>
    </div>
  </div>

  <div class="modal" id="forwardModal">
    <div class="modal-content large">
      <button class="modal-close" type="button" id="closeForwardModal">×</button>
      <h3>Transférer le message</h3>
      <p class="modal-note">Message sélectionné :</p>

      <div class="forward-preview-box" id="forwardPreview"></div>

      <input
        type="text"
        id="forwardSearch"
        class="search-input"
        placeholder="Rechercher un membre..."
      >

      <div class="forward-members" id="forwardMembers"></div>

      <div class="modal-actions">
        <button class="secondary-btn" type="button" id="cancelForwardBtn">Fermer</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      ref,
      set,
      update,
      get,
      push,
      remove,
      onValue,
      onDisconnect
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const myAvatar = document.getElementById("myAvatar");
    const myName = document.getElementById("myName");
    const logoutBtn = document.getElementById("logoutBtn");
    const memberSearch = document.getElementById("memberSearch");
    const membersList = document.getElementById("membersList");

    const chatTitle = document.getElementById("chatTitle");
    const chatSubtitle = document.getElementById("chatSubtitle");
    const chatPresence = document.getElementById("chatPresence");
    const chatOptionsBtn = document.getElementById("chatOptionsBtn");
    const chatStatusBar = document.getElementById("chatStatusBar");
    const chatMessages = document.getElementById("chatMessages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const replyPreviewMount = document.getElementById("replyPreviewMount");

    const optionsModal = document.getElementById("optionsModal");
    const closeOptionsModal = document.getElementById("closeOptionsModal");
    const cancelOptionsBtn = document.getElementById("cancelOptionsBtn");
    const optionsModalName = document.getElementById("optionsModalName");
    const blockToggleBtn = document.getElementById("blockToggleBtn");

    const forwardModal = document.getElementById("forwardModal");
    const closeForwardModalBtn = document.getElementById("closeForwardModal");
    const cancelForwardBtn = document.getElementById("cancelForwardBtn");
    const forwardPreview = document.getElementById("forwardPreview");
    const forwardSearch = document.getElementById("forwardSearch");
    const forwardMembers = document.getElementById("forwardMembers");

    let currentUser = null;
    let currentUserProfile = null;
    let selectedUserId = null;
    let selectedUserProfile = null;
    let currentChatId = null;
    let currentTab = "all";

    let usersCache = {};
    let presenceCache = {};
    let blockedUsersCache = {};
    let replyTarget = null;
    let forwardPayload = null;

    function escapeHtml(text = "") {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function initials(name = "", email = "") {
      const source = (name || email || "U").trim();
      const parts = source.split(" ").filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return source.slice(0, 2).toUpperCase();
    }

    function avatarMarkup(profile) {
      const photo = profile?.photoURL || "";
      const label = initials(profile?.displayName || "", profile?.email || "");
      if (photo) {
        return `<img src="${escapeHtml(photo)}" alt="avatar">`;
      }
      return escapeHtml(label);
    }

    function formatDate(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleString("fr-FR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function makeChatId(uid1, uid2) {
      return [uid1, uid2].sort().join("_");
    }

    function isOnline(uid) {
      return !!presenceCache[uid]?.online;
    }

    function presenceText(uid) {
      const data = presenceCache[uid] || {};
      if (data.online) return "En ligne";
      if (data.lastSeen) return "Vu : " + formatDate(data.lastSeen);
      return "Hors ligne";
    }

    function isBlocked(uid) {
      return !!blockedUsersCache[uid];
    }

    function setStatus(text = "", isError = false) {
      chatStatusBar.textContent = text;
      chatStatusBar.style.color = isError ? "#b00020" : "#14854b";
    }

    function canDeleteMessage(msg) {
      if (!currentUser) return false;
      if (msg.senderId !== currentUser.uid) return false;
      if (!msg.createdAt) return false;
      return (Date.now() - msg.createdAt) <= 30 * 60 * 1000;
    }

    async function ensureMyProfile(user) {
      const userRef = ref(db, "users/" + user.uid);
      const snap = await get(userRef);

      const payload = {
        uid: user.uid,
        email: user.email || "",
        displayName: user.displayName || localStorage.getItem("displayName") || user.email?.split("@")[0] || "Utilisateur",
        photoURL: snap.exists() ? (snap.val().photoURL || "") : "",
        bio: snap.exists() ? (snap.val().bio || "") : "",
        updatedAt: Date.now()
      };

      if (!snap.exists()) {
        payload.createdAt = Date.now();
      }

      await update(userRef, payload);
      return payload;
    }

    async function setupPresence(user, displayName) {
      const connectedRef = ref(db, ".info/connected");
      const presenceRef = ref(db, "presence/" + user.uid);

      onValue(connectedRef, async (snap) => {
        if (snap.val() === true) {
          await onDisconnect(presenceRef).set({
            online: false,
            lastSeen: Date.now(),
            displayName: displayName || user.displayName || "Utilisateur"
          });

          await set(presenceRef, {
            online: true,
            lastSeen: Date.now(),
            displayName: displayName || user.displayName || "Utilisateur"
          });
        }
      });
    }

    function renderReplyPreview() {
      if (!replyTarget) {
        replyPreviewMount.innerHTML = "";
        return;
      }

      replyPreviewMount.innerHTML = `
        <div class="reply-preview">
          <div class="reply-preview-head">
            <span class="reply-preview-title">Réponse au message sélectionné</span>
            <button class="cancel-reply-btn" type="button" id="cancelReplyBtn">Annuler</button>
          </div>
          <div class="reply-preview-text">${escapeHtml(replyTarget.text || "")}</div>
        </div>
      `;

      document.getElementById("cancelReplyBtn").addEventListener("click", () => {
        replyTarget = null;
        renderReplyPreview();
        clearReplyHighlight();
      });
    }

    function clearReplyHighlight() {
      document.querySelectorAll(".message-card").forEach(el => {
        el.classList.remove("message-selected");
      });
    }

    function highlightReplySource() {
      clearReplyHighlight();
      if (!replyTarget) return;
      const el = document.getElementById("msg-" + replyTarget.id);
      if (el) el.classList.add("message-selected");
    }

    function closeAllMenus() {
      document.querySelectorAll(".message-menu").forEach(menu => {
        menu.classList.remove("open");
      });
    }

    function renderChatHeader() {
      const chatAvatar = document.getElementById("chatAvatar");

      if (!selectedUserId || !selectedUserProfile) {
        chatAvatar.innerHTML = "MB";
        chatTitle.textContent = "Sélectionne une conversation";
        chatSubtitle.textContent = "Tes messages privés vont apparaître ici.";
        chatPresence.textContent = "";
        chatOptionsBtn.style.display = "none";
        return;
      }

      chatAvatar.innerHTML = avatarMarkup(selectedUserProfile);
      chatTitle.textContent = selectedUserProfile.displayName || "Membre";
      chatSubtitle.textContent = selectedUserProfile.bio || selectedUserProfile.email || "Conversation privée";
      chatPresence.textContent = isBlocked(selectedUserId)
        ? "Tu as bloqué cet utilisateur"
        : presenceText(selectedUserId);
      chatOptionsBtn.style.display = "inline-flex";
    }

    function updateComposerState() {
      if (selectedUserId && isBlocked(selectedUserId)) {
        messageInput.disabled = true;
        sendBtn.disabled = true;
        messageInput.placeholder = "Tu as bloqué cet utilisateur. Débloque-le pour écrire.";
      } else {
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.placeholder = "Écris un message privé...";
      }
    }

    function renderMembers() {
      if (!currentUser) return;

      const q = memberSearch.value.trim().toLowerCase();

      let list = Object.values(usersCache).filter(u => u.uid !== currentUser.uid);

      if (currentTab === "online") {
        list = list.filter(u => isOnline(u.uid));
      }

      list = list.filter(u => {
        const txt = `${u.displayName || ""} ${u.email || ""} ${u.bio || ""}`.toLowerCase();
        return txt.includes(q);
      });

      list.sort((a, b) => {
        const aOnline = isOnline(a.uid) ? 1 : 0;
        const bOnline = isOnline(b.uid) ? 1 : 0;
        if (bOnline !== aOnline) return bOnline - aOnline;
        return (a.displayName || "").localeCompare(b.displayName || "");
      });

      if (!list.length) {
        membersList.innerHTML = `<div class="empty-text">Aucun membre trouvé.</div>`;
        return;
      }

      membersList.innerHTML = list.map(profile => `
        <div class="member-card" data-uid="${profile.uid}">
          <div class="avatar small">${avatarMarkup(profile)}</div>
          <div class="member-main">
            <div class="member-name">${escapeHtml(profile.displayName || "Membre")}</div>
            <div class="member-sub">${escapeHtml(profile.bio || profile.email || "")}</div>
            <div class="member-status">
              <span class="status-dot ${isOnline(profile.uid) ? "online" : ""}"></span>
              <span>${isBlocked(profile.uid) ? "Bloqué" : escapeHtml(presenceText(profile.uid))}</span>
            </div>
          </div>
          <button class="profile-btn" type="button" data-profile-uid="${profile.uid}">Profile</button>
        </div>
      `).join("");

      document.querySelectorAll(".member-card").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest(".profile-btn")) return;
          selectConversation(card.dataset.uid);
        });
      });

      document.querySelectorAll(".profile-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          window.location.href = `profile.html?uid=${encodeURIComponent(btn.dataset.profileUid)}`;
        });
      });
    }

    function openOptionsModal() {
      if (!selectedUserId || !selectedUserProfile) return;
      optionsModal.classList.add("open");
      optionsModalName.textContent = selectedUserProfile.displayName || "Membre";
      blockToggleBtn.textContent = isBlocked(selectedUserId)
        ? "Débloquer cet utilisateur"
        : "Bloquer cet utilisateur";
    }

    function closeOptionsModalFn() {
      optionsModal.classList.remove("open");
    }

    async function toggleBlockSelectedUser() {
      if (!currentUser || !selectedUserId) return;

      const blockRef = ref(db, "users/" + currentUser.uid + "/blockedUsers/" + selectedUserId);

      try {
        if (isBlocked(selectedUserId)) {
          await remove(blockRef);
          setStatus("Utilisateur débloqué.");
        } else {
          await set(blockRef, {
            uid: selectedUserId,
            displayName: selectedUserProfile?.displayName || "Membre",
            createdAt: Date.now()
          });
          setStatus("Utilisateur bloqué.");
        }
        closeOptionsModalFn();
      } catch (error) {
        console.error(error);
        setStatus("Impossible de modifier le blocage.", true);
      }
    }

    function openForwardModal(text, senderName) {
      forwardPayload = { text, senderName };
      forwardPreview.textContent = `${senderName} : ${text}`;
      forwardSearch.value = "";
      forwardModal.classList.add("open");
      renderForwardMembers();
    }

    function closeForwardModalFn() {
      forwardPayload = null;
      forwardModal.classList.remove("open");
    }

    function renderForwardMembers() {
      if (!currentUser) return;

      const q = forwardSearch.value.trim().toLowerCase();

      const list = Object.values(usersCache)
        .filter(u => u.uid !== currentUser.uid)
        .filter(u => !isBlocked(u.uid))
        .filter(u => `${u.displayName || ""} ${u.email || ""}`.toLowerCase().includes(q))
        .sort((a, b) => (a.displayName || "").localeCompare(b.displayName || ""));

      if (!list.length) {
        forwardMembers.innerHTML = `<div class="empty-text">Aucun membre disponible.</div>`;
        return;
      }

      forwardMembers.innerHTML = list.map(u => `
        <div class="forward-member">
          <div class="avatar small">${avatarMarkup(u)}</div>
          <div class="forward-member-text">
            <strong>${escapeHtml(u.displayName || "Membre")}</strong>
            <span>${escapeHtml(u.email || "")}</span>
          </div>
          <button class="main-btn" type="button" data-forward-uid="${u.uid}">Transférer</button>
        </div>
      `).join("");

      document.querySelectorAll("[data-forward-uid]").forEach(btn => {
        btn.addEventListener("click", () => forwardMessageToUser(btn.dataset.forwardUid));
      });
    }

    async function forwardMessageToUser(targetUid) {
      if (!currentUser || !forwardPayload || !targetUid) return;

      try {
        const chatId = makeChatId(currentUser.uid, targetUid);
        const msgRef = push(ref(db, "privateMessages/" + chatId));

        await set(msgRef, {
          senderId: currentUser.uid,
          receiverId: targetUid,
          text: "Message transféré :\n" + forwardPayload.text,
          replyTo: null,
          createdAt: Date.now()
        });

        closeForwardModalFn();
        setStatus("Message transféré.");
      } catch (error) {
        console.error(error);
        setStatus("Impossible de transférer le message.", true);
      }
    }

    async function selectConversation(uid) {
      if (!currentUser) return;

      selectedUserId = uid;
      selectedUserProfile = usersCache[uid] || null;
      currentChatId = makeChatId(currentUser.uid, uid);
      replyTarget = null;

      renderReplyPreview();
      renderChatHeader();
      updateComposerState();
      setStatus("");
      listenMessages();
    }

    function renderMessages(messagesObj) {
      if (!messagesObj) {
        chatMessages.innerHTML = `<div class="empty-state">Aucun message pour le moment.</div>`;
        return;
      }

      const messages = Object.entries(messagesObj)
        .map(([id, val]) => ({ id, ...val }))
        .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      chatMessages.innerHTML = messages.map(msg => {
        const isMine = currentUser && msg.senderId === currentUser.uid;
        const sender = usersCache[msg.senderId] || {};
        return `
          <div class="message-row ${isMine ? "me" : ""}">
            <div class="message-wrap">
              <div class="message-card" id="msg-${msg.id}">
                <div class="message-head">
                  <div class="message-author">${escapeHtml(sender.displayName || "Membre")}</div>
                  <div class="message-menu-wrap">
                    <button class="message-menu-btn" type="button" data-menu-btn="${msg.id}">⋯</button>
                    <div class="message-menu" id="menu-${msg.id}">
                      <button type="button" data-reply-id="${msg.id}" data-reply-text="${encodeURIComponent(msg.text || "")}">Reply</button>
                      <button type="button" data-forward-text="${encodeURIComponent(msg.text || "")}" data-forward-sender="${encodeURIComponent(sender.displayName || "Membre")}">Transfer</button>
                      ${canDeleteMessage(msg) ? `<button class="danger" type="button" data-delete-id="${msg.id}">Delete</button>` : ""}
                    </div>
                  </div>
                </div>

                ${msg.replyTo && msg.replyTo.text ? `<div class="reply-box">${escapeHtml(msg.replyTo.text)}</div>` : ""}
                <div class="message-text">${escapeHtml(msg.text || "")}</div>
                <div class="message-time">${escapeHtml(formatDate(msg.createdAt))}</div>
              </div>
            </div>
          </div>
        `;
      }).join("");

      highlightReplySource();
      chatMessages.scrollTop = chatMessages.scrollHeight;

      document.querySelectorAll("[data-menu-btn]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const menu = document.getElementById("menu-" + btn.dataset.menuBtn);
          const isOpen = menu.classList.contains("open");
          closeAllMenus();
          if (!isOpen) menu.classList.add("open");
        });
      });

      document.querySelectorAll("[data-reply-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          replyTarget = {
            id: btn.dataset.replyId,
            text: decodeURIComponent(btn.dataset.replyText || "")
          };
          renderReplyPreview();
          highlightReplySource();
          closeAllMenus();
          messageInput.focus();
        });
      });

      document.querySelectorAll("[data-forward-text]").forEach(btn => {
        btn.addEventListener("click", () => {
          openForwardModal(
            decodeURIComponent(btn.dataset.forwardText || ""),
            decodeURIComponent(btn.dataset.forwardSender || "")
          );
          closeAllMenus();
        });
      });

      document.querySelectorAll("[data-delete-id]").forEach(btn => {
        btn.addEventListener("click", async () => {
          closeAllMenus();
          await deleteMessage(btn.dataset.deleteId);
        });
      });
    }

    function listenMessages() {
      if (!currentChatId) return;

      onValue(ref(db, "privateMessages/" + currentChatId), (snap) => {
        renderMessages(snap.val());
      }, (error) => {
        console.error(error);
        setStatus("Impossible de charger les messages.", true);
      });
    }

    async function sendMessage() {
      if (!currentUser) return;
      if (!selectedUserId) {
        alert("Choisis d’abord un membre.");
        return;
      }
      if (isBlocked(selectedUserId)) {
        setStatus("Impossible d’écrire à cet utilisateur car tu l’as bloqué.", true);
        return;
      }

      const text = messageInput.value.trim();
      if (!text) return;

      try {
        sendBtn.disabled = true;

        const msgRef = push(ref(db, "privateMessages/" + currentChatId));
        await set(msgRef, {
          senderId: currentUser.uid,
          receiverId: selectedUserId,
          text,
          replyTo: replyTarget ? {
            messageId: replyTarget.id || "",
            text: replyTarget.text || ""
          } : null,
          createdAt: Date.now()
        });

        messageInput.value = "";
        replyTarget = null;
        renderReplyPreview();
        clearReplyHighlight();
        setStatus("");
      } catch (error) {
        console.error(error);
        setStatus("Impossible d’envoyer le message.", true);
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function deleteMessage(messageId) {
      if (!currentChatId) return;
      try {
        await remove(ref(db, "privateMessages/" + currentChatId + "/" + messageId));
      } catch (error) {
        console.error(error);
        setStatus("Impossible de supprimer le message.", true);
      }
    }

    async function logout() {
      if (currentUser) {
        try {
          await set(ref(db, "presence/" + currentUser.uid), {
            online: false,
            lastSeen: Date.now(),
            displayName: currentUserProfile?.displayName || currentUser.displayName || "Utilisateur"
          });
        } catch (error) {
          console.error(error);
        }
      }

      await signOut(auth);
      window.location.href = "insights.html";
    }

    function attachEvents() {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentTab = btn.dataset.tab;
          renderMembers();
        });
      });

      memberSearch.addEventListener("input", renderMembers);

      document.querySelectorAll(".emoji-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          messageInput.value += btn.dataset.emoji;
          messageInput.focus();
        });
      });

      sendBtn.addEventListener("click", sendMessage);

      messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      logoutBtn.addEventListener("click", logout);
      chatOptionsBtn.addEventListener("click", openOptionsModal);
      closeOptionsModal.addEventListener("click", closeOptionsModalFn);
      cancelOptionsBtn.addEventListener("click", closeOptionsModalFn);
      blockToggleBtn.addEventListener("click", toggleBlockSelectedUser);

      closeForwardModalBtn.addEventListener("click", closeForwardModalFn);
      cancelForwardBtn.addEventListener("click", closeForwardModalFn);
      forwardSearch.addEventListener("input", renderForwardMembers);

      window.addEventListener("click", (e) => {
        if (!e.target.closest(".message-menu-wrap")) closeAllMenus();
        if (e.target === optionsModal) closeOptionsModalFn();
        if (e.target === forwardModal) closeForwardModalFn();
      });
    }

    function subscribeUsers() {
      onValue(ref(db, "users"), (snap) => {
        usersCache = snap.val() || {};

        if (currentUser) {
          currentUserProfile = usersCache[currentUser.uid] || currentUserProfile;
          myAvatar.innerHTML = avatarMarkup(currentUserProfile);
          myName.textContent = currentUserProfile?.displayName || "Utilisateur";
        }

        if (selectedUserId) {
          selectedUserProfile = usersCache[selectedUserId] || selectedUserProfile;
          renderChatHeader();
        }

        renderMembers();
        renderForwardMembers();
      });
    }

    function subscribePresence() {
      onValue(ref(db, "presence"), (snap) => {
        presenceCache = snap.val() || {};
        renderMembers();
        renderChatHeader();
      });
    }

    function subscribeBlockedUsers() {
      if (!currentUser) return;

      onValue(ref(db, "users/" + currentUser.uid + "/blockedUsers"), (snap) => {
        blockedUsersCache = snap.val() || {};
        renderMembers();
        renderChatHeader();
        updateComposerState();
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      currentUserProfile = await ensureMyProfile(user);

      myAvatar.innerHTML = avatarMarkup(currentUserProfile);
      myName.textContent = currentUserProfile.displayName || "Utilisateur";

      await setupPresence(user, currentUserProfile.displayName || user.displayName || "Utilisateur");

      attachEvents();
      renderReplyPreview();
      renderChatHeader();
      subscribeUsers();
      subscribePresence();
      subscribeBlockedUsers();

      const params = new URLSearchParams(window.location.search);
      const preselected = params.get("user");
      if (preselected) {
        setTimeout(() => selectConversation(preselected), 300);
      }
    });
  </script>
</body>
</html>
