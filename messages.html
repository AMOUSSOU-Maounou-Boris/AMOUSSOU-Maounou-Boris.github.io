function t(key) {
  return (i18n[currentLanguage] && i18n[currentLanguage][key]) || key;
}

function setLanguage(lang) {
  currentLanguage = lang;
  localStorage.setItem("site_lang", lang);
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang] && i18n[lang][key]) {
      el.textContent = i18n[lang][key];
    }
  });
  renderAllPanels();
  renderChatHeader();
}
setLanguage(currentLanguage);

function redirectToInsightsLoginMessage() {
  sessionStorage.setItem("insightsAuthNotice", "login required");
  window.location.href = "insights.html";
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getInitials(firstName, lastName, fullName) {
  const f = (firstName || "").trim();
  const l = (lastName || "").trim();
  if (f || l) return `${f.charAt(0)}${l.charAt(0)}`.toUpperCase();
  const parts = (fullName || "Member").trim().split(" ").filter(Boolean);
  return (parts.slice(0, 2).map(p => p.charAt(0)).join("") || "MB").toUpperCase();
}

function avatarHtml(profile, cls = "") {
  const photo = profile?.photoURL || "";
  const color = profile?.avatarColor || "#16385d";
  const initials = escapeHtml(getInitials(profile?.firstName, profile?.lastName, profile?.fullName));

  if (photo) {
    return `<div class="member-avatar ${cls}"><img src="${escapeHtml(photo)}" alt="avatar"></div>`;
  }
  return `<div class="member-avatar ${cls}" style="background:${escapeHtml(color)}">${initials}</div>`;
}

function switchTab(id, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden-panel"));
  document.getElementById(id).classList.remove("hidden-panel");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active-tab"));
  btn.classList.add("active-tab");
}

function filterMembers() {
  const q = document.getElementById("member-search").value.trim().toLowerCase();
  document.querySelectorAll(".member-list-item").forEach(item => {
    const text = item.dataset.search || "";
    item.style.display = text.includes(q) ? "flex" : "none";
  });
}

function insertEmoji(targetId, emoji) {
  const input = document.getElementById(targetId);
  if (!input) return;
  input.value += emoji;
  input.focus();
}

function formatDateTime(timestamp) {
  if (!timestamp) return "";
  const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return date.toLocaleString("fr-FR", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatLastSeen(ms) {
  const num = Number(ms || 0);
  if (!num) return "";
  const date = new Date(num);
  if (isNaN(date.getTime())) return "";
  return date.toLocaleString("fr-FR", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function canDeleteMessage(createdAt) {
  if (!createdAt) return false;
  const date = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);
  return (Date.now() - date.getTime()) <= (30 * 60 * 1000);
}

function threadIdFor(uid1, uid2) {
  return [uid1, uid2].sort().join("_");
}

function setChatStatus(text, isError = false) {
  const box = document.getElementById("chat-status-message");
  if (!box) return;
  box.textContent = text || "";
  box.style.color = isError ? "#b00020" : "#0b7a3b";
}

function unreadCountFor(data, uid) {
  if (!data || !data.unreadCountByUser) return 0;
  return data.unreadCountByUser[uid] || 0;
}

function getStatusFor(uid) {
  return statusCache[uid] || null;
}

function isOnline(uid) {
  const data = getStatusFor(uid);
  if (!data) return false;
  const lastChanged = Number(data.last_changed || 0);
  return data.state === "online" && lastChanged && ((Date.now() - lastChanged) <= ONLINE_FRESH_MS);
}

function presenceText(uid) {
  const data = getStatusFor(uid);

  if (!data) return t("offline");
  if (isOnline(uid)) return t("onlineNow");

  if (data.last_changed) {
    const formatted = formatLastSeen(data.last_changed);
    if (formatted) return `${t("offlineSince")} ${formatted}`;
  }

  return t("offline");
}

function isBlocked(uid) {
  return !!blockedUsersCache[uid];
}

function cleanupRealtimeSubscriptions() {
  try {
    if (usersUnsubscribe) usersUnsubscribe();
    if (threadsUnsubscribe) threadsUnsubscribe();
    if (blockedUnsubscribe) blockedUnsubscribe();
    if (statusesRef) statusesRef.off();
  } catch (_) {}

  usersUnsubscribe = null;
  threadsUnsubscribe = null;
  blockedUnsubscribe = null;
  statusesRef = null;
}

function stopHeartbeat() {
  if (heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
}

function writeOnlinePresence(fullName) {
  if (!presenceStatusRef) return Promise.resolve();

  return presenceStatusRef.set({
    state: "online",
    fullName: fullName || auth.currentUser?.displayName || "Member",
    last_changed: firebase.database.ServerValue.TIMESTAMP
  });
}

function startHeartbeat(fullName) {
  stopHeartbeat();

  writeOnlinePresence(fullName).catch((error) => {
    console.error("presence write error:", error);
  });

  heartbeatInterval = setInterval(() => {
    writeOnlinePresence(fullName).catch((error) => {
      console.error("presence heartbeat error:", error);
    });
  }, HEARTBEAT_MS);
}

function cleanupPresence() {
  try {
    if (presenceConnectedRef) presenceConnectedRef.off();
    if (presenceStatusRef) presenceStatusRef.off();
  } catch (_) {}

  stopHeartbeat();
  presenceConnectedRef = null;
  presenceStatusRef = null;
}

function setupPresence(user, fullName) {
  cleanupPresence();

  presenceStatusRef = rtdb.ref("/status/" + user.uid);
  presenceConnectedRef = rtdb.ref(".info/connected");

  presenceConnectedRef.on("value", (snap) => {
    if (snap.val() === false) return;

    presenceStatusRef.onDisconnect().set({
      state: "offline",
      fullName: fullName || user.displayName || "Member",
      last_changed: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {
      startHeartbeat(fullName || user.displayName || "Member");
    }).catch((error) => {
      console.error("setupPresence error:", error);
    });
  });
}

function openActionsModal() {
  if (!selectedUserId || !selectedUserProfile) return;
  document.getElementById("actions-modal").classList.remove("hidden-msg-modal");
  document.getElementById("actions-modal-name").textContent = selectedUserProfile.fullName || "Member";

  const btn = document.getElementById("block-toggle-btn");
  btn.textContent = isBlocked(selectedUserId) ? "Unblock this user" : "Block this user";
}

function closeActionsModal() {
  document.getElementById("actions-modal").classList.add("hidden-msg-modal");
}

async function toggleBlockSelectedUser() {
  const user = auth.currentUser;
  if (!user || !selectedUserId) return;

  const blockRef = db.collection("users").doc(user.uid).collection("blockedUsers").doc(selectedUserId);

  try {
    if (isBlocked(selectedUserId)) {
      await blockRef.delete();
      setChatStatus("Utilisateur débloqué.");
    } else {
      await blockRef.set({
        uid: selectedUserId,
        fullName: selectedUserProfile?.fullName || "Member",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      setChatStatus("Utilisateur bloqué.");
    }
    closeActionsModal();
  } catch (error) {
    console.error("toggleBlockSelectedUser error:", error);
    setChatStatus("Impossible de modifier le blocage.", true);
  }
}

function openForwardModal(encodedText, encodedSenderName) {
  const text = decodeURIComponent(encodedText || "");
  const senderName = decodeURIComponent(encodedSenderName || "");

  forwardPayload = {
    text,
    senderName
  };

  document.getElementById("forward-preview").textContent = `${senderName} : ${text}`;
  document.getElementById("forward-search").value = "";
  document.getElementById("forward-modal").classList.remove("hidden-msg-modal");
  renderForwardMembers();
}

function closeForwardModal() {
  forwardPayload = null;
  document.getElementById("forward-modal").classList.add("hidden-msg-modal");
}

function renderForwardMembers() {
  const user = auth.currentUser;
  const container = document.getElementById("forward-members-list");
  if (!user || !container) return;

  const q = document.getElementById("forward-search").value.trim().toLowerCase();

  const list = Object.entries(usersCache)
    .filter(([uid]) => uid !== user.uid)
    .filter(([uid]) => !isBlocked(uid))
    .filter(([uid, p]) => {
      const text = `${p.fullName || ""} ${p.institution || ""}`.toLowerCase();
      return text.includes(q);
    })
    .sort((a, b) => (a[1].fullName || "").localeCompare(b[1].fullName || ""));

  let html = "";

  list.forEach(([uid, profile]) => {
    html += `
      <div class="forward-member-item">
        ${avatarHtml(profile)}
        <div class="forward-member-text">
          <strong>${escapeHtml(profile.fullName || "Member")}</strong>
          <span>${escapeHtml(profile.institution || "")}</span>
        </div>
        <button class="modal-main-btn small-forward-btn" onclick="forwardMessageToUser('${uid}')">Transfer</button>
      </div>
    `;
  });

  container.innerHTML = html || "<p class='empty-text dark-empty-text'>No available member.</p>";
}

async function forwardMessageToUser(targetUid) {
  const user = auth.currentUser;
  if (!user || !forwardPayload || !targetUid) return;

  try {
    const targetProfile = usersCache[targetUid] || { fullName: "Member" };
    const threadId = threadIdFor(user.uid, targetUid);
    const threadRef = db.collection("privateThreads").doc(threadId);

    const forwardedText = `Transferred message from ${forwardPayload.senderName}:\n${forwardPayload.text}`;

    await threadRef.set({
      participants: [user.uid, targetUid],
      participantNames: {
        [user.uid]: currentUserProfile?.fullName || user.displayName || "Member",
        [targetUid]: targetProfile.fullName || "Member"
      },
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: forwardedText,
      lastSenderId: user.uid,
      unreadCountByUser: {
        [user.uid]: 0,
        [targetUid]: firebase.firestore.FieldValue.increment(1)
      }
    }, { merge: true });

    await threadRef.collection("messages").add({
      senderId: user.uid,
      receiverId: targetUid,
      text: forwardedText,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    closeForwardModal();
    setChatStatus("Message transféré.");
  } catch (error) {
    console.error("forwardMessageToUser error:", error);
    setChatStatus("Impossible de transférer le message.", true);
  }
}

function openReplyToMessage(messageId, senderName, text) {
  replyTargetMessage = {
    id: messageId,
    senderName: senderName || "Member",
    text: text || ""
  };

  renderReplyComposerBar();
  highlightReplySourceMessage();
  document.getElementById("message-input").focus();
}

function clearReplyTarget() {
  replyTargetMessage = null;
  renderReplyComposerBar();
  clearReplySourceHighlight();
}

function renderReplyComposerBar() {
  const mount = document.getElementById("reply-preview-mount");
  if (!mount) return;

  if (!replyTargetMessage) {
    mount.innerHTML = "";
    return;
  }

  mount.innerHTML = `
    <div class="reply-preview-box">
      <div class="reply-preview-head">
        <span class="reply-preview-title">Replying to ${escapeHtml(replyTargetMessage.senderName)}</span>
        <button class="clear-reply-btn" onclick="clearReplyTarget()">Cancel</button>
      </div>
      <div class="reply-preview-text">${escapeHtml(replyTargetMessage.text)}</div>
    </div>
  `;
}

function clearReplySourceHighlight() {
  document.querySelectorAll(".msg-bubble").forEach(el => {
    el.classList.remove("selected-reply-source");
  });
}

function highlightReplySourceMessage() {
  clearReplySourceHighlight();
  if (!replyTargetMessage) return;
  const el = document.getElementById("msg-" + replyTargetMessage.id);
  if (el) el.classList.add("selected-reply-source");
}

function renderMemberCard(uid, profile, subtitle, clickableToChat = true, showPresenceDot = false) {
  const searchText = `${(profile?.fullName || "").toLowerCase()} ${(profile?.institution || "").toLowerCase()}`;
  const online = isOnline(uid);
  const blocked = isBlocked(uid);

  return `
    <div class="member-list-item"
         data-search="${escapeHtml(searchText)}"
         ${clickableToChat ? `onclick="selectConversation('${uid}')"` : ""}>
      ${avatarHtml(profile)}

      <div class="member-text">
        <div class="member-top-line">
          <button type="button"
                  class="member-name-btn"
                  onclick="event.stopPropagation(); selectConversation('${uid}')">
            ${escapeHtml(profile?.fullName || "Member")}
          </button>
          ${blocked ? `<span class="blocked-chip">Blocked</span>` : (showPresenceDot ? `<span class="presence-chip ${online ? "online-chip" : "offline-chip"}">${escapeHtml(online ? t("onlineNow") : t("offline"))}</span>` : "")}
        </div>

        ${subtitle ? `<span class="member-subtitle">${escapeHtml(subtitle)}</span>` : ""}
        <span class="member-presence-text">${blocked ? "You blocked this user" : escapeHtml(presenceText(uid))}</span>
      </div>

      <button type="button"
              class="member-profile-btn"
              onclick="event.stopPropagation(); window.location.href='profile.html?uid=${uid}'">
        Profile
      </button>
    </div>
  `;
}

function renderAllMembers() {
  const user = auth.currentUser;
  const container = document.getElementById("all-members");
  if (!user || !container) return;

  const list = Object.entries(usersCache)
    .filter(([uid]) => uid !== user.uid)
    .sort((a, b) => (a[1].fullName || "").localeCompare(b[1].fullName || ""));

  let html = "";
  list.forEach(([uid, profile]) => {
    html += renderMemberCard(uid, profile, profile.institution || "", true, true);
  });

  container.innerHTML = html || `<p class="empty-text">${escapeHtml(t("noMemberYet"))}</p>`;
}

function renderInbox() {
  const user = auth.currentUser;
  const container = document.getElementById("inbox-list");
  if (!user || !container) return;

  const docs = threadsCache
    .filter(doc => (doc.participants || []).includes(user.uid))
    .filter(doc => (doc.lastMessage || "").trim() !== "")
    .sort((a, b) => {
      const ta = a.updatedAt?.toMillis?.() || 0;
      const tb = b.updatedAt?.toMillis?.() || 0;
      return tb - ta;
    });

  let html = "";

  docs.forEach(data => {
    const otherUserId = (data.participants || []).find(id => id !== user.uid);
    if (!otherUserId) return;

    const profile = usersCache[otherUserId] || { fullName: "Member" };
    const unread = unreadCountFor(data, user.uid);
    const blocked = isBlocked(otherUserId);

    html += `
      <div class="member-list-item"
           data-search="${escapeHtml(((profile.fullName || "") + " " + (profile.institution || "")).toLowerCase())}"
           onclick="selectConversation('${otherUserId}')">
        ${avatarHtml(profile)}

        <div class="member-text">
          <div class="member-top-line">
            <button type="button"
                    class="member-name-btn"
                    onclick="event.stopPropagation(); selectConversation('${otherUserId}')">
              ${escapeHtml(profile.fullName || "Member")}
            </button>
            ${blocked ? `<span class="blocked-chip">Blocked</span>` : (unread > 0 ? `<span class="unread-badge">${unread}</span>` : "")}
          </div>

          <span class="member-subtitle">${escapeHtml(data.lastMessage || "")}</span>
          <span class="member-presence-text">${blocked ? "You blocked this user" : escapeHtml(presenceText(otherUserId))}</span>
        </div>

        <button type="button"
                class="member-profile-btn"
                onclick="event.stopPropagation(); window.location.href='profile.html?uid=${otherUserId}'">
          Profile
        </button>
      </div>
    `;
  });

  container.innerHTML = html || `<p class="empty-text">${escapeHtml(t("noMessageReceived"))}</p>`;
}

function renderRecentThreads() {
  const user = auth.currentUser;
  const container = document.getElementById("recent-list");
  if (!user || !container) return;

  const docs = threadsCache
    .filter(doc => (doc.participants || []).includes(user.uid))
    .filter(doc => (doc.lastMessage || "").trim() !== "")
    .sort((a, b) => {
      const ta = a.updatedAt?.toMillis?.() || 0;
      const tb = b.updatedAt?.toMillis?.() || 0;
      return tb - ta;
    })
    .slice(0, 10);

  let html = "";
  docs.forEach(data => {
    const otherUserId = (data.participants || []).find(id => id !== user.uid);
    if (!otherUserId) return;
    const profile = usersCache[otherUserId] || { fullName: "Member" };
    html += renderMemberCard(otherUserId, profile, data.lastMessage || "", true, true);
  });

  container.innerHTML = html || `<p class="empty-text">${escapeHtml(t("noRecentConversation"))}</p>`;
}

function renderOnlineMembers() {
  const user = auth.currentUser;
  const container = document.getElementById("online-list");
  if (!user || !container) return;

  const list = Object.entries(usersCache)
    .filter(([uid]) => uid !== user.uid)
    .filter(([uid]) => isOnline(uid))
    .sort((a, b) => (a[1].fullName || "").localeCompare(b[1].fullName || ""));

  let html = "";
  list.forEach(([uid, profile]) => {
    html += renderMemberCard(uid, profile, profile.institution || "", true, true);
  });

  container.innerHTML = html || `<p class="empty-text">${escapeHtml(t("nobodyOnline"))}</p>`;
}

function renderAllPanels() {
  renderAllMembers();
  renderInbox();
  renderOnlineMembers();
  renderRecentThreads();
}

function renderChatHeader() {
  const box = document.getElementById("chat-user-summary");
  if (!box) return;

  if (!selectedUserId || !selectedUserProfile) {
    box.innerHTML = `
      <div class="member-avatar">MB</div>
      <div>
        <h3 id="chat-title">${escapeHtml(t("selectConversation"))}</h3>
        <p id="chat-subtitle">${escapeHtml(t("privateMessagesHere"))}</p>
        <p id="chat-presence" class="chat-presence-line"></p>
      </div>
    `;
    return;
  }

  const blocked = isBlocked(selectedUserId);

  box.innerHTML = `
    ${avatarHtml(selectedUserProfile)}
    <div class="chat-header-main">
      <div>
        <h3><a class="profile-link-dark" href="profile.html?uid=${selectedUserId}">${escapeHtml(selectedUserProfile.fullName || "Member")}</a></h3>
        <p>${escapeHtml(selectedUserProfile.institution || "Private conversation")}</p>
        <p id="chat-presence" class="chat-presence-line ${isOnline(selectedUserId) ? "presence-online" : "presence-offline"}">
          ${blocked ? "You blocked this user" : escapeHtml(presenceText(selectedUserId))}
        </p>
      </div>

      <div class="chat-header-actions">
        <button class="header-action-btn" onclick="openActionsModal()">Options</button>
      </div>
    </div>
  `;
}

function updateComposerState() {
  const input = document.getElementById("message-input");
  const sendBtn = document.querySelector(".send-btn");

  if (!input || !sendBtn) return;

  if (selectedUserId && isBlocked(selectedUserId)) {
    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = "You blocked this user. Unblock to write again.";
  } else {
    input.disabled = false;
    sendBtn.disabled = false;
    input.placeholder = "Write a private message...";
  }
}

async function selectConversation(otherUserId) {
  const user = auth.currentUser;
  if (!user) {
    redirectToInsightsLoginMessage();
    return;
  }

  selectedUserId = otherUserId;
  currentThreadId = threadIdFor(user.uid, otherUserId);
  selectedUserProfile = usersCache[otherUserId] || { fullName: "Member" };
  lastSendBlockedError = false;
  clearReplyTarget();

  renderChatHeader();
  updateComposerState();
  setChatStatus("");
  await markThreadAsRead();
  loadMessages();
}

function loadMessages() {
  if (!currentThreadId) return;

  if (threadUnsubscribe) {
    threadUnsubscribe();
    threadUnsubscribe = null;
  }

  threadUnsubscribe = db.collection("privateThreads")
    .doc(currentThreadId)
    .collection("messages")
    .orderBy("createdAt", "asc")
    .onSnapshot((snapshot) => {
      const user = auth.currentUser;
      const container = document.getElementById("chat-messages");
      let html = "";

      snapshot.docs.forEach((doc) => {
        const m = doc.data();
        const sender = usersCache[m.senderId] || {};
        const own = user && user.uid === m.senderId;

        const encodedText = encodeURIComponent(m.text || "");
        const encodedSenderName = encodeURIComponent(sender.fullName || "Member");

        const replyName = escapeHtml(m.replyTo?.senderName || "");
        const replyText = escapeHtml(m.replyTo?.text || "");
        const hasReply = !!(m.replyTo && m.replyTo.text);

        html += `
          <div class="msg-bubble ${own ? 'own-msg' : ''}" id="msg-${doc.id}">
            <div class="msg-head">
              ${avatarHtml(sender)}
              <div class="msg-head-text">
                <strong><a class="profile-link-dark" href="profile.html?uid=${m.senderId}">${escapeHtml(sender.fullName || "Member")}</a></strong>
                <span class="msg-presence-inline ${isOnline(m.senderId) ? "presence-online" : "presence-offline"}">${escapeHtml(presenceText(m.senderId))}</span>
              </div>
            </div>

            ${hasReply ? `
              <div class="quoted-reply-box">
                <div class="quoted-reply-name">Reply to ${replyName}</div>
                <div class="quoted-reply-text">${replyText}</div>
              </div>
            ` : ""}

            <div class="msg-text">${escapeHtml(m.text || "")}</div>

            <div class="msg-foot">
              <span>${escapeHtml(formatDateTime(m.createdAt))}</span>
              <div class="msg-foot-actions">
                <button class="reply-message-btn" onclick="openReplyToMessage('${doc.id}', '${escapeHtml(sender.fullName || "Member").replace(/'/g, "\\'")}', '${escapeHtml((m.text || "").replace(/\n/g, " ")).replace(/'/g, "\\'")}')">Reply</button>
                <button class="transfer-message-btn" onclick="openForwardModal('${encodedText}','${encodedSenderName}')">Transfer</button>
                ${own && canDeleteMessage(m.createdAt) ? `<button class="delete-message-btn" onclick="deleteMessage('${doc.id}')">Delete</button>` : ""}
              </div>
            </div>
          </div>
        `;
      });

      let finalHtml = html || `<p class="empty-text dark-empty-text">${escapeHtml(t("noMessageYet"))}</p>`;

      if (lastSendBlockedError) {
        finalHtml += `
          <div class="msg-system-error">
            Message impossible : l’un d’entre vous a bloqué l’autre
          </div>
        `;
      }

      container.innerHTML = finalHtml;
      container.scrollTop = container.scrollHeight;
      highlightReplySourceMessage();
    }, (error) => {
      console.error("loadMessages error:", error);
      setChatStatus(t("loadError"), true);
    });
}

async function sendMessage() {
  const user = auth.currentUser;
  if (!user) {
    redirectToInsightsLoginMessage();
    return;
  }

  if (!selectedUserId) {
    alert(t("chooseMember"));
    return;
  }

  if (isBlocked(selectedUserId)) {
    lastSendBlockedError = true;
    setChatStatus("");
    loadMessages();
    return;
  }

  const input = document.getElementById("message-input");
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.querySelector(".send-btn");
  if (sendBtn) sendBtn.disabled = true;
  setChatStatus("");

  try {
    const threadRef = db.collection("privateThreads").doc(currentThreadId);

    await threadRef.set({
      participants: [user.uid, selectedUserId],
      participantNames: {
        [user.uid]: currentUserProfile?.fullName || user.displayName || "Member",
        [selectedUserId]: selectedUserProfile?.fullName || "Member"
      },
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: text,
      lastSenderId: user.uid,
      unreadCountByUser: {
        [user.uid]: 0,
        [selectedUserId]: firebase.firestore.FieldValue.increment(1)
      }
    }, { merge: true });

    await threadRef.collection("messages").add({
      senderId: user.uid,
      receiverId: selectedUserId,
      text,
      replyTo: replyTargetMessage ? {
        messageId: replyTargetMessage.id || "",
        senderName: replyTargetMessage.senderName || "Member",
        text: replyTargetMessage.text || ""
      } : null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    input.value = "";
    lastSendBlockedError = false;
    clearReplyTarget();
  } catch (error) {
    console.error("sendMessage error:", error);

    if (String(error.message || "").toLowerCase().includes("missing or insufficient permissions")) {
      lastSendBlockedError = true;
      setChatStatus("");
      loadMessages();
    } else {
      setChatStatus(t("sendError"), true);
    }
  } finally {
    updateComposerState();
    if (sendBtn) sendBtn.disabled = false;
  }
}

async function markThreadAsRead() {
  const user = auth.currentUser;
  if (!user || !currentThreadId) return;

  try {
    await db.collection("privateThreads").doc(currentThreadId).set({
      unreadCountByUser: {
        [user.uid]: 0
      }
    }, { merge: true });
  } catch (error) {
    console.error("markThreadAsRead error:", error);
  }
}

async function deleteMessage(messageId) {
  if (!currentThreadId) return;

  try {
    await db.collection("privateThreads")
      .doc(currentThreadId)
      .collection("messages")
      .doc(messageId)
      .delete();
  } catch (error) {
    console.error("deleteMessage error:", error);
    setChatStatus(t("deleteError"), true);
  }
}

async function logoutFromMessages() {
  const user = auth.currentUser;
  const btn = document.querySelector(".sidebar-logout-btn");

  if (btn) {
    btn.disabled = true;
    btn.textContent = "Logging out...";
  }

  setChatStatus("Déconnexion en cours...");

  try {
    sessionStorage.setItem("afterMessagesLogout", "1");

    stopHeartbeat();

    if (user) {
      rtdb.ref("/status/" + user.uid).set({
        state: "offline",
        fullName: user.displayName || currentUserProfile?.fullName || "Member",
        last_changed: firebase.database.ServerValue.TIMESTAMP
      }).catch((error) => {
        console.error("presence logout error:", error);
      });
    }

    cleanupPresence();
    cleanupRealtimeSubscriptions();

    auth.signOut().catch((error) => {
      console.error("logout error:", error);
    });

    window.location.href = "insights.html";
  } catch (error) {
    console.error("logout launch error:", error);
    window.location.href = "insights.html";
  }
}

function subscribeUsers() {
  if (usersUnsubscribe) usersUnsubscribe();

  usersUnsubscribe = db.collection("users").onSnapshot((snapshot) => {
    const nextUsers = {};
    snapshot.forEach((doc) => {
      nextUsers[doc.id] = doc.data();
    });
    usersCache = nextUsers;

    if (auth.currentUser) {
      currentUserProfile = usersCache[auth.currentUser.uid] || currentUserProfile;
      document.getElementById("current-user-avatar-wrap").innerHTML = avatarHtml(currentUserProfile, "large-avatar");
      document.getElementById("current-user-name").textContent = currentUserProfile?.fullName || "Member";
    }

    if (selectedUserId) {
      selectedUserProfile = usersCache[selectedUserId] || selectedUserProfile;
      renderChatHeader();
    }

    renderAllPanels();
    updateComposerState();
    renderForwardMembers();
  });
}

function subscribeThreads() {
  const user = auth.currentUser;
  if (!user) return;

  if (threadsUnsubscribe) threadsUnsubscribe();

  threadsUnsubscribe = db.collection("privateThreads")
    .where("participants", "array-contains", user.uid)
    .onSnapshot((snapshot) => {
      threadsCache = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderInbox();
      renderRecentThreads();
    });
}

function subscribeBlockedUsers() {
  const user = auth.currentUser;
  if (!user) return;

  if (blockedUnsubscribe) blockedUnsubscribe();

  blockedUnsubscribe = db.collection("users")
    .doc(user.uid)
    .collection("blockedUsers")
    .onSnapshot((snapshot) => {
      const nextBlocked = {};
      snapshot.forEach((doc) => {
        nextBlocked[doc.id] = doc.data();
      });
      blockedUsersCache = nextBlocked;

      renderAllPanels();
      renderChatHeader();
      updateComposerState();

      const btn = document.getElementById("block-toggle-btn");
      if (btn && selectedUserId) {
        btn.textContent = isBlocked(selectedUserId) ? "Unblock this user" : "Block this user";
      }

      renderForwardMembers();
      loadMessages();
    }, (error) => {
      console.error("subscribeBlockedUsers error:", error);
    });
}

function subscribeStatuses() {
  if (statusesRef) {
    try { statusesRef.off(); } catch (_) {}
  }

  statusesRef = rtdb.ref("/status");
  statusesRef.on("value", (snapshot) => {
    const nextStatuses = {};
    snapshot.forEach((child) => {
      nextStatuses[child.key] = child.val();
    });
    statusCache = nextStatuses;

    renderAllMembers();
    renderOnlineMembers();
    renderInbox();
    renderRecentThreads();
    renderChatHeader();
  }, (error) => {
    console.error("status subscribe error:", error);
  });
}

window.addEventListener("click", (e) => {
  const actionsModal = document.getElementById("actions-modal");
  const forwardModal = document.getElementById("forward-modal");

  if (e.target === actionsModal) closeActionsModal();
  if (e.target === forwardModal) closeForwardModal();
});

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    const fromLogout = sessionStorage.getItem("afterMessagesLogout");
    if (fromLogout) {
      sessionStorage.removeItem("afterMessagesLogout");
      window.location.href = "insights.html";
      return;
    }

    redirectToInsightsLoginMessage();
    return;
  }

  const snap = await db.collection("users").doc(user.uid).get();
  currentUserProfile = snap.exists ? snap.data() : { fullName: user.displayName || "Member" };

  document.getElementById("current-user-avatar-wrap").innerHTML = avatarHtml(currentUserProfile, "large-avatar");
  document.getElementById("current-user-name").textContent = currentUserProfile.fullName || "Member";

  setupPresence(user, currentUserProfile.fullName || user.displayName || "Member");

  renderChatHeader();
  renderReplyComposerBar();
  subscribeUsers();
  subscribeThreads();
  subscribeBlockedUsers();
  subscribeStatuses();

  const params = new URLSearchParams(window.location.search);
  const preselectedUser = params.get("user");
  if (preselectedUser) {
    setTimeout(() => selectConversation(preselectedUser), 300);
  }
});
</script>
