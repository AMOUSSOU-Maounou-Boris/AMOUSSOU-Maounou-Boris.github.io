<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Profile</title>
</head>
<body>

<h2>My Profile</h2>

<input type="text" id="name" placeholder="Name"><br><br>
<input type="text" id="city" placeholder="City"><br><br>

<input type="file" id="photo"><br><br>

<button onclick="saveProfile()">Save</button>

<p id="msg"></p>

<img id="profileImg" width="120">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = { apiKey:"AIzaSy...", authDomain:"...", databaseURL:"...", projectId:"...", storageBucket:"..." };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

window.saveProfile = async function(){
  const user = auth.currentUser;

  if(!user){
    alert("Not connected");
    return;
  }

  const file = photo.files[0];
  let photoURL = "";

  if(file){
    const storageRef = sRef(storage, "users/"+user.uid+"/profile/photo.jpg");
    await uploadBytes(storageRef, file);
    photoURL = await getDownloadURL(storageRef);
  }

  await set(ref(db,"users/"+user.uid),{
    name: name.value,
    city: city.value,
    country: "Auto", 
    photo: photoURL
  });

  msg.innerText="Saved ✔️";

  setTimeout(()=>{
    window.location.href="insights.html";
  },800);
}
</script>

</body>
</html>
