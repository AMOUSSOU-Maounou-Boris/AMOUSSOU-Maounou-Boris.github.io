<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:Arial, sans-serif; }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#07294d,#0b3f76);
      padding:20px;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:24px;
      padding:28px;
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
    }

    h1{
      font-size:32px;
      color:#082c53;
      margin-bottom:10px;
      text-align:center;
    }

    .sub{
      color:#5e738b;
      margin-bottom:18px;
      line-height:1.5;
      text-align:center;
    }

    .field{ margin-bottom:14px; }

    .field label{
      display:block;
      margin-bottom:6px;
      font-weight:700;
      color:#0b2f57;
    }

    .field input{
      width:100%;
      padding:13px;
      border:1px solid #d6e0ea;
      border-radius:14px;
      outline:none;
      font-size:15px;
    }

    .field input:focus{
      border-color:#7fb5ff;
      box-shadow:0 0 0 3px rgba(47,140,255,0.12);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      font-weight:800;
      cursor:pointer;
      margin-top:8px;
      font-size:15px;
    }

    .btn-primary{
      background:#0c3d73;
      color:#fff;
    }

    .btn-secondary{
      background:#eef4fb;
      color:#0b2f57;
    }

    .msg{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#b42318;
      line-height:1.5;
      min-height:24px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .msg.success{ color:#15803d; }

    .links{
      text-align:center;
      margin-top:16px;
      font-size:14px;
      line-height:1.6;
    }

    .links a{
      color:#0c3d73;
      font-weight:700;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p class="sub">Connecte-toi pour accéder à l’espace privé.</p>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="Ex: boris@gmail.com">
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Ton mot de passe">
    </div>

    <button class="btn btn-primary" id="loginBtn">Se connecter</button>
    <button class="btn btn-secondary" id="forgotBtn">Mot de passe oublié ?</button>

    <div class="msg" id="messageBox"></div>

    <div class="links">
      Première visite avec invitation ? <a href="signup.html">Créer un compte</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      reload
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      ref,
      get,
      set,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const ADMIN_EMAIL = "borisamoussou01@gmail.com";
    const LAST_ACTIVITY_KEY = "insights_last_activity";

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const forgotBtn = document.getElementById("forgotBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, ok = false) {
      messageBox.textContent = text;
      messageBox.className = ok ? "msg success" : "msg";
    }

    function isAdminEmail(mail = "") {
      return String(mail).trim().toLowerCase() === ADMIN_EMAIL.toLowerCase();
    }

    function goToInsights() {
      localStorage.setItem(LAST_ACTIVITY_KEY, String(Date.now()));
      setTimeout(() => {
        window.location.replace("./insights.html");
      }, 600);
    }

    async function ensureAdminProfile(user) {
      const userRef = ref(db, "users/" + user.uid);
      const snap = await get(userRef);

      const baseData = {
        uid: user.uid,
        displayName: user.displayName || "Maounou Boris AMOUSSOU",
        email: user.email || ADMIN_EMAIL,
        photoURL: "",
        bio: "",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        role: "admin",
        accountStatus: "approved",
        approvedBy: ADMIN_EMAIL,
        approvedAt: Date.now(),
        rejectedAt: 0,
        emailVerifiedAtSignup: true,
        privacy: {
          hideEmail: true,
          hideBio: false,
          hidePresence: false
        },
        presence: {
          online: false,
          lastSeen: Date.now()
        }
      };

      if (!snap.exists()) {
        await set(userRef, baseData);
        return;
      }

      const existing = snap.val() || {};
      await set(userRef, {
        ...baseData,
        ...existing,
        uid: user.uid,
        email: user.email || ADMIN_EMAIL,
        role: "admin",
        accountStatus: "approved",
        approvedBy: ADMIN_EMAIL,
        approvedAt: existing.approvedAt || Date.now(),
        rejectedAt: 0,
        emailVerifiedAtSignup: true,
        updatedAt: Date.now()
      });
    }

    async function loginUser() {
      const mail = emailInput.value.trim().toLowerCase();
      const pass = passwordInput.value;

      if (!mail || !pass) {
        showMessage("Remplis ton e-mail et ton mot de passe.");
        return;
      }

      loginBtn.disabled = true;
      forgotBtn.disabled = true;
      showMessage("Connexion en cours...", true);

      try {
        const cred = await signInWithEmailAndPassword(auth, mail, pass);
        const user = cred.user;
        await reload(user);

        if (isAdminEmail(user.email || mail)) {
          await ensureAdminProfile(user);
          showMessage("Connexion administrateur réussie.", true);
          goToInsights();
          return;
        }

        if (!user.emailVerified) {
          showMessage("Vérifie d’abord ton adresse e-mail avant de te connecter.");
          return;
        }

        const userRef = ref(db, "users/" + user.uid);
        const snap = await get(userRef);

        if (!snap.exists()) {
          showMessage("Compte introuvable dans la base de données.");
          return;
        }

        const userData = snap.val() || {};
        const status = userData.accountStatus || "pending_admin_approval";

        if (status === "approved") {
          await update(userRef, {
            updatedAt: Date.now(),
            emailVerifiedAtSignup: true
          });
          showMessage("Connexion réussie.", true);
          goToInsights();
          return;
        }

        if (status === "rejected") {
          showMessage("Ton compte a été refusé par l’administrateur.");
          return;
        }

        try {
          await update(ref(db, "accountApprovals/" + user.uid), {
            emailVerified: true,
            verifiedAt: Date.now(),
            status: "pending_admin_approval"
          });
        } catch (e) {
          console.error(e);
        }

        showMessage("Ton compte est encore en attente d’approbation.");
      } catch (error) {
        console.error("LOGIN ERROR:", error);

        if (
          error.code === "auth/invalid-credential" ||
          error.code === "auth/wrong-password" ||
          error.code === "auth/user-not-found"
        ) {
          showMessage("Adresse e-mail ou mot de passe incorrect.");
        } else if (error.code === "auth/invalid-email") {
          showMessage("Adresse e-mail invalide.");
        } else if (error.code === "auth/too-many-requests") {
          showMessage("Trop de tentatives. Réessaie plus tard.");
        } else {
          showMessage(`Erreur réelle : ${error.code || "inconnue"} ${error.message || ""}`);
        }
      } finally {
        loginBtn.disabled = false;
        forgotBtn.disabled = false;
      }
    }

    async function forgotPassword() {
      const mail = emailInput.value.trim().toLowerCase();

      if (!mail) {
        showMessage("Entre d’abord ton adresse e-mail.");
        return;
      }

      forgotBtn.disabled = true;
      loginBtn.disabled = true;
      showMessage("");

      try {
        await sendPasswordResetEmail(auth, mail);
        showMessage("Lien de réinitialisation envoyé par e-mail.", true);
      } catch (error) {
        console.error(error);
        if (error.code === "auth/invalid-email") {
          showMessage("Adresse e-mail invalide.");
        } else {
          showMessage(`Erreur réelle : ${error.code || "inconnue"} ${error.message || ""}`);
        }
      } finally {
        forgotBtn.disabled = false;
        loginBtn.disabled = false;
      }
    }

    loginBtn.addEventListener("click", loginUser);
    forgotBtn.addEventListener("click", forgotPassword);

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginUser();
      });
    });
  </script>
</body>
</html>
