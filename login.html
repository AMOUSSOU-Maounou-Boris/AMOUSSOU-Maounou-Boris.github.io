<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
.green-dot{
  width:12px;
  height:12px;
  background:green;
  border-radius:50%;
  margin:10px auto;
  display:none;
  animation: blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0.3;}
}
</style>

</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p><a href="#">Mot de passe oublié ?</a></p>

<div id="connectedDot" class="green-dot"></div>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = { apiKey:"AIzaSy...", authDomain:"...", databaseURL:"...", projectId:"...", storageBucket:"..." };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){
  try{
    const userCred = await signInWithEmailAndPassword(auth, email.value, password.value);

    if(!userCred.user.emailVerified){
      msg.innerText = "Verify your email first";
      return;
    }

    connectedDot.style.display = "block";

    setTimeout(()=>{
      window.location.href="insights.html";
    },1000);

  }catch(e){
    msg.style.color="#ff9800";
    msg.innerText="Login failed";
    msg.animate([{transform:"translateX(-5px)"},{transform:"translateX(5px)"}],{duration:200,iterations:3});
  }
}
</script>

</body>
</html>
