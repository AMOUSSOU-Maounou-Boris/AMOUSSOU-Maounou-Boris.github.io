<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #07294d, #0b3f76);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 32px;
      color: #082c53;
      margin-bottom: 10px;
    }

    .sub {
      color: #5e738b;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: #0b2f57;
    }

    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d6e0ea;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
    }

    .field input:focus {
      border-color: #7fb5ff;
      box-shadow: 0 0 0 3px rgba(47,140,255,0.12);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-primary {
      background: #0c3d73;
      color: #fff;
    }

    .btn-secondary {
      background: #eef4fb;
      color: #0b2f57;
    }

    .msg {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      text-align: center;
      color: #b42318;
      line-height: 1.5;
    }

    .msg.success { color: #15803d; }

    .links {
      text-align: center;
      margin-top: 16px;
      color: #4e6278;
      font-size: 14px;
      line-height: 1.6;
    }

    .links a {
      color: #0c3d73;
      text-decoration: none;
      font-weight: 700;
    }

    .small-note {
      margin-top: 12px;
      font-size: 13px;
      color: #5e738b;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p class="sub">Connecte-toi pour accéder à l’espace privé.</p>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="Ex: boris@gmail.com">
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Ton mot de passe">
    </div>

    <button class="btn btn-primary" id="loginBtn">Se connecter</button>
    <button class="btn btn-secondary" id="forgotBtn">Mot de passe oublié</button>

    <div class="msg" id="messageBox"></div>

    <div class="links">
      Première visite avec invitation ? <a href="signup.html">Créer un compte</a>
    </div>

    <div class="small-note">
      L’accès aux espaces privés est réservé aux comptes vérifiés et approuvés, sauf le compte administrateur.
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged,
      signOut,
      reload
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      ref,
      get,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const forgotBtn = document.getElementById("forgotBtn");
    const messageBox = document.getElementById("messageBox");

    const LAST_ACTIVITY_KEY = "insights_last_activity";
    const INACTIVITY_LIMIT = 15 * 60 * 1000;
    const ADMIN_EMAIL = "borisamoussou01@gmail.com";

    function showMessage(text, ok = false) {
      messageBox.textContent = text;
      messageBox.className = ok ? "msg success" : "msg";
    }

    function isAdminEmail(mail = "") {
      return String(mail).trim().toLowerCase() === ADMIN_EMAIL.toLowerCase();
    }

    async function redirectApprovedUser(userData = {}) {
      localStorage.setItem(LAST_ACTIVITY_KEY, String(Date.now()));

      if ((userData.role || "") === "admin" || isAdminEmail(userData.email || auth.currentUser?.email || "")) {
        window.location.href = "insights.html";
        return;
      }

      window.location.href = "insights.html";
    }

    async function loginUser() {
      const mail = email.value.trim().toLowerCase();
      const pass = password.value;

      if (!mail || !pass) {
        showMessage("Remplis ton e-mail et ton mot de passe.");
        return;
      }

      loginBtn.disabled = true;
      forgotBtn.disabled = true;
      showMessage("Connexion en cours...", true);

      try {
        const cred = await signInWithEmailAndPassword(auth, mail, pass);
        const user = cred.user;

        await reload(user);

        const adminLogin = isAdminEmail(user.email || mail);

        if (!adminLogin && !user.emailVerified) {
          try { await signOut(auth); } catch (e) {}
          showMessage("Vérifie d’abord ton adresse e-mail avant de te connecter.");
          loginBtn.disabled = false;
          forgotBtn.disabled = false;
          return;
        }

        const userRef = ref(db, "users/" + user.uid);
        const userSnap = await get(userRef);

        if (!userSnap.exists()) {
          if (adminLogin) {
            await update(userRef, {
              uid: user.uid,
              displayName: user.displayName || "Administrateur",
              email: user.email || ADMIN_EMAIL,
              photoURL: user.photoURL || "",
              bio: "",
              createdAt: Date.now(),
              updatedAt: Date.now(),
              accountStatus: "approved",
              emailVerifiedAtSignup: true,
              approvedBy: ADMIN_EMAIL,
              approvedAt: Date.now(),
              rejectedAt: 0,
              role: "admin",
              privacy: {
                hideEmail: true,
                hideBio: false,
                hidePresence: false
              }
            });

            showMessage("Connexion administrateur réussie.", true);
            await redirectApprovedUser({
              role: "admin",
              email: user.email || ADMIN_EMAIL
            });
            return;
          }

          try { await signOut(auth); } catch (e) {}
          showMessage("Compte introuvable dans la base de données.");
          loginBtn.disabled = false;
          forgotBtn.disabled = false;
          return;
        }

        const userData = userSnap.val() || {};
        const accountStatus = userData.accountStatus || "pending_admin_approval";

        if (adminLogin) {
          await update(userRef, {
            email: user.email || ADMIN_EMAIL,
            displayName: userData.displayName || user.displayName || "Administrateur",
            updatedAt: Date.now(),
            accountStatus: "approved",
            emailVerifiedAtSignup: true,
            approvedBy: ADMIN_EMAIL,
            approvedAt: userData.approvedAt || Date.now(),
            rejectedAt: 0,
            role: "admin"
          });

          showMessage("Connexion administrateur réussie.", true);
          await redirectApprovedUser({
            ...userData,
            role: "admin",
            email: user.email || ADMIN_EMAIL
          });
          return;
        }

        if (accountStatus === "approved") {
          await update(userRef, {
            emailVerifiedAtSignup: true,
            updatedAt: Date.now()
          });

          showMessage("Connexion réussie.", true);
          await redirectApprovedUser(userData);
          return;
        }

        if (accountStatus === "rejected") {
          try { await signOut(auth); } catch (e) {}
          showMessage("Ton compte a été refusé par l’administrateur.");
          loginBtn.disabled = false;
          forgotBtn.disabled = false;
          return;
        }

        await update(userRef, {
          emailVerifiedAtSignup: true,
          updatedAt: Date.now()
        });

        try {
          await update(ref(db, "accountApprovals/" + user.uid), {
            emailVerified: true,
            verifiedAt: Date.now(),
            status: "pending_admin_approval"
          });
        } catch (e) {
          console.error(e);
        }

        try { await signOut(auth); } catch (e) {}
        showMessage("Ton e-mail est vérifié, mais ton compte est encore en attente d’approbation par l’administrateur.");
        loginBtn.disabled = false;
        forgotBtn.disabled = false;

      } catch (error) {
        console.error(error);

        if (
          error.code === "auth/invalid-credential" ||
          error.code === "auth/wrong-password" ||
          error.code === "auth/user-not-found"
        ) {
          showMessage("Adresse e-mail ou mot de passe incorrect.");
        } else if (error.code === "auth/invalid-email") {
          showMessage("Adresse e-mail invalide.");
        } else if (error.code === "auth/too-many-requests") {
          showMessage("Trop de tentatives. Réessaie plus tard.");
        } else {
          showMessage("Connexion impossible pour le moment.");
        }

        loginBtn.disabled = false;
        forgotBtn.disabled = false;
      }
    }

    async function forgotPassword() {
      const mail = email.value.trim().toLowerCase();

      if (!mail) {
        showMessage("Entre d’abord ton adresse e-mail.");
        return;
      }

      forgotBtn.disabled = true;
      loginBtn.disabled = true;
      showMessage("");

      try {
        await sendPasswordResetEmail(auth, mail);
        showMessage("Lien de réinitialisation envoyé par e-mail.", true);
      } catch (error) {
        console.error(error);

        if (error.code === "auth/invalid-email") {
          showMessage("Adresse e-mail invalide.");
        } else {
          showMessage("Impossible d’envoyer le lien de réinitialisation.");
        }
      }

      forgotBtn.disabled = false;
      loginBtn.disabled = false;
    }

    loginBtn.addEventListener("click", loginUser);
    forgotBtn.addEventListener("click", forgotPassword);

    [email, password].forEach(input => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginUser();
      });
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      try {
        await reload(user);

        const adminLogin = isAdminEmail(user.email || "");
        if (!adminLogin && !user.emailVerified) {
          try { await signOut(auth); } catch (e) {}
          return;
        }

        const lastActivity = Number(localStorage.getItem(LAST_ACTIVITY_KEY) || "0");
        if (lastActivity && Date.now() - lastActivity > INACTIVITY_LIMIT) {
          try { await signOut(auth); } catch (e) {}
          return;
        }

        const userSnap = await get(ref(db, "users/" + user.uid));

        if (!userSnap.exists()) {
          if (adminLogin) {
            await update(ref(db, "users/" + user.uid), {
              uid: user.uid,
              displayName: user.displayName || "Administrateur",
              email: user.email || ADMIN_EMAIL,
              photoURL: user.photoURL || "",
              bio: "",
              createdAt: Date.now(),
              updatedAt: Date.now(),
              accountStatus: "approved",
              emailVerifiedAtSignup: true,
              approvedBy: ADMIN_EMAIL,
              approvedAt: Date.now(),
              rejectedAt: 0,
              role: "admin",
              privacy: {
                hideEmail: true,
                hideBio: false,
                hidePresence: false
              }
            });

            await redirectApprovedUser({
              role: "admin",
              email: user.email || ADMIN_EMAIL
            });
            return;
          }

          try { await signOut(auth); } catch (e) {}
          return;
        }

        const userData = userSnap.val() || {};

        if (adminLogin) {
          await update(ref(db, "users/" + user.uid), {
            updatedAt: Date.now(),
            accountStatus: "approved",
            emailVerifiedAtSignup: true,
            approvedBy: ADMIN_EMAIL,
            approvedAt: userData.approvedAt || Date.now(),
            rejectedAt: 0,
            role: "admin"
          });

          await redirectApprovedUser({
            ...userData,
            role: "admin",
            email: user.email || ADMIN_EMAIL
          });
          return;
        }

        if ((userData.accountStatus || "") === "approved") {
          await redirectApprovedUser(userData);
          return;
        }

        try { await signOut(auth); } catch (e) {}
      } catch (e) {
        console.error(e);
        try { await signOut(auth); } catch (err) {}
      }
    });
  </script>
</body>
</html>
