<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion | Boris Research Hub</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; }

    :root{
      --bg:#eaf5ff;
      --card:#ffffff;
      --nav:#082e5b;
      --text:#0b2340;
      --muted:#6b7d93;
      --blue:#2f8cff;
      --blue-dark:#0f4d92;
      --green:#18c34a;
      --red:#df4b4b;
      --shadow:0 14px 34px rgba(7,31,66,0.10);
      --line:#d9e5f2;
      --soft:#f4f8fc;
      --gold:#d1a028;
      --orange:#ff9f1a;
      --chem-deep:#061631;
      --chem-mid:#0c2f69;
      --chem-light:#49c8ff;
      --chem-ice:#dff7ff;
    }

    html, body{
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
      position:relative;
      opacity:0;
      transition:opacity .18s ease;
      background:
        radial-gradient(circle at 12% 70%, rgba(255,190,120,0.95) 0%, rgba(255,190,120,0.18) 10%, rgba(255,190,120,0.00) 20%),
        radial-gradient(circle at 78% 72%, rgba(255,196,120,0.55) 0%, rgba(255,196,120,0.13) 10%, rgba(255,196,120,0.00) 24%),
        radial-gradient(circle at 84% 18%, rgba(118,225,255,0.32) 0%, rgba(118,225,255,0.07) 11%, rgba(118,225,255,0) 24%),
        radial-gradient(circle at 18% 18%, rgba(127,211,255,0.28) 0%, rgba(127,211,255,0.08) 10%, rgba(127,211,255,0) 24%),
        linear-gradient(118deg, #041126 0%, #0a2659 34%, #133d84 58%, #0a285d 75%, #031228 100%);
      background-attachment:fixed;
    }

    body.page-ready{ opacity:1; }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.10), rgba(255,255,255,0) 36%),
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 65% 22%, rgba(255,255,255,0.10) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 84% 62%, rgba(255,255,255,0.12) 0 1.6px, transparent 2.6px),
        radial-gradient(circle at 36% 78%, rgba(255,255,255,0.10) 0 1.4px, transparent 2.4px),
        radial-gradient(circle at 11% 58%, rgba(255,255,255,0.16) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 82%, rgba(255,255,255,0.11) 0 2px, transparent 3px);
      background-size:100% 100%, 260px 260px, 330px 330px, 380px 380px, 290px 290px, 420px 420px, 520px 520px;
      animation:starPulse 9s linear infinite;
      opacity:.92;
      z-index:0;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(120,215,255,0.16), rgba(120,215,255,0) 55%),
        linear-gradient(90deg, rgba(124,219,255,0) 0%, rgba(124,219,255,0.10) 48%, rgba(124,219,255,0.24) 50%, rgba(124,219,255,0.10) 52%, rgba(124,219,255,0) 100%);
      mix-blend-mode:screen;
      animation:auroraSweep 14s ease-in-out infinite;
      z-index:0;
    }

    .chem-scene{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:1;
    }

    .chem-particles,
    .chem-particles::before,
    .chem-particles::after{
      position:absolute;
      inset:0;
      content:"";
      pointer-events:none;
      background-repeat:repeat;
      opacity:.6;
      z-index:1;
    }

    .chem-particles{
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 2px, transparent 2.8px),
        radial-gradient(circle, rgba(181,233,255,.72) 0 1.4px, transparent 2.2px),
        radial-gradient(circle, rgba(255,255,255,.48) 0 3px, transparent 4px);
      background-size:180px 180px, 120px 120px, 260px 260px;
      animation:particleDrift 24s linear infinite;
    }

    .chem-particles::before{
      background-image:
        radial-gradient(circle, rgba(255,255,255,.70) 0 1.6px, transparent 2.2px),
        radial-gradient(circle, rgba(160,224,255,.45) 0 3px, transparent 3.8px);
      background-size:220px 220px, 300px 300px;
      animation:particleDriftReverse 30s linear infinite;
    }

    .chem-particles::after{
      background-image:
        radial-gradient(circle, rgba(255,255,255,.30) 0 5px, transparent 6.5px),
        radial-gradient(circle, rgba(255,255,255,.55) 0 1.2px, transparent 2px);
      background-size:340px 340px, 110px 110px;
      animation:particlePulse 10s ease-in-out infinite;
    }

    .chem-orbit{
      position:absolute;
      left:-8vw;
      bottom:4vh;
      width:35vw;
      height:35vw;
      min-width:260px;
      min-height:260px;
      border-radius:50%;
      background:
        radial-gradient(circle at 24% 28%, rgba(255,255,255,0.82) 0%, rgba(163,225,255,0.88) 10%, rgba(42,116,191,0.82) 30%, rgba(8,31,77,0.85) 62%, rgba(3,12,31,0.96) 100%);
      box-shadow:
        0 0 90px rgba(82,193,255,0.25),
        0 0 180px rgba(91,194,255,0.15);
      filter:saturate(1.12);
      opacity:.96;
      animation:planetFloat 9s ease-in-out infinite;
    }

    .chem-orbit::before{
      content:"";
      position:absolute;
      inset:16% -14%;
      border-radius:50%;
      border:8px solid rgba(109,208,255,0.18);
      transform:rotate(-20deg);
      box-shadow:
        0 0 18px rgba(140,225,255,0.18),
        inset 0 0 20px rgba(140,225,255,0.08);
    }

    .chem-orbit::after{
      content:"";
      position:absolute;
      inset:21% -5%;
      border-radius:50%;
      border:4px solid rgba(148,229,255,0.22);
      transform:rotate(-20deg);
    }

    .chem-dna{
      position:absolute;
      top:-3vh;
      right:-1vw;
      width:20vw;
      min-width:170px;
      height:110vh;
      opacity:.55;
      filter:drop-shadow(0 0 16px rgba(165,230,255,0.18));
      animation:dnaGlow 8s ease-in-out infinite;
    }

    .chem-dna::before,
    .chem-dna::after{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      width:44%;
      border-radius:48% 52% 49% 51% / 6% 6% 6% 6%;
      background:
        radial-gradient(circle, rgba(255,255,255,.92) 0 3px, transparent 4px) center 0/100% 62px repeat-y,
        linear-gradient(180deg, rgba(235,247,255,.95), rgba(155,212,255,.35));
      opacity:.92;
    }

    .chem-dna::before{
      left:8%;
      transform:skewY(7deg);
      clip-path:path("M 30 0 C 120 60, 0 120, 90 180 C 180 240, 60 300, 150 360 C 240 420, 120 480, 210 540 C 300 600, 180 660, 270 720 C 360 780, 240 840, 330 900 C 420 960, 300 1020, 390 1080 L 210 1080 C 120 1020, 240 960, 150 900 C 60 840, 180 780, 90 720 C 0 660, 120 600, 30 540 C -60 480, 60 420, -30 360 C -120 300, 0 240, -90 180 C -180 120, -60 60, 30 0 Z");
    }

    .chem-dna::after{
      right:8%;
      transform:scaleX(-1) skewY(7deg);
      clip-path:path("M 30 0 C 120 60, 0 120, 90 180 C 180 240, 60 300, 150 360 C 240 420, 120 480, 210 540 C 300 600, 180 660, 270 720 C 360 780, 240 840, 330 900 C 420 960, 300 1020, 390 1080 L 210 1080 C 120 1020, 240 960, 150 900 C 60 840, 180 780, 90 720 C 0 660, 120 600, 30 540 C -60 480, 60 420, -30 360 C -120 300, 0 240, -90 180 C -180 120, -60 60, 30 0 Z");
    }

    .chem-dna-lines{
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,
          transparent 16%,
          rgba(222,244,255,.78) 16.5%,
          rgba(222,244,255,.78) 19%,
          transparent 19.5%,
          transparent 42%,
          rgba(222,244,255,.62) 42.5%,
          rgba(222,244,255,.62) 45%,
          transparent 45.5%,
          transparent 68%,
          rgba(222,244,255,.72) 68.5%,
          rgba(222,244,255,.72) 71%,
          transparent 71.5%);
      background-size:100% 64px;
      opacity:.45;
      mix-blend-mode:screen;
    }

    .chem-network,
    .chem-network-right{
      position:absolute;
      pointer-events:none;
      opacity:.48;
      filter:drop-shadow(0 0 10px rgba(118,224,255,0.15));
    }

    .chem-network{
      left:0;
      top:10vh;
      width:38vw;
      min-width:300px;
      height:54vh;
    }

    .chem-network-right{
      right:7vw;
      top:24vh;
      width:30vw;
      min-width:250px;
      height:42vh;
      opacity:.58;
    }

    .chem-network svg,
    .chem-network-right svg{
      width:100%;
      height:100%;
    }

    .chem-label{
      position:absolute;
      font-weight:700;
      color:rgba(255,255,255,.32);
      text-shadow:0 0 12px rgba(255,255,255,.08);
      letter-spacing:.04em;
      user-select:none;
      pointer-events:none;
      animation:floatLabel 7s ease-in-out infinite;
    }

    .chem-label.h2o{ left:25vw; top:26vh; font-size:2rem; }
    .chem-label.nh2{ left:24vw; top:40vh; font-size:2.2rem; animation-delay:-2s; }
    .chem-label.ch3{ right:24vw; bottom:20vh; font-size:2.3rem; animation-delay:-4s; }

    .topbar{
      background:rgba(8,46,91,0.90);
      padding:18px 20px;
      position:sticky;
      top:0;
      z-index:20;
      box-shadow:0 4px 16px rgba(0,0,0,0.10);
      backdrop-filter:blur(6px);
    }

    .topbar nav{
      display:flex;
      gap:18px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
    }

    .topbar a{
      color:#fff;
      text-decoration:none;
      font-weight:700;
      font-size:17px;
      padding:4px 2px;
      border-bottom:3px solid transparent;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .topbar a.active{ border-bottom-color:#fff; }

    .auth-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:26px 20px 22px;
      z-index:60;
      background:linear-gradient(rgba(2,9,23,0.12), rgba(2,9,23,0.22));
      overflow-y:auto;
      overflow-x:hidden;
      overscroll-behavior:contain;
    }

    .auth-card{
      width:100%;
      max-width:860px;
      min-height:calc(100vh - 86px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:transparent;
      border:none;
      border-radius:0;
      box-shadow:none;
      padding:36px 0 34px;
      text-align:center;
      color:#fff;
      position:relative;
      z-index:2;
      margin:auto 0;
    }

    .auth-brand-wrap{
      margin:0 auto 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      text-align:center;
      transform:translateY(18px);
    }

    .auth-logo-line{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .chem-logo{
      width:138px;
      height:138px;
      flex:0 0 138px;
      filter:drop-shadow(0 10px 26px rgba(0,0,0,.25));
    }

    .chem-logo svg{
      width:100%;
      height:100%;
      display:block;
    }

    .brand-text{
      text-align:left;
      color:#fff;
      text-shadow:0 4px 22px rgba(0,0,0,.32);
    }

    .brand-title{
      margin:0;
      font-size:clamp(2.3rem, 4.4vw, 4.5rem);
      line-height:1;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .brand-title .light{
      color:#70d5ff;
      text-shadow:0 0 18px rgba(112,213,255,.25);
    }

    .brand-sub{
      margin:8px 0 0;
      font-size:clamp(1rem, 1.5vw, 1.55rem);
      font-weight:800;
      letter-spacing:.42em;
      color:rgba(255,255,255,.95);
      text-transform:uppercase;
      padding-left:8px;
    }

    .auth-subtitle{
      margin:0 auto 22px;
      text-align:center;
      color:#ffffff;
      line-height:1.62;
      font-size:clamp(1rem, 1.55vw, 1.9rem);
      font-weight:600;
      max-width:740px;
      text-shadow:0 2px 12px rgba(0,0,0,0.28);
    }

    .auth-subtitle strong{
      font-style:italic;
      font-weight:900;
    }

    .auth-form-shell{
      width:100%;
      max-width:700px;
      margin:0 auto;
      padding:14px 18px 10px;
      position:relative;
      flex:0 0 auto;
    }

    .auth-row{
      width:100%;
      max-width:620px;
      margin:0 auto 16px;
      display:flex;
      align-items:center;
      gap:16px;
      border:1px solid rgba(214,238,255,0.20);
      border-radius:10px;
      padding:0 20px;
      min-height:74px;
      background:
        linear-gradient(180deg, rgba(18,66,140,0.40), rgba(10,43,102,0.48)),
        rgba(14,47,102,0.48);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 10px 24px rgba(0,0,0,0.12),
        0 0 28px rgba(108,192,255,0.08);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      position:relative;
      overflow:hidden;
    }

    .auth-row::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(100deg, rgba(255,255,255,.10), rgba(255,255,255,0) 25%, rgba(255,255,255,.03) 52%, rgba(255,255,255,0) 68%);
      pointer-events:none;
    }

    .auth-row:hover,
    .auth-row:focus-within{
      border-color:rgba(151,229,255,0.34);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 12px 28px rgba(0,0,0,0.16),
        0 0 34px rgba(118,210,255,0.14);
      transform:translateY(-1px);
    }

    .auth-icon{
      width:34px;
      height:34px;
      flex:0 0 34px;
      display:flex;
      align-items:center;
      justify-content:center;
      background-position:center;
      background-repeat:no-repeat;
      background-size:26px 26px;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.18));
      opacity:.96;
    }

    .auth-icon.mail{
      background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.04-.14 6.33 5.01a1 1 0 0 0 1.26 0l6.33-5.01a.75.75 0 0 0-.46-.11H5.5c-.17 0-.33.04-.46.11Zm14.46 1.84-5.93 4.69a2.5 2.5 0 0 1-3.14 0L4.5 8.45v8.8c0 .69.56 1.25 1.25 1.25h12.5c.69 0 1.25-.56 1.25-1.25v-8.8Z"/></svg>');
    }

    .auth-icon.lock{
      background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M7.5 10V8a4.5 4.5 0 1 1 9 0v2h.75A2.75 2.75 0 0 1 20 12.75v6.5A2.75 2.75 0 0 1 17.25 22h-10.5A2.75 2.75 0 0 1 4 19.25v-6.5A2.75 2.75 0 0 1 6.75 10h.75Zm1.5 0h6V8a3 3 0 1 0-6 0v2Zm3 3a1.75 1.75 0 0 1 1 3.18V18a1 1 0 1 1-2 0v-1.82A1.75 1.75 0 0 1 12 13Z"/></svg>');
    }

    .auth-row input,
    .support-input,
    .support-textarea{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      font-family:inherit;
      color:#ffffff;
      font-weight:800;
      letter-spacing:.01em;
    }

    .auth-row input{
      padding:20px 0;
      font-size:1.34rem;
    }

    .auth-row input::placeholder,
    .support-input::placeholder,
    .support-textarea::placeholder{
      color:#f5f8ff;
      opacity:1;
      font-weight:800;
    }

    .auth-inline-links{
      width:100%;
      max-width:620px;
      margin:6px auto 0;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .auth-inline-links button{
      background:transparent;
      color:rgba(255,255,255,.94);
      font-size:14px;
      font-weight:800;
      padding:4px 0;
      border:none;
      width:auto;
      text-shadow:0 2px 10px rgba(0,0,0,.24);
      cursor:pointer;
    }

    .auth-inline-links button:hover{
      color:#a8dcff;
      text-decoration:underline;
    }

    .auth-submit,
    .action-btn{
      display:block;
      width:100%;
      border:none;
      cursor:pointer;
      font-family:inherit;
      border-radius:10px;
      position:relative;
      overflow:hidden;
    }

    .auth-submit{
      max-width:500px;
      margin:18px auto 12px;
      padding:18px 18px;
      font-size:clamp(1.25rem, 2vw, 2.2rem);
      font-style:italic;
      font-weight:900;
      color:#ffffff;
      background:linear-gradient(180deg, #3d98ff 0%, #2d74db 42%, #174b9e 100%);
      box-shadow:
        0 14px 28px rgba(7, 32, 88, 0.36),
        inset 0 1px 0 rgba(255,255,255,0.26),
        0 0 26px rgba(82,163,255,0.18);
    }

    .auth-submit::before,
    .action-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent 10%, rgba(255,255,255,.26) 30%, transparent 52%);
      transform:translateX(-120%);
      animation:buttonShine 4.4s ease-in-out infinite;
    }

    .auth-submit:hover,
    .action-btn:hover{ transform:translateY(-1px); filter:brightness(1.04); }

    .auth-links{
      width:100%;
      max-width:620px;
      margin:14px auto 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .auth-links button,
    .auth-links a{
      background:transparent;
      color:#f3f7ff;
      font-size:15px;
      font-weight:800;
      text-decoration:none;
      padding:6px 0;
      border:none;
      border-radius:0;
      width:auto;
      text-shadow:0 2px 8px rgba(0,0,0,0.24);
      cursor:pointer;
    }

    .auth-links button:hover,
    .auth-links a:hover{
      color:#8fd9ff;
      text-decoration:underline;
    }

    .msg{
      margin-top:16px;
      min-height:24px;
      text-align:center;
      font-size:14px;
      font-weight:800;
      line-height:1.55;
      color:#ffdada;
      white-space:pre-wrap;
      word-break:break-word;
      text-shadow:0 2px 6px rgba(0,0,0,0.24);
    }

    .msg.success{ color:#caffd7; }

    .invite-note{
      width:100%;
      max-width:620px;
      margin:0 auto 14px;
      border:1px solid rgba(220,242,255,0.22);
      border-radius:12px;
      background:
        linear-gradient(180deg, rgba(20,73,145,0.30), rgba(11,46,97,0.40)),
        rgba(14,47,102,0.42);
      color:#ffffff;
      line-height:1.65;
      font-size:14px;
      padding:13px 16px;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:0 10px 24px rgba(0,0,0,0.12);
      display:none;
    }

    .invite-note.show{ display:block; }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(8,35,64,0.50);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:120;
    }

    .modal.show{ display:flex; }

    .modal-content{
      width:100%;
      max-width:620px;
      border-radius:26px;
      padding:22px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(18,66,140,0.70), rgba(10,43,102,0.86)),
        rgba(14,47,102,0.82);
      border:1px solid rgba(214,238,255,0.20);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 20px 50px rgba(0,0,0,0.24),
        0 0 34px rgba(118,210,255,0.10);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      color:#fff;
    }

    .modal-close{
      position:absolute;
      top:12px;
      right:14px;
      border:none;
      background:transparent;
      font-size:28px;
      cursor:pointer;
      color:#fff;
      line-height:1;
    }

    .modal h3{
      margin:0 0 8px;
      font-size:28px;
    }

    .modal-note{
      color:#edf7ff;
      line-height:1.6;
      margin:0 0 16px;
      font-size:14px;
    }

    .support-grid{
      display:grid;
      gap:12px;
    }

    .support-box{
      border:1px solid rgba(214,238,255,0.20);
      border-radius:14px;
      padding:0 16px;
      min-height:62px;
      background:rgba(255,255,255,0.06);
      display:flex;
      align-items:center;
    }

    .support-textarea{
      min-height:120px;
      resize:vertical;
      padding:16px 0;
      font-size:15px;
    }

    .support-input{
      padding:18px 0;
      font-size:15px;
    }

    .action-btn{
      padding:14px 16px;
      font-weight:900;
      font-size:15px;
      color:#fff;
      background:linear-gradient(180deg, #3d98ff 0%, #2d74db 42%, #174b9e 100%);
      margin-top:6px;
    }

    .secondary-action{
      background:#eef4fb;
      color:#0b2340;
      border:none;
      border-radius:14px;
      padding:13px 16px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
    }

    .support-message{
      margin-top:12px;
      min-height:20px;
      font-size:14px;
      font-weight:700;
      color:#ffdada;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .support-message.ok{ color:#caffd7; }

    @keyframes starPulse{
      0%,100%{ opacity:.88; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.012); }
    }

    @keyframes auroraSweep{
      0%,100%{ transform:translateX(-8%) scaleX(1); opacity:.68; }
      50%{ transform:translateX(8%) scaleX(1.06); opacity:.92; }
    }

    @keyframes particleDrift{
      from{ transform:translateY(0) translateX(0); }
      to{ transform:translateY(-30px) translateX(24px); }
    }

    @keyframes particleDriftReverse{
      from{ transform:translateY(0) translateX(0); }
      to{ transform:translateY(20px) translateX(-20px); }
    }

    @keyframes particlePulse{
      0%,100%{ opacity:.38; }
      50%{ opacity:.72; }
    }

    @keyframes buttonShine{
      0%,70%,100%{ transform:translateX(-130%); }
      22%{ transform:translateX(130%); }
    }

    @keyframes planetFloat{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-10px); }
    }

    @keyframes dnaGlow{
      0%,100%{ opacity:.50; transform:translateX(0); }
      50%{ opacity:.68; transform:translateX(-6px); }
    }

    @keyframes floatLabel{
      0%,100%{ transform:translateY(0); opacity:.28; }
      50%{ transform:translateY(-8px); opacity:.42; }
    }

    @media (max-width: 980px){
      .auth-card{
        max-width:100%;

        padding:26px 0 28px;

      .chem-label.h2o{ left:20vw; top:23vh; font-size:1.6rem; }

  <div class="modal" id="supportModal">
    <div class="modal-content">
      <button class="modal-close" type="button" id="closeSupportModal">×</button>
      <h3>Support</h3>
      <p class="modal-note">Décris ton problème. Le message sera envoyé vers l’espace administrateur interne du site.</p>

      <div class="support-grid">
        <div class="support-box">
          <input class="support-input" type="text" id="supportName" placeholder="Ton nom complet">
        </div>

        <div class="support-box">
          <input class="support-input" type="email" id="supportEmail" placeholder="Ton adresse e-mail">
        </div>

        <div class="support-box">
          <input class="support-input" type="text" id="supportSubject" placeholder="Sujet de ton problème">
        </div>

        <div class="support-box">
          <textarea class="support-textarea" id="supportMessage" placeholder="Explique clairement ton problème ici..."></textarea>
        </div>

        <button class="action-btn" id="sendSupportBtn" type="button">Envoyer au support</button>
        <button class="secondary-action" id="cancelSupportBtn" type="button">Annuler</button>
        <div class="support-message" id="supportStatus"></div>
      </div>
    </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("page-ready");
    });
  </script>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      reload
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      ref,
      get,
      set,
      update,
      push
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const ADMIN_EMAIL = "borisamoussou01@gmail.com";
    const LAST_ACTIVITY_KEY = "insights_last_activity";
    const SUPPORT_PATH = "competitions/chem_challenge_2026/competitionSponsors/supportForms";

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const forgotBtn = document.getElementById("forgotBtn");
    const messageBox = document.getElementById("messageBox");
    const signupLink = document.getElementById("signupLink");
    const inviteNote = document.getElementById("inviteNote");

    const supportModal = document.getElementById("supportModal");
    const openSupportBtn = document.getElementById("openSupportBtn");
    const closeSupportModal = document.getElementById("closeSupportModal");
    const cancelSupportBtn = document.getElementById("cancelSupportBtn");
    const sendSupportBtn = document.getElementById("sendSupportBtn");
    const supportName = document.getElementById("supportName");
    const supportEmail = document.getElementById("supportEmail");
    const supportSubject = document.getElementById("supportSubject");
    const supportMessage = document.getElementById("supportMessage");
    const supportStatus = document.getElementById("supportStatus");

    let inviteToken = "";
    let inviteEmail = "";

    function showMessage(text, ok = false) {
      messageBox.textContent = text;
      messageBox.className = ok ? "msg success" : "msg";
    }

    function showSupportStatus(text, ok = false) {
      supportStatus.textContent = text;
      supportStatus.className = ok ? "support-message ok" : "support-message";
    }

    function isAdminEmail(mail = "") {
      return String(mail).trim().toLowerCase() === ADMIN_EMAIL.toLowerCase();
    }

    function goToInsights() {
      localStorage.setItem(LAST_ACTIVITY_KEY, String(Date.now()));
      window.location.replace("./insights.html");
    }

    function openModal(modal) {
      modal.classList.add("show");
    }

    function closeModal(modal) {
      modal.classList.remove("show");
    }

    function getInviteParams() {
      const params = new URLSearchParams(window.location.search);
      inviteToken = params.get("invite") || "";
      inviteEmail =
        params.get("email") ||
        params.get("mail") ||
        params.get("inviteEmail") ||
        "";
      inviteEmail = inviteEmail.trim().toLowerCase();
    }

    async function hydrateInviteContext() {
      getInviteParams();

      if (inviteEmail) {
        emailInput.value = inviteEmail;
      }

      if (!inviteToken) {
        updateSignupLink();
        return;
      }

      try {
        const snap = await get(ref(db, "signupInvites/" + inviteToken));
        if (snap.exists()) {
          const inviteData = snap.val() || {};
          const dbEmail = String(inviteData.email || "").trim().toLowerCase();

          if (!inviteEmail && dbEmail) {
            inviteEmail = dbEmail;
            emailInput.value = inviteEmail;
          }

          inviteNote.textContent = inviteEmail
            ? `Lien d’invitation détecté pour ${inviteEmail}.`
            : "Lien d’invitation détecté. Tu peux continuer.";
          inviteNote.classList.add("show");
        } else {
          inviteNote.textContent = inviteEmail
            ? `Lien détecté. Continue avec l’adresse ${inviteEmail}.`
            : "Lien détecté. Tu peux continuer vers la création du compte.";
          inviteNote.classList.add("show");
        }
      } catch (e) {
        console.error(e);
        if (inviteEmail) {
          inviteNote.textContent = `Lien détecté. Continue avec l’adresse ${inviteEmail}.`;
          inviteNote.classList.add("show");
        }
      }

      updateSignupLink();
    }

    function updateSignupLink() {
      const params = new URLSearchParams();
      if (inviteToken) params.set("invite", inviteToken);
      if (inviteEmail) params.set("email", inviteEmail);
      const q = params.toString();
      signupLink.href = q ? `signup.html?${q}` : "signup.html";
    }

    async function ensureAdminProfile(user) {
      const userRef = ref(db, "users/" + user.uid);
      const snap = await get(userRef);

      const baseData = {
        uid: user.uid,
        displayName: user.displayName || "Maounou Boris AMOUSSOU",
        email: user.email || ADMIN_EMAIL,
        photoURL: "",
        bio: "",
        createdAt: Date.now(),
        updatedAt: Date.now(),
        role: "admin",
        accountStatus: "approved",
        approvedBy: ADMIN_EMAIL,
        approvedAt: Date.now(),
        rejectedAt: 0,
        emailVerifiedAtSignup: true,
        privacy: {
          hideEmail: true,
          hideBio: false,
          hidePresence: false
        },
        presence: {
          online: false,
          lastSeen: Date.now()
        }
      };

      if (!snap.exists()) {
        await set(userRef, baseData);
        return;
      }

      const existing = snap.val() || {};
      await set(userRef, {
        ...baseData,
        ...existing,
        uid: user.uid,
        email: user.email || ADMIN_EMAIL,
        role: "admin",
        accountStatus: "approved",
        approvedBy: ADMIN_EMAIL,
        approvedAt: existing.approvedAt || Date.now(),
        rejectedAt: 0,
        emailVerifiedAtSignup: true,
        updatedAt: Date.now()
      });
    }

    async function loginUser() {
      const mail = emailInput.value.trim().toLowerCase();
      const pass = passwordInput.value;

      if (!mail || !pass) {
        showMessage("Remplis ton e-mail et ton mot de passe.");
        return;
      }

      loginBtn.disabled = true;
      forgotBtn.disabled = true;
      showMessage("Connexion en cours...", true);

      try {
        const cred = await signInWithEmailAndPassword(auth, mail, pass);
        const user = cred.user;
        await reload(user);

        if (isAdminEmail(user.email || mail)) {
          await ensureAdminProfile(user);
          showMessage("Connexion administrateur réussie.", true);
          goToInsights();
          return;
        }

        if (!user.emailVerified) {
          showMessage("Vérifie d’abord ton adresse e-mail avant de te connecter.");
          return;
        }

        const userRef = ref(db, "users/" + user.uid);
        const snap = await get(userRef);

        if (!snap.exists()) {
          showMessage("Compte introuvable dans la base de données.");
          return;
        }

        const userData = snap.val() || {};
        const status = userData.accountStatus || "pending_admin_approval";

        if (status === "approved") {
          await update(userRef, {
            updatedAt: Date.now(),
            emailVerifiedAtSignup: true
          });
          showMessage("Connexion réussie.", true);
          goToInsights();
          return;
        }

        if (status === "rejected") {
          showMessage("Ton compte a été refusé par l’administrateur.");
          return;
        }

        try {
          await update(ref(db, "accountApprovals/" + user.uid), {
            emailVerified: true,
            verifiedAt: Date.now(),
            status: "pending_admin_approval"
          });
        } catch (e) {
          console.error(e);
        }

        showMessage("Ton compte est encore en attente d’approbation.");
      } catch (error) {
        console.error("LOGIN ERROR:", error);

        if (
          error.code === "auth/invalid-credential" ||
          error.code === "auth/wrong-password" ||
          error.code === "auth/user-not-found"
        ) {
          showMessage("Adresse e-mail ou mot de passe incorrect.");
        } else if (error.code === "auth/invalid-email") {
          showMessage("Adresse e-mail invalide.");
        } else if (error.code === "auth/too-many-requests") {
          showMessage("Trop de tentatives. Réessaie plus tard.");
        } else {
          showMessage(`Erreur réelle : ${error.code || "inconnue"} ${error.message || ""}`);
        }
      } finally {
        loginBtn.disabled = false;
        forgotBtn.disabled = false;
      }
    }

    async function forgotPassword() {
      const mail = emailInput.value.trim().toLowerCase();

      if (!mail) {
        showMessage("Entre d’abord ton adresse e-mail.");
        return;
      }

      forgotBtn.disabled = true;
      loginBtn.disabled = true;
      showMessage("");

      try {
        await sendPasswordResetEmail(auth, mail);
        showMessage("Lien de réinitialisation envoyé par e-mail.", true);
      } catch (error) {
        console.error(error);
        if (error.code === "auth/invalid-email") {
          showMessage("Adresse e-mail invalide.");
        } else {
          showMessage(`Erreur réelle : ${error.code || "inconnue"} ${error.message || ""}`);
        }
      } finally {
        forgotBtn.disabled = false;
        loginBtn.disabled = false;
      }
    }

    async function sendSupportRequest() {
      const name = supportName.value.trim();
      const email = supportEmail.value.trim().toLowerCase();
      const subject = supportSubject.value.trim();
      const message = supportMessage.value.trim();

      if (!name || !email || !subject || !message) {
        showSupportStatus("Remplis tous les champs du support.");
        return;
      }

      sendSupportBtn.disabled = true;
      showSupportStatus("Envoi du message...", true);

      try {
        const supportRef = push(ref(db, SUPPORT_PATH));
        await set(supportRef, {
          name,
          email,
          subject,
          message,
          supportType: "login_support",
          organization: "",
          website: "",
          edition: "Chem Excellence Challenge 2026",
          sourcePage: "login.html",
          inviteToken: inviteToken || "",
          inviteEmail: inviteEmail || "",
          createdAt: Date.now(),
          updatedAt: Date.now(),
          status: "new"
        });

        showSupportStatus("Message envoyé au support.", true);
        supportSubject.value = "";
        supportMessage.value = "";
        setTimeout(() => closeModal(supportModal), 900);
      } catch (error) {
        console.error(error);
        showSupportStatus(`Erreur réelle : ${error.code || "inconnue"} ${error.message || ""}`);
      } finally {
        sendSupportBtn.disabled = false;
      }
    }

    loginBtn.addEventListener("click", loginUser);
    forgotBtn.addEventListener("click", forgotPassword);

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginUser();
      });
    });

    openSupportBtn.addEventListener("click", () => {
      supportEmail.value = emailInput.value.trim().toLowerCase();
      openModal(supportModal);
    });

    closeSupportModal.addEventListener("click", () => closeModal(supportModal));
    cancelSupportBtn.addEventListener("click", () => closeModal(supportModal));
    sendSupportBtn.addEventListener("click", sendSupportRequest);

    supportModal.addEventListener("click", (e) => {
      if (e.target === supportModal) closeModal(supportModal);
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal(supportModal);
    });

    hydrateInviteContext();
  </script>
