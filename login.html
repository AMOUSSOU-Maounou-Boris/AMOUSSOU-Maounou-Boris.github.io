<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #07294d, #0b3f76);
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 32px;
      color: #082c53;
      margin-bottom: 10px;
    }
    .sub {
      color: #5e738b;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: #0b2f57;
    }
    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d6e0ea;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      background: #0c3d73;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn.alt {
      background: #eef4fb;
      color: #0c3d73;
    }
    .msg {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      text-align: center;
      color: #b42318;
    }
    .msg.success { color: #15803d; }
    .links {
      text-align: center;
      margin-top: 16px;
      color: #4e6278;
      font-size: 14px;
    }
    .links a {
      color: #0c3d73;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p class="sub">Connecte-toi pour accéder à ton réseau social privé.</p>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="Ex: boris@gmail.com">
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Ton mot de passe">
    </div>

    <button class="btn" id="loginBtn">Se connecter</button>
    <button class="btn alt" id="resetBtn">Réinitialiser le mot de passe</button>
    <button class="btn alt" id="resendVerificationBtn">Renvoyer l’e-mail de confirmation</button>

    <div class="msg" id="messageBox"></div>

    <div class="links">
      Pas encore de compte ? <a href="signup.html">Créer un compte</a>
    </div>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      sendEmailVerification,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resendVerificationBtn = document.getElementById("resendVerificationBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, ok = false) {
      messageBox.textContent = text;
      messageBox.className = ok ? "msg success" : "msg";
    }

    loginBtn.addEventListener("click", async () => {
      const mail = email.value.trim();
      const pass = password.value;

      if (!mail || !pass) {
        showMessage("Entre ton e-mail et ton mot de passe.");
        return;
      }

      try {
        const cred = await signInWithEmailAndPassword(auth, mail, pass);
        await cred.user.reload();

        if (!cred.user.emailVerified) {
          showMessage("Ton adresse e-mail n’est pas encore confirmée.");
          await signOut(auth);
          return;
        }

        showMessage("Connexion réussie. Redirection...", true);
        setTimeout(() => {
          window.location.href = "insights.html";
        }, 800);
      } catch (error) {
        showMessage("E-mail ou mot de passe incorrect.");
      }
    });

    resetBtn.addEventListener("click", async () => {
      const mail = email.value.trim();
      if (!mail) {
        showMessage("Entre d’abord ton adresse e-mail.");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, mail);
        showMessage("E-mail de réinitialisation envoyé.", true);
      } catch (error) {
        showMessage("Impossible d’envoyer l’e-mail de réinitialisation.");
      }
    });

    resendVerificationBtn.addEventListener("click", async () => {
      const mail = email.value.trim();
      const pass = password.value;

      if (!mail || !pass) {
        showMessage("Entre ton e-mail et ton mot de passe pour renvoyer la confirmation.");
        return;
      }

      try {
        const cred = await signInWithEmailAndPassword(auth, mail, pass);
        await sendEmailVerification(cred.user);
        showMessage("E-mail de confirmation renvoyé.", true);
        await signOut(auth);
      } catch (error) {
        showMessage("Impossible de renvoyer l’e-mail de confirmation.");
      }
    });
  </script>
</body>
</html>
