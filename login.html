<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Boris Research Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0a66c2, #0f2027);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #0a66c2;
  color: white;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #084a94;
}

.error-msg {
  background: #ffe5e5;
  color: #cc0000;
  padding: 8px;
  border-radius: 6px;
  margin-top: 10px;
  display: none;
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translateX(0);}
  25% { transform: translateX(-5px);}
  50% { transform: translateX(5px);}
  75% { transform: translateX(-5px);}
  100% { transform: translateX(0);}
}

.success-dot {
  width: 12px;
  height: 12px;
  background: #00ff66;
  border-radius: 50%;
  margin: 10px auto;
  display: none;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.3;}
  100% {opacity:1;}
}

.small-link {
  margin-top: 10px;
  display: block;
  font-size: 13px;
  color: #0a66c2;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Connexion</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="success-dot" id="successDot"></div>

  <span class="small-link" onclick="goToReset()">Mot de passe oublié ?</span>
</div>

<script>
function showError(msg) {
  const error = document.getElementById("errorMsg");
  error.innerText = msg;
  error.style.display = "block";
}

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showError("Veuillez remplir tous les champs.");
    return;
  }

  // 🔥 Simulation utilisateur Firebase (tu peux remplacer après)
  const user = {
    email: email,
    name: email.split("@")[0],
    country: "Auto",
    city: "Non défini"
  };

  // Stockage local (comme ton système actuel)
  localStorage.setItem("user", JSON.stringify(user));
  localStorage.setItem("lastActivity", Date.now());

  document.getElementById("errorMsg").style.display = "none";

  // 🔥 Affiche point vert
  const dot = document.getElementById("successDot");
  dot.style.display = "block";

  setTimeout(() => {
    window.location.href = "insights.html";
  }, 1200);
}

function goToReset() {
  window.location.href = "insights.html";
}
</script>

</body>
</html>
