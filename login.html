<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #07294d, #0b3f76);
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 32px;
      color: #082c53;
      margin-bottom: 10px;
    }
    .sub {
      color: #5e738b;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      color: #0b2f57;
    }
    .field input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d6e0ea;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      background: #0c3d73;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }
    .ghost {
      background: #edf3fb;
      color: #0c3d73;
      margin-top: 10px;
    }
    .info {
      margin-top: 16px;
      color: #4e6278;
      font-size: 14px;
      text-align: center;
    }
    .info a {
      color: #0c3d73;
      font-weight: 700;
      text-decoration: none;
    }
    .msg {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
      color: #c0392b;
      text-align: center;
    }
    .success {
      color: #14854b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion</h1>
    <p class="sub">Connecte-toi pour accéder aux publications, profils et messages privés.</p>

    <div class="field">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="Ex: boris@gmail.com">
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Ton mot de passe">
    </div>

    <button class="btn" id="loginBtn">Se connecter</button>
    <button class="btn ghost" id="resetBtn">Réinitialiser le mot de passe</button>

    <div class="msg" id="messageBox"></div>

    <p class="info">Pas encore de compte ? <a href="signup.html">Créer un compte</a></p>
  </div>

  <script type="module">
    import { auth, db } from "./firebase-config.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      ref,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const resetBtn = document.getElementById("resetBtn");
    const messageBox = document.getElementById("messageBox");

    function showMessage(text, ok = false) {
      messageBox.textContent = text;
      messageBox.className = ok ? "msg success" : "msg";
    }

    loginBtn.addEventListener("click", async () => {
      const mail = email.value.trim();
      const pass = password.value;

      if (!mail || !pass) {
        showMessage("Entre ton e-mail et ton mot de passe.");
        return;
      }

      try {
        const cred = await signInWithEmailAndPassword(auth, mail, pass);
        const user = cred.user;

        await update(ref(db, "users/" + user.uid), {
          email: user.email || mail,
          displayName: user.displayName || mail.split("@")[0],
          updatedAt: Date.now()
        });

        showMessage("Connexion réussie. Redirection...", true);

        setTimeout(() => {
          window.location.href = "insights.html";
        }, 800);
      } catch (error) {
        if (
          error.code === "auth/invalid-credential" ||
          error.code === "auth/wrong-password" ||
          error.code === "auth/user-not-found"
        ) {
          showMessage("E-mail ou mot de passe incorrect.");
        } else {
          showMessage("Erreur : " + error.message);
        }
      }
    });

    resetBtn.addEventListener("click", async () => {
      const mail = email.value.trim();
      if (!mail) {
        showMessage("Entre ton adresse e-mail pour recevoir le lien.");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, mail);
        showMessage("E-mail de réinitialisation envoyé.", true);
      } catch (error) {
        showMessage("Impossible d'envoyer l'e-mail : " + error.message);
      }
    });
  </script>
</body>
</html>
