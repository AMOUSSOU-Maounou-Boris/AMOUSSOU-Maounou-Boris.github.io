<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Championnat de Chimie</title>
  <meta name="description" content="Contacter l'organisation du Championnat de Chimie." />

  <style>
    *{box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}

    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel-soft:#fbfcfe;
      --sidebar:#05293d;
      --sidebar-2:#042336;
      --text:#0b2340;
      --muted:#6a7d95;
      --line:#dde7f2;
      --line-soft:#edf2f8;
      --blue:#2f8cff;
      --blue-dark:#145bd6;
      --red:#ff4b4b;
      --red-dark:#d73333;
      --green:#18c34a;
      --gold:#d8a72f;
      --orange:#ff9f1a;
      --orange-dark:#df7f00;
      --purple:#7b61ff;
      --purple-dark:#5a3ff0;
      --pink:#ff63b5;
      --shadow:0 10px 24px rgba(13,37,71,.08);
      --radius:18px;
      --radius-lg:22px;
      --topbar-h:62px;
      --sidebar-w:244px;
    }

    html,body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    body{
      overflow:hidden;
      padding-top:var(--topbar-h);
      transition:padding-top .24s ease;
    }

    body.topbar-collapsed{
      padding-top:0;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:60;
      height:var(--topbar-h);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      transition:transform .24s ease, opacity .24s ease, height .18s ease;
    }

    .topbar.topbar-hidden{
      transform:translateY(-100%);
      opacity:.98;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      text-decoration:none;
      color:inherit;
    }

    .brand-mark{
      width:40px;
      height:40px;
      border-radius:14px;
      position:relative;
      background:
        radial-gradient(circle at 30% 30%, #fff 0%, #ffe4ef 20%, #ffb347 42%, #ff5f6d 68%, #7b61ff 100%);
      box-shadow:0 10px 20px rgba(255,95,109,.18), inset 0 1px 8px rgba(255,255,255,.7);
      flex:0 0 auto;
    }

    .brand-mark::before,
    .brand-mark::after{
      content:"";
      position:absolute;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.82);
    }

    .brand-mark::before{ inset:8px; }
    .brand-mark::after{ inset:5px 12px; transform:rotate(55deg); border-color:rgba(255,255,255,.56); }

    .brand-text{ min-width:0; }
    .brand-title{
      font-size:14px;
      font-weight:800;
      color:#7a1f2e;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand-sub{
      font-size:12px;
      color:#8a7392;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:12px;
      flex:0 0 auto;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid #ffd8dc;
      color:#7b4250;
      font-weight:700;
      font-size:13px;
      box-shadow:var(--shadow);
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 0 5px rgba(255,75,75,.14);
    }

    .status-dot.ok{
      background:var(--green);
      box-shadow:0 0 0 5px rgba(24,195,74,.14);
    }

    .home-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      font-size:13px;
      text-decoration:none;
      color:#8b3f00;
      background:#fff;
      border:1px solid #ffe3c2;
      box-shadow:var(--shadow);
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .menu-btn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid #ffd6de;
      background:linear-gradient(180deg,#fff,#fff6f8);
      display:none;
      place-items:center;
      cursor:pointer;
      padding:0;
      position:relative;
      box-shadow:var(--shadow);
    }

    .menu-btn span,
    .menu-btn::before,
    .menu-btn::after{
      content:"";
      position:absolute;
      width:18px;
      height:2px;
      border-radius:999px;
      background:#b13f55;
      transition:.18s ease;
    }

    .menu-btn span{ transform:translateY(0); }
    .menu-btn::before{ transform:translateY(-6px); }
    .menu-btn::after{ transform:translateY(6px); }

    .layout{
      display:grid;
      grid-template-columns:var(--sidebar-w) minmax(0,1fr);
      height:calc(100vh - var(--topbar-h));
      transition:height .24s ease;
    }

    body.topbar-collapsed .layout{
      height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));
      color:#fff;
      padding:18px 14px 20px;
      border-right:1px solid rgba(255,255,255,.06);
      height:calc(100vh - var(--topbar-h));
      overflow-y:auto;
      transition:height .24s ease;
    }

    body.topbar-collapsed .sidebar{
      height:100vh;
    }

    .sidebar-section-title{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:rgba(255,255,255,.56);
      margin:8px 10px 10px;
      font-weight:700;
    }

    .nav-list{
      display:grid;
      gap:4px;
      margin-bottom:18px;
    }

    .nav-link{
      display:flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      color:#eef7ff;
      padding:11px 12px;
      border-radius:12px;
      font-size:14px;
      font-weight:700;
      transition:.18s ease;
    }

    .nav-link:hover{ background:rgba(255,255,255,.08); }
    .nav-link.active{
      background:rgba(255,75,75,.18);
      border:1px solid rgba(255,180,180,.16);
    }

    .nav-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#88bfff;
      flex:0 0 auto;
    }

    .nav-dot.green{ background:#1ed760; }
    .nav-dot.red{ background:#ff7777; }
    .nav-dot.gold{ background:#e7c15a; }
    .nav-dot.purple{ background:#b29bff; }
    .nav-dot.orange{ background:#ffb347; }
    .nav-dot.pink{ background:#ff7cc7; }

    .sidebar-note{
      margin-top:8px;
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      line-height:1.6;
      color:rgba(255,255,255,.82);
    }

    .content{
      padding:20px;
      height:calc(100vh - var(--topbar-h));
      overflow-y:auto;
      overflow-x:hidden;
      transition:height .24s ease;
    }

    body.topbar-collapsed .content{
      height:100vh;
    }

    .content-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .title-wrap h1{
      font-size:34px;
      line-height:1.05;
      color:#a12d38;
      letter-spacing:-1px;
      margin:0 0 10px;
    }

    .title-wrap p{
      color:var(--muted);
      max-width:920px;
      line-height:1.75;
      font-size:15px;
      margin:0;
    }

    .head-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .head-btn{
      border:none;
      border-radius:14px;
      padding:13px 16px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition:.18s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:180px;
    }

    .head-btn:hover{ transform:translateY(-1px); }

    .head-btn.primary{
      color:#fff;
      background:linear-gradient(135deg,var(--red),var(--orange));
      box-shadow:0 16px 28px rgba(255,95,109,.18);
    }

    .head-btn.soft{
      color:#8d3f00;
      background:#fff;
      border:1px solid #ffe0bc;
      box-shadow:var(--shadow);
    }

    .cards-4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:18px;
    }

    .card,
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
    }

    .mini-card{
      padding:18px;
      background:linear-gradient(180deg,#fff,#fbfcff);
    }

    .mini-card:nth-child(1){
      border-color:#ffdede;
      background:linear-gradient(180deg,#fff,#fff7f7);
    }
    .mini-card:nth-child(1) strong{ color:#c63838; }

    .mini-card:nth-child(2){
      border-color:#ffe7c6;
      background:linear-gradient(180deg,#fff,#fffaf3);
    }
    .mini-card:nth-child(2) strong{ color:#d97c00; }

    .mini-card:nth-child(3){
      border-color:#eadfff;
      background:linear-gradient(180deg,#fff,#faf7ff);
    }
    .mini-card:nth-child(3) strong{ color:#6a45d7; }

    .mini-card:nth-child(4){
      border-color:#dff0df;
      background:linear-gradient(180deg,#fff,#f7fff9);
    }
    .mini-card:nth-child(4) strong{ color:#138c42; }

    .mini-card p{
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
      margin:0;
    }

    .grid-main{
      display:grid;
      grid-template-columns:1fr 320px;
      gap:18px;
      align-items:start;
    }

    .grid-stack{
      display:grid;
      gap:18px;
    }

    .panel{ overflow:hidden; }

    .panel-head{
      padding:20px 22px 0;
    }

    .panel-head h2{
      font-size:24px;
      color:#7a3048;
      margin:0 0 8px;
      letter-spacing:-.5px;
    }

    .panel-head p{
      color:var(--muted);
      line-height:1.75;
      font-size:14px;
      margin:0 0 18px;
    }

    .panel-body{
      padding:0 22px 22px;
    }

    .contact-form{
      display:grid;
      gap:14px;
    }

    .field label{
      display:block;
      margin-bottom:7px;
      font-weight:700;
      color:#21466f;
      font-size:.92rem;
    }

    input, select, textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(220,231,243,.95);
      background:#fff;
      outline:none;
      padding:14px 14px;
      font-size:.96rem;
      font-family:inherit;
      color:var(--text);
      transition:.18s ease;
    }

    textarea{
      min-height:150px;
      resize:vertical;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#99c8ff;
      box-shadow:0 0 0 4px rgba(47,140,255,.10);
    }

    .form-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    .btn{
      border:none;
      cursor:pointer;
      transition:.22s ease;
      font-weight:800;
      font-family:inherit;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border-radius:14px;
      padding:13px 18px;
    }

    .btn-main{
      color:#fff;
      background:linear-gradient(135deg,var(--red),var(--orange));
      box-shadow:0 14px 30px rgba(255,95,109,.20);
    }

    .btn-soft{
      color:#8d3f00;
      background:#fff;
      border:1px solid #ffe0bc;
      box-shadow:var(--shadow);
    }

    .msg{
      display:none;
      padding:13px 14px;
      border-radius:14px;
      font-size:.93rem;
      line-height:1.55;
    }

    .msg.show{display:block}
    .msg.ok{
      background:rgba(24,195,74,.10);
      color:#0f7b33;
      border:1px solid rgba(24,195,74,.16);
    }
    .msg.err{
      background:rgba(255,75,75,.10);
      color:#a22626;
      border:1px solid rgba(255,75,75,.16);
    }
    .msg.info{
      background:rgba(47,140,255,.10);
      color:#1459b1;
      border:1px solid rgba(47,140,255,.16);
    }

    .side-note{
      padding:14px;
      border-radius:14px;
      color:#5b4566;
      font-size:14px;
      line-height:1.7;
      border:1px solid transparent;
    }

    .grid-stack .panel:nth-child(1) .side-note{
      background:linear-gradient(180deg,#fff,#fff7f7);
      border-color:#ffdede;
    }

    .grid-stack .panel:nth-child(2) .side-note{
      background:linear-gradient(180deg,#fff,#fff9f2);
      border-color:#ffe5c9;
    }

    .grid-stack .panel:nth-child(3) .side-note{
      background:linear-gradient(180deg,#fff,#faf7ff);
      border-color:#eadfff;
    }

    .cta-box{
      padding:20px 18px;
      border-radius:18px;
      background:linear-gradient(135deg, rgba(255,75,75,.98), rgba(255,159,26,.96), rgba(123,97,255,.90));
      color:#fff;
      box-shadow:0 18px 36px rgba(255,95,109,.16);
      position:relative;
      overflow:hidden;
    }

    .cta-box::before{
      content:"";
      position:absolute;
      width:210px;
      height:210px;
      border-radius:50%;
      right:-80px;
      top:-80px;
      background:radial-gradient(circle, rgba(255,255,255,.14), transparent 70%);
    }

    .cta-box h3{
      margin:0 0 10px;
      font-size:22px;
      line-height:1.2;
      position:relative;
      z-index:1;
    }

    .cta-box p{
      margin:0;
      color:rgba(255,255,255,.92);
      line-height:1.78;
      font-size:14px;
      position:relative;
      z-index:1;
    }

    .cta-actions{
      margin-top:16px;
      display:grid;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .cta-link{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:14px;
      font-weight:800;
      font-size:14px;
      transition:.18s ease;
    }

    .cta-link.primary{
      background:#fff;
      color:#c54430;
    }

    .cta-link.soft{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      color:#fff;
    }

    .page-footer{
      margin-top:26px;
      padding:20px 16px 26px;
      text-align:center;
      color:#76677b;
      font-size:14px;
      line-height:1.75;
    }

    .page-footer strong{
      display:block;
      color:#a0363e;
      font-size:15px;
      margin-bottom:4px;
    }

    .mobile-menu{
      position:fixed;
      top:72px;
      right:12px;
      width:min(285px, calc(100vw - 24px));
      max-height:72vh;
      overflow:auto;
      background:rgba(255,255,255,.98);
      border:1px solid #ffd8de;
      border-radius:18px;
      box-shadow:0 24px 48px rgba(10,37,73,.18);
      padding:14px;
      z-index:80;
      display:none;
    }

    .mobile-menu.show{ display:block; }

    .mobile-menu h3{
      margin:2px 4px 12px;
      font-size:15px;
      color:#94384a;
    }

    .mobile-group{
      display:grid;
      gap:8px;
      margin-bottom:14px;
    }

    .mobile-link{
      text-decoration:none;
      color:#6c4c54;
      background:#fff8fa;
      border:1px solid #ffe0e7;
      border-radius:12px;
      padding:11px 12px;
      font-weight:700;
      font-size:14px;
    }

    .mobile-overlay{
      position:fixed;
      inset:0;
      background:rgba(3,18,42,.12);
      z-index:70;
      display:none;
    }

    .mobile-overlay.show{ display:block; }

    @media (max-width:1120px){
      body{
        overflow:auto;
        padding-top:var(--topbar-h);
      }

      body.topbar-collapsed{
        padding-top:var(--topbar-h);
      }

      .layout,
      body.topbar-collapsed .layout,
      .grid-main{
        grid-template-columns:1fr;
      }

      .layout{
        height:auto;
      }

      .cards-4{
        grid-template-columns:repeat(2,1fr);
      }

      .sidebar{
        height:auto;
      }

      .content{
        height:auto;
        overflow:visible;
      }
    }

    @media (max-width:820px){
      .sidebar{ display:none; }
      .content{ padding:16px; }
      .status-chip{ display:none; }
      .menu-btn{ display:grid; }
      .cards-4{
        grid-template-columns:1fr;
      }
      .topbar{
        padding:0 12px;
        display:grid;
        grid-template-columns:32px 1fr 32px;
        align-items:center;
        gap:8px;
      }
      .brand{
        grid-column:1 / 4;
        display:grid;
        grid-template-columns:44px 1fr 32px;
        align-items:center;
        gap:8px;
        width:100%;
      }
      .brand-mark{
        width:44px;
        height:44px;
        border-radius:14px;
      }
      .brand-text{
        min-width:0;
        text-align:center;
        width:100%;
      }
      .brand-title{
        font-size:17px;
        line-height:1.1;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        text-align:center;
      }
      .brand-sub{ display:none; }
      .topbar-right{
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        margin-left:0;
        gap:6px;
        justify-content:flex-end;
      }
      .home-btn{ display:none; }
      .menu-btn{
        width:32px;
        height:32px;
        border-radius:10px;
      }
      .menu-btn span,
      .menu-btn::before,
      .menu-btn::after{
        width:14px;
      }
      .menu-btn::before{ transform:translateY(-5px); }
      .menu-btn::after{ transform:translateY(5px); }
      .mobile-menu{
        width:min(250px, calc(100vw - 20px));
        right:10px;
      }
    }

    @media (max-width:520px){
      .content-head{
        flex-direction:column;
        align-items:stretch;
      }
      .head-actions{ width:100%; }
      .head-btn{ width:100%; }
      .form-actions{ flex-direction:column; }
      .topbar{
        padding:0 10px;
      }
      .brand{
        grid-template-columns:40px 1fr 30px;
        gap:8px;
      }
      .brand-mark{
        width:40px;
        height:40px;
        border-radius:13px;
      }
      .brand-title{
        font-size:18px;
        line-height:1.08;
        text-align:center;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }
      .topbar-right{
        right:10px;
        gap:6px;
      }
      .menu-btn{
        width:30px;
        height:30px;
        border-radius:9px;
      }
      .menu-btn span,
      .menu-btn::before,
      .menu-btn::after{
        width:13px;
      }
      .menu-btn::before{ transform:translateY(-4px); }
      .menu-btn::after{ transform:translateY(4px); }
      .title-wrap h1{
        font-size:28px;
        line-height:1.08;
      }
      .title-wrap p{
        font-size:15px;
        line-height:1.8;
      }
      .mobile-menu{
        width:min(230px, calc(100vw - 18px));
        right:9px;
        top:68px;
      }
      .page-footer{
        padding-bottom:22px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar" id="topbar">
    <a href="./index.html" class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <div class="brand-title">Championnat de Chimie</div>
        <div class="brand-sub">Contact & assistance</div>
      </div>
    </a>

    <div class="topbar-right">
      <div class="status-chip">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Contact organisation</span>
      </div>
      <a href="./index.html" class="home-btn">Accueil</a>
      <button class="menu-btn" id="menuBtn" type="button" aria-label="Ouvrir le menu">
        <span></span>
      </button>
    </div>
  </header>

  <div class="mobile-overlay" id="mobileOverlay"></div>

  <aside class="mobile-menu" id="mobileMenu">
    <h3>Explorer le site</h3>

    <div class="mobile-group">
      <a class="mobile-link" href="./index.html">Accueil</a>
      <a class="mobile-link" href="./about.html">À propos</a>
      <a class="mobile-link" href="./competition.html">Championnat</a>
      <a class="mobile-link" href="./rules.html">Règlement</a>
      <a class="mobile-link" href="./results.html">Résultats</a>
      <a class="mobile-link" href="./laureats.html">Lauréats</a>
      <a class="mobile-link" href="./announcements.html">Annonces</a>
      <a class="mobile-link" href="./faq.html">FAQ</a>
      <a class="mobile-link" href="./contact.html">Contact</a>
