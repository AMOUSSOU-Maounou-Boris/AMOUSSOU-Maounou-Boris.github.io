<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats | Championnat de Chimie</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

body{
  background:linear-gradient(180deg,#eef7ff,#ffffff,#f8fbff);
  color:#0b2340;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 25px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

header a{
  text-decoration:none;
  color:#0b2340;
  font-weight:bold;
  margin-left:15px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px;
}

.hero h1{
  font-size:36px;
  background:linear-gradient(90deg,#2f8cff,#00d6c9);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#5f6f85;
  margin-top:10px;
}

/* PODIUM */
.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:20px;
  margin:40px 20px;
}

.place{
  text-align:center;
  background:#fff;
  border-radius:20px;
  padding:20px;
  width:110px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.place h3{
  margin-bottom:5px;
}

.gold{height:160px;border-top:5px solid gold;}
.silver{height:130px;border-top:5px solid silver;}
.bronze{height:110px;border-top:5px solid #cd7f32;}

/* TABLE */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.table{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.row{
  display:grid;
  grid-template-columns:60px 1fr 100px;
  padding:15px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.row.header{
  background:#f5f8ff;
  font-weight:bold;
}

.row:last-child{
  border-bottom:none;
}

.rank{
  font-weight:bold;
}

.score{
  text-align:right;
  font-weight:bold;
  color:#2f8cff;
}

/* CTA */
.cta{
  text-align:center;
  margin-top:30px;
}

.btn{
  padding:14px 22px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f8cff,#00d6c9);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#7b8da5;
}

/* MOBILE */
@media(max-width:600px){
  .podium{
    flex-direction:column;
    align-items:center;
  }

  .place{
    width:80%;
  }

  .row{
    grid-template-columns:40px 1fr 80px;
  }
}
</style>

</head>

<body>

<header>
  <div class="logo">🏆 Championnat Chimie</div>
  <div>
    <a href="./index.html">Accueil</a>
    <a href="./competition.html">Championnat</a>
    <a href="./rules.html">Règlement</a>
  </div>
</header>

<section class="hero">
  <h1>Classement Officiel</h1>
  <p>Résultats académiques du Championnat de Chimie</p>
</section>

<!-- PODIUM -->
<div class="podium">
  <div class="place silver">
    <h3>🥈</h3>
    <p>Nom 2</p>
    <small>95 pts</small>
  </div>

  <div class="place gold">
    <h3>🥇</h3>
    <p>Nom 1</p>
    <small>98 pts</small>
  </div>

  <div class="place bronze">
    <h3>🥉</h3>
    <p>Nom 3</p>
    <small>92 pts</small>
  </div>
</div>

<div class="container">

  <div class="table">
    <div class="row header">
      <div>#</div>
      <div>Nom</div>
      <div>Score</div>
    </div>

    <div class="row">
      <div class="rank">4</div>
      <div>Participant 4</div>
      <div class="score">90</div>
    </div>

    <div class="row">
      <div class="rank">5</div>
      <div>Participant 5</div>
      <div class="score">88</div>
    </div>

    <div class="row">
      <div class="rank">6</div>
      <div>Participant 6</div>
      <div class="score">85</div>
    </div>

  </div>

  <div class="cta">
    <a href="./competition.html"><button class="btn">Participer au prochain championnat</button></a>
  </div>

</div>

<footer>
© 2026 Championnat de Chimie
</footer>

</body>
</html>
