<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance | Championnat de Chimie</title>
  <meta name="description" content="Site actuellement en cours de maintenance." />
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    :root{
      --bg1:#041126;
      --bg2:#0a2659;
      --bg3:#123d84;
      --card:rgba(255,255,255,0.96);
      --text:#0b2340;
      --muted:#5f718b;
      --blue:#2f8cff;
      --blue-dark:#145bd6;
      --line:#dbe7f4;
      --shadow:0 20px 50px rgba(0,0,0,.18);
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:
        radial-gradient(circle at top left, rgba(47,140,255,.22), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0,214,201,.16), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color:var(--text);
    }

    .card{
      width:100%;
      max-width:680px;
      background:var(--card);
      border:1px solid rgba(255,255,255,.5);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:38px 28px;
      text-align:center;
      backdrop-filter:blur(10px);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      background:#eef5ff;
      border:1px solid var(--line);
      color:var(--blue-dark);
      font-size:14px;
      font-weight:700;
      margin-bottom:18px;
    }

    .badge::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:50%;
      background:#ff9f1a;
      box-shadow:0 0 0 6px rgba(255,159,26,.16);
      animation:pulse 1.8s infinite;
    }

    h1{
      font-size:clamp(28px, 5vw, 44px);
      line-height:1.15;
      margin-bottom:16px;
      color:var(--text);
    }

    p{
      font-size:16px;
      line-height:1.7;
      color:var(--muted);
      max-width:560px;
      margin:0 auto;
    }

    .footer-note{
      margin-top:24px;
      font-size:14px;
      color:#7a8da8;
    }

    @keyframes pulse{
      0%{transform:scale(1);opacity:1}
      50%{transform:scale(1.15);opacity:.7}
      100%{transform:scale(1);opacity:1}
    }

    @media (max-width:560px){
      .card{
        padding:30px 20px;
        border-radius:22px;
      }

      p{
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Maintenance en cours</div>
    <h1>Site actuellement en cours de maintenance</h1>
    <p>
      Nous effectuons actuellement une mise à jour pour améliorer la sécurité et la qualité du site.
      Merci de votre compréhension. Le site sera à nouveau accessible très bientôt.
    </p>
    <div class="footer-note">
      © Championnat de Chimie
    </div>
  </main>
</body>
</html>
