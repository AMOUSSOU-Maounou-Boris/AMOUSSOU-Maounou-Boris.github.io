<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annonces | Championnat de Chimie</title>
  <meta name="description" content="Annonces officielles, publications, actualités et espace communautaire du Championnat de Chimie." />

  <style>
    *{box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}

    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel-soft:#fbfcfe;
      --sidebar:#05293d;
      --sidebar-2:#042336;
      --text:#0b2340;
      --muted:#6a7d95;
      --line:#dde7f2;
      --line-soft:#edf2f8;
      --blue:#2f8cff;
      --blue-dark:#145bd6;
      --red:#ff4b4b;
      --red-dark:#d73333;
      --green:#18c34a;
      --gold:#d8a72f;
      --orange:#ff9f1a;
      --orange-dark:#df7f00;
      --purple:#7b61ff;
      --purple-dark:#5a3ff0;
      --pink:#ff63b5;
      --shadow:0 10px 24px rgba(13,37,71,.08);
      --radius:18px;
      --radius-lg:22px;
      --topbar-h:62px;
      --sidebar-w:244px;
      --feed-left:360px;
    }

    html,body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    body{
      overflow:hidden;
      padding-top:var(--topbar-h);
      transition:padding-top .24s ease;
    }

    body.topbar-collapsed{
      padding-top:0;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:60;
      height:var(--topbar-h);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      transition:transform .24s ease, opacity .24s ease, height .18s ease;
    }

    .topbar.topbar-hidden{
      transform:translateY(-100%);
      opacity:.98;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      text-decoration:none;
      color:inherit;
    }

    .brand-mark{
      width:40px;
      height:40px;
      border-radius:14px;
      position:relative;
      background:
        radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b7 16%, #efbf54 38%, #7b61ff 68%, #145bd6 100%);
      box-shadow:0 10px 20px rgba(123,97,255,.18), inset 0 1px 8px rgba(255,255,255,.7);
      flex:0 0 auto;
    }

    .brand-mark::before,
    .brand-mark::after{
      content:"";
      position:absolute;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.82);
    }

    .brand-mark::before{ inset:8px; }
    .brand-mark::after{ inset:5px 12px; transform:rotate(55deg); border-color:rgba(255,255,255,.56); }

    .brand-text{ min-width:0; }
    .brand-title{
      font-size:14px;
      font-weight:800;
      color:#0a2d61;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand-sub{
      font-size:12px;
      color:#73859b;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:12px;
      flex:0 0 auto;
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:#fff;
      border:1px solid #e8defc;
      color:#5a4d91;
      font-weight:700;
      font-size:13px;
      box-shadow:var(--shadow);
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--purple);
      box-shadow:0 0 0 5px rgba(123,97,255,.14);
    }

    .home-btn{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      font-size:13px;
      text-decoration:none;
      color:#8b3f00;
      background:#fff;
      border:1px solid #ffe3c2;
      box-shadow:var(--shadow);
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .menu-btn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid #e7ddff;
      background:linear-gradient(180deg,#fff,#faf7ff);
      display:none;
      place-items:center;
      cursor:pointer;
      padding:0;
      position:relative;
      box-shadow:var(--shadow);
      flex:0 0 auto;
    }

    .menu-btn span,
    .menu-btn::before,
    .menu-btn::after{
      content:"";
      position:absolute;
      width:18px;
      height:2px;
      border-radius:999px;
      background:#5b46bd;
      transition:.18s ease;
    }

    .menu-btn span{ transform:translateY(0); }
    .menu-btn::before{ transform:translateY(-6px); }
    .menu-btn::after{ transform:translateY(6px); }

    .layout{
      display:grid;
      grid-template-columns:var(--sidebar-w) minmax(0,1fr);
      height:calc(100vh - var(--topbar-h));
      transition:height .24s ease;
    }

    body.topbar-collapsed .layout{
      height:100vh;
    }

    .sidebar{
      background:linear-gradient(180deg,var(--sidebar),var(--sidebar-2));
      color:#fff;
      padding:18px 14px 20px;
      border-right:1px solid rgba(255,255,255,.06);
      height:calc(100vh - var(--topbar-h));
      overflow-y:auto;
      transition:height .24s ease;
    }

    body.topbar-collapsed .sidebar{
      height:100vh;
    }

    .sidebar-section-title{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:rgba(255,255,255,.56);
      margin:8px 10px 10px;
      font-weight:700;
    }

    .nav-list{
      display:grid;
      gap:4px;
      margin-bottom:18px;
    }

    .nav-link{
      display:flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      color:#eef7ff;
      padding:11px 12px;
      border-radius:12px;
      font-size:14px;
      font-weight:700;
      transition:.18s ease;
    }

    .nav-link:hover{ background:rgba(255,255,255,.08); }
    .nav-link.active{
      background:rgba(123,97,255,.20);
      border:1px solid rgba(179,161,255,.18);
    }

    .nav-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#88bfff;
      flex:0 0 auto;
    }

    .nav-dot.green{ background:#1ed760; }
    .nav-dot.red{ background:#ff7777; }
    .nav-dot.gold{ background:#e7c15a; }
    .nav-dot.purple{ background:#b29bff; }
    .nav-dot.orange{ background:#ffb347; }
    .nav-dot.pink{ background:#ff7cc7; }
    .nav-dot.blue{ background:#88bfff; }

    .sidebar-note{
      margin-top:8px;
      padding:14px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      line-height:1.6;
      color:rgba(255,255,255,.82);
    }

    .content{
      padding:20px;
      height:calc(100vh - var(--topbar-h));
      overflow-y:auto;
      overflow-x:hidden;
      transition:height .24s ease;
      background:
        radial-gradient(circle at top right, rgba(123,97,255,.06), transparent 24%),
        radial-gradient(circle at top left, rgba(255,179,71,.08), transparent 20%),
        var(--bg);
    }

    body.topbar-collapsed .content{
      height:100vh;
    }

    .hero{
      display:grid;
      grid-template-columns:minmax(0,1fr) 220px;
      gap:18px;
      align-items:center;
      margin-bottom:18px;
    }

    .hero-box{
      border-radius:26px;
      padding:24px 24px;
      color:#fff;
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, #113d7d 0%, #4f46c6 48%, #d8a72f 100%);
      box-shadow:0 22px 42px rgba(9,46,91,.15);
    }

    .hero-box::before{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      right:-80px;
      top:-110px;
      background:radial-gradient(circle, rgba(255,255,255,.14), transparent 70%);
    }

    .hero-box h1{
      margin:0 0 10px;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-1px;
      position:relative;
      z-index:1;
      color:#ffffff;
      text-shadow:0 1px 1px rgba(0,0,0,.08);
    }

    .hero-box p{
      margin:0;
      color:rgba(255,255,255,.96);
      line-height:1.78;
      font-size:15px;
      max-width:860px;
      position:relative;
      z-index:1;
    }

    .hero-meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
      position:relative;
      z-index:1;
    }

    .hero-meta .badge{
      background:rgba(255,255,255,.14) !important;
      color:#fff !important;
      border-color:rgba(255,255,255,.20) !important;
      backdrop-filter:blur(8px);
    }

    .hero-cup{
      min-height:210px;
      border-radius:26px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg,#fff,#f8fbff);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-size:6.5rem;
    }

    .feed-layout{
      display:grid;
      grid-template-columns:var(--feed-left) minmax(0,1fr);
      gap:18px;
      align-items:start;
    }

    .feed-layout.feed-public{
      grid-template-columns:1fr;
    }

    .stack{
      display:grid;
      gap:18px;
    }

    .card,
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      padding:20px 22px 0;
    }

    .panel-head h2{
      font-size:24px;
      color:#102f59;
      margin:0 0 8px;
      letter-spacing:-.5px;
    }

    .panel-head p{
      color:var(--muted);
      line-height:1.75;
      font-size:14px;
      margin:0 0 18px;
    }

    .panel-body{
      padding:0 22px 22px;
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:18px;
    }

    .mini-card{
      padding:18px;
      background:linear-gradient(180deg,#fff,#fbfcff);
    }

    .mini-card:nth-child(1){
      background:linear-gradient(180deg,#fff,#f7fbff);
      border-color:#dcecff;
    }
    .mini-card:nth-child(2){
      background:linear-gradient(180deg,#fff,#fffaf3);
      border-color:#ffe7c6;
    }
    .mini-card:nth-child(3){
      background:linear-gradient(180deg,#fff,#faf7ff);
      border-color:#eadfff;
    }
    .mini-card:nth-child(4){
      background:linear-gradient(180deg,#fff,#fff7f7);
      border-color:#ffdede;
    }

    .mini-card strong{
      display:block;
      font-size:24px;
      color:#0f2f58;
      margin-bottom:8px;
    }

    .mini-card p{
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
      margin:0;
    }

    .field{ margin-bottom:14px; }

    .field label{
      display:block;
      margin-bottom:7px;
      font-weight:700;
      color:#21466f;
      font-size:.92rem;
    }

    input, textarea, select{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(220,231,243,.95);
      background:#fff;
      outline:none;
      padding:14px 14px;
      font-size:.96rem;
      color:var(--text);
      transition:.18s ease;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    input:focus, textarea:focus, select:focus{
      border-color:#8bbcff;
      box-shadow:0 0 0 4px rgba(47,140,255,.10);
    }

    .composer-tools{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .file-field{
      display:grid;
      gap:8px;
    }

    .file-picker{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
    }

    .file-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:0 16px;
      border-radius:14px;
      background:#f7fbff;
      border:1px solid #dfeaf7;
      color:#21466f;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
      transition:.18s ease;
    }

    .file-btn:hover{ transform:translateY(-1px); }

    .file-name{
      min-height:48px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid #e6eef8;
      background:#fff;
      color:#60748c;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-size:14px;
      overflow:hidden;
    }

    .file-label-text{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      min-width:0;
      flex:1;
    }

    .remove-file-btn{
      border:none;
      cursor:pointer;
      min-width:40px;
      height:40px;
      border-radius:12px;
      background:rgba(255,75,75,.10);
      color:#a12626;
      font-weight:800;
      display:none;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }

    .remove-file-btn.show{
      display:inline-flex;
    }

    .real-file-input{
      display:none;
    }

    .inline-note{
      margin-top:14px;
      border-radius:14px;
      padding:13px 14px;
      font-size:13px;
      line-height:1.65;
      display:none;
    }

    .inline-note.show{ display:block; }
    .inline-note.ok{
      background:rgba(24,195,74,.08);
      border:1px solid rgba(24,195,74,.18);
      color:#156c37;
    }
    .inline-note.err{
      background:rgba(255,75,75,.08);
      border:1px solid rgba(255,75,75,.18);
      color:#a12626;
    }
    .inline-note.info{
      background:rgba(47,140,255,.08);
      border:1px solid rgba(47,140,255,.18);
      color:#1459b1;
    }

    .btn-row,
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn,
    .tool-btn{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 14px;
      font-weight:800;
      font-size:14px;
      transition:.18s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn:hover,
    .tool-btn:hover{ transform:translateY(-1px); }

    .btn.primary{
      color:#fff;
      background:linear-gradient(135deg,var(--blue),var(--purple));
      box-shadow:0 16px 28px rgba(47,140,255,.18);
    }

    .btn.soft,
    .tool-btn.soft{
      color:#163861;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .btn.red-soft{
      color:#a12626;
      background:rgba(255,75,75,.08);
      border:1px solid rgba(255,75,75,.16);
      box-shadow:none;
    }

    .tool-btn.blue{ background:rgba(47,140,255,.10); color:#1559bf; border:1px solid rgba(47,140,255,.16); }
    .tool-btn.red{ background:rgba(255,75,75,.10); color:#b12828; border:1px solid rgba(255,75,75,.16); }
    .tool-btn.green{ background:rgba(24,195,74,.10); color:#0f7b33; border:1px solid rgba(24,195,74,.16); }
    .tool-btn.gold{ background:rgba(224,161,38,.12); color:#8d6111; border:1px solid rgba(224,161,38,.18); }
    .tool-btn.purple{ background:rgba(123,97,255,.10); color:#5a3fe0; border:1px solid rgba(123,97,255,.16); }
    .tool-btn.active{
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.5), 0 8px 18px rgba(13,37,71,.08);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 12px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:800;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .badge.blue{background:rgba(47,140,255,.10); color:#1559bf; border-color:rgba(47,140,255,.16)}
    .badge.red{background:rgba(255,75,75,.10); color:#b12828; border-color:rgba(255,75,75,.16)}
    .badge.green{background:rgba(24,195,74,.10); color:#0f7b33; border-color:rgba(24,195,74,.16)}
    .badge.gold{background:rgba(224,161,38,.12); color:#8d6111; border-color:rgba(224,161,38,.18)}
    .badge.purple{background:rgba(123,97,255,.10); color:#5a3fe0; border-color:rgba(123,97,255,.16)}
    .badge.gray{background:rgba(120,132,150,.10); color:#61748d; border-color:rgba(120,132,150,.16)}

    .feed-list{
      display:grid;
      gap:16px;
    }

    .post-card{
      border-radius:24px;
      background:linear-gradient(180deg,#fff,#fbfcff);
      border:1px solid rgba(220,231,243,.95);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .post-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      padding:18px 18px 10px;
    }

    .post-author{
      display:flex;
      gap:12px;
      min-width:0;
    }

    .avatar{
      width:46px;
      height:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:1rem;
      color:#fff;
      background:linear-gradient(135deg,var(--blue),var(--purple));
      box-shadow:0 10px 18px rgba(47,140,255,.16);
      flex:0 0 auto;
      text-decoration:none;
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .author-meta{
      min-width:0;
      display:grid;
      gap:4px;
    }

    .author-name{
      font-size:15px;
      font-weight:800;
      color:#102f59;
      word-break:break-word;
    }

    .author-link{
      color:#102f59;
      text-decoration:none;
    }

    .author-link:hover{
      text-decoration:underline;
      color:#145bd6;
    }

    .author-sub{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      color:var(--muted);
      font-size:12px;
    }

    .post-menu{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .icon-btn{
      border:none;
      cursor:pointer;
      min-width:42px;
      height:42px;
      border-radius:12px;
      background:#f6f9fd;
      border:1px solid #e6eef8;
      color:#22466d;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:.18s ease;
    }

    .icon-btn:hover{ transform:translateY(-1px); }
    .icon-btn.active{
      background:rgba(255,75,75,.10);
      color:#b12828;
      border-color:rgba(255,75,75,.16);
    }

    .post-body{
      padding:0 18px 12px;
      display:grid;
      gap:12px;
    }

    .post-text{
      color:#1f3f63;
      line-height:1.82;
      font-size:15px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .post-link{
      display:block;
      padding:14px;
      border-radius:16px;
      background:#f7fbff;
      border:1px solid #e1edf8;
      color:#1559bf;
      font-weight:700;
      text-decoration:none;
      word-break:break-all;
    }

    .post-image-wrap{
      overflow:hidden;
      border-radius:20px;
      border:1px solid #e7eef7;
      background:#fff;
    }

    .post-image{
      width:100%;
      display:block;
      max-height:460px;
      object-fit:cover;
      background:#f7fafc;
    }

    .post-stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:0 18px 12px;
    }

    .stat-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border-radius:999px;
      background:#f6f9fd;
      border:1px solid #e6eef8;
      color:#44627f;
      font-weight:800;
      font-size:12px;
    }

    .post-actions{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
      padding:0 18px 16px;
    }

    .action-btn{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 12px;
      font-weight:800;
      font-size:
