<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compétition | Championnat de Chimie</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

body{
  background: linear-gradient(135deg,#041126,#0a2659,#123d84);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:18px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px;
}

.hero h1{
  font-size:38px;
  margin-bottom:15px;
  background:linear-gradient(90deg,#2f8cff,#18c34a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#cfe0ff;
  max-width:600px;
  margin:auto;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:30px;
  max-width:420px;
  margin:30px auto;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* FORM */
.form-group{
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#ffffff;
  color:#000;
  font-size:14px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#2f8cff,#18c34a);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
  opacity:0.9;
}

/* BACK LINK */
.back{
  text-align:center;
  margin-top:15px;
}

.back a{
  color:#9cc3ff;
  text-decoration:none;
  font-size:13px;
}

/* FOOTER */
footer{
  margin-top:auto;
  text-align:center;
  padding:15px;
  font-size:12px;
  color:#9db3d9;
}
</style>

</head>

<body>

<header>
  <div class="logo">🏆 Championnat Chimie</div>
  <div class="menu-btn">☰</div>
</header>

<section class="hero">
  <h1>Participer à la compétition</h1>
  <p>Inscris-toi pour relever le défi scientifique et tester ton niveau en chimie.</p>
</section>

<div class="card">

  <form>

    <div class="form-group">
      <input type="text" placeholder="Nom complet" required>
    </div>

    <div class="form-group">
      <input type="email" placeholder="Adresse email" required>
    </div>

    <div class="form-group">
      <select required>
        <option value="">Choisir ton niveau</option>
        <option>Licence</option>
        <option>Master</option>
        <option>Doctorat</option>
      </select>
    </div>

    <button class="btn">S'inscrire au championnat</button>

  </form>

  <div class="back">
    <a href="./index.html">← Retour à l'accueil</a>
  </div>

</div>

<footer>
  © 2026 Championnat de Chimie
</footer>

</body>
</html>
